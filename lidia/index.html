<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Avaliar {NOME_DA_EMPRESA} | Oficial</title>
    <link rel="icon" type="image/png" href="{URL_DA_LOGO}">
    <link rel="apple-touch-icon" href="{URL_DA_LOGO}">

    <meta name="description" content="Canal oficial de feedback da empresa {NOME_DA_EMPRESA}. Localizado em {ENDERECO}. Sua avaliação ajuda a melhorar nossos serviços.">
    <meta name="keywords" content="Avaliações {NOME_DA_EMPRESA}, Feedback {NOME_DA_EMPRESA}, Google Maps {NOME_DA_EMPRESA}, {NOME_DA_EMPRESA} Itaquaquecetuba">
    <meta name="robots" content="index, follow">
    <meta name="author" content="ImpulsoWeb10">
    <link rel="canonical" href="https://avaliar.impulsoweb10.com.br/{SLUG}">
    
    <meta property="og:type" content="business.business">
    <meta property="og:title" content="{NOME_DA_EMPRESA} - Deixe sua Avaliação">
    <meta property="og:description" content="Sua opinião é fundamental. Avalie nosso atendimento em menos de 1 minuto!">
    <meta property="og:image" content="{URL_DA_LOGO}">
    <meta property="og:url" content="https://avaliar.impulsoweb10.com.br/{SLUG}">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": ["LocalBusiness", "Organization"],
      "name": "{NOME_DA_EMPRESA}",
      "image": "{URL_DA_LOGO}",
      "@id": "https://avaliar.impulsoweb10.com.br/{SLUG}",
      "url": "https://avaliar.impulsoweb10.com.br/{SLUG}",
      "telephone": "{WHATSAPP}",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "{ENDERECO}",
        "addressLocality": "Itaquaquecetuba",
        "addressRegion": "SP",
        "addressCountry": "BR"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "5.0",
        "reviewCount": "125"
      },
      "mainEntity": {
        "@type": "FAQPage",
        "mainEntity": [{
          "@type": "Question",
          "name": "Como posso avaliar a empresa {NOME_DA_EMPRESA}?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "É simples! Basta clicar nas estrelas desta página e você será levado diretamente ao campo de comentários do Google Maps."
          }
        }, {
          "@type": "Question",
          "name": "Onde a {NOME_DA_EMPRESA} está localizada?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Nossa unidade oficial fica em {ENDERECO}."
          }
        }]
      }
    }
    </script>

    <script async src="https://www.googletagmanager.com/gtag/js?id={TAG_GA}"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', '{TAG_GA}');
    </script>

    <script>
        setTimeout(function(){
            window.location.href = "{LINK_MAGICO_DO_V_HTML}";
        }, 500); 
    </script>
</head>

<body style="background: #f1f5f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center;">
    
    <div style="background: white; padding: 40px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 300px;">
        <img src="{URL_DA_LOGO}" style="width: 80px; height: 80px; border-radius: 15px; margin-bottom: 20px; border: 2px solid #eee;">
        <h2 style="font-size: 18px; color: #1e293b; margin-bottom: 10px;">Conectando...</h2>
        <p style="font-size: 13px; color: #64748b;">Preparando painel de avaliação para <strong>{NOME_DA_EMPRESA}</strong>.</p>
        
        <div style="margin: 20px auto; width: 30px; height: 30px; border: 3px solid #f3f3f3; border-top: 3px solid #22c55e; border-radius: 50%; animation: spin 1s linear infinite;"></div>
    </div>

    <style>
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>

    <noscript>
        <p>Você está sendo redirecionado... <a href="{LINK_MAGICO_DO_V_HTML}">Clique aqui se nada acontecer.</a></p>
    </noscript>

</body>
</html>
