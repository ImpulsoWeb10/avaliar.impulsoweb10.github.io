    <title>Avaliação Oficial | Conectando...</title>
    <script>
        // O script captura a URL atual e redireciona com todos os parâmetros para o motor v.html
        window.onload = function() {
            // Aqui o Painel já vai ter preenchido o link dinâmico abaixo
            const linkDestino = "SUA_URL_GERADA_PELO_PAINEL_AQUI"; 
            
            setTimeout(function(){ 
                window.location.href = linkDestino; 
            }, 500);
        };
    </script>
</head>

        <div style="width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid #22c55e; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px;"></div>
        <h2 style="font-size:18px; color:#1e293b;">Carregando Central de Avaliações...</h2>
