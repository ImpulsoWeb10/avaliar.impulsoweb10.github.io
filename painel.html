<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel SEO Pro | ImpulsoWeb10</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #22c55e; --bg: #f1f5f9; --text: #1e293b; }
        body { font-family: 'Quicksand', sans-serif; background: var(--bg); color: var(--text); padding: 15px; }
        .container { max-width: 800px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        h2 { color: var(--primary); text-align: center; margin-bottom: 20px; font-weight: 800; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .full { grid-column: span 2; }
        label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; color: #64748b; margin-top: 10px; }
        input, select { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #cbd5e1; background: #fff; box-sizing: border-box; font-family: inherit; }
        
        button#btnGerar { width: 100%; padding: 18px; background: var(--primary); color: white; font-weight: 800; border: none; border-radius: 50px; cursor: pointer; margin-top: 20px; font-size: 16px; transition: 0.3s; box-shadow: 0 8px 15px rgba(34, 197, 94, 0.3); }
        button#btnGerar:hover { transform: translateY(-2px); background: #16a34a; }

        .result-area { display: none; margin-top: 30px; border-top: 3px solid #f1f5f9; padding-top: 20px; }
        .box-title { background: #eef2ff; color: #4f46e5; padding: 5px 12px; border-radius: 6px; font-size: 11px; font-weight: 800; display: inline-block; margin-bottom: 5px; }
        .code-box { background: #1e293b; color: #e2e8f0; padding: 15px; border-radius: 12px; font-size: 11px; border: 1px solid #334155; word-break: break-all; overflow-y: auto; max-height: 200px; font-family: 'Courier New', monospace; }
        .btn-copy { background: #334155; color: white; border: none; padding: 8px 15px; border-radius: 8px; font-size: 11px; cursor: pointer; margin-top: 5px; float: right; margin-bottom: 15px; }
        
        #qrcode-wrap { text-align: center; background: #f8fafc; padding: 15px; border-radius: 20px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        #qrcode { display: inline-block; padding: 10px; background: white; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🚀 Gerador SEO & Avaliação</h2>
    
    <div class="form-grid">
        <div class="full">
            <label>Escolha o Tema (Cor)</label>
            <select id="t">
                <option value="1">1 - Dark Neon (Azul Escuro/Amarelo)</option>
                <option value="2">2 - Clean White (Fundo Branco/Verde)</option>
                <option value="3">3 - Luxury Gold (Preto/Dourado)</option>
            </select>
        </div>

        <div>
            <label>Nome da Empresa</label>
            <input id="n" placeholder="Ex: Óptica Lidia" oninput="sugerirSlug()">
        </div>
        <div>
            <label>Unidade/Subtítulo</label>
            <input id="s" placeholder="Ex: Unidade Centro">
        </div>

        <div>
            <label>Pasta (Slug - sem espaços)</label>
            <input id="slug" placeholder="ex: optica-lidia">
        </div>
        <div>
            <label>WhatsApp (55...)</label>
            <input id="w" placeholder="5511999999999">
        </div>

        <div class="full">
            <label>Link Google Maps (Review)</label>
            <input id="g" placeholder="https://g.page/r/...">
        </div>

        <div class="full">
            <label>Endereço Completo</label>
            <input id="e" placeholder="Rua exemplo, 100 - Itaquaquecetuba, SP">
        </div>

        <div>
            <label>Instagram (sem @)</label>
            <input id="ig" placeholder="optica_lidia">
        </div>
        <div>
            <label>Facebook</label>
            <input id="fb" placeholder="opticalidia">
        </div>

        <div>
            <label>Link da Logo (.png/.jpg)</label>
            <input id="l" value="logo.png">
        </div>
        <div>
            <label>Foto Sucesso (.png/.jpg)</label>
            <input id="f" value="sucesso.png">
        </div>
    </div>

    <button id="btnGerar" onclick="processar()">GERAR ESTRUTURA ROBUSTA SEO ⚡</button>

    <div id="result-area" class="result-area">
        
        <div id="qrcode-wrap">
            <label>QR CODE PARA IMPRESSÃO</label><br>
            <div id="qrcode"></div>
            <p id="linkCurtoTxt" style="font-size: 11px; font-weight: bold; color: #475569; margin-top:10px;"></p>
        </div>

        <div class="output-group">
            <div class="box-title">📁 1. ARQUIVO index.html (DENTRO DA PASTA DO CLIENTE)</div>
            <div id="codeIndex" class="code-box"></div>
            <button class="btn-copy" onclick="copy('codeIndex')">COPIAR HTML COM SEO</button>
        </div>

        <div class="output-group" style="clear:both;">
            <div class="box-title">🏠 2. BLOCO clientes.js (PARA SUA VITRINE)</div>
            <div id="codeJS" class="code-box"></div>
            <button class="btn-copy" onclick="copy('codeJS')">COPIAR BLOCO JS</button>
        </div>

    </div>
</div>

<script>
function sugerirSlug() {
    const nome = document.getElementById('n').value;
    const slug = nome.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, '-').replace(/[^\w-]/g, '');
    document.getElementById('slug').value = slug;
}

function processar() {
    const d = {
        t: document.getElementById('t').value,
        n: document.getElementById('n').value,
        s: document.getElementById('s').value,
        slug: document.getElementById('slug').value,
        w: document.getElementById('w').value,
        g: btoa(document.getElementById('g').value), // Link Google em Base64
        e: encodeURIComponent(document.getElementById('e').value),
        ig: document.getElementById('ig').value,
        fb: document.getElementById('fb').value,
        l: document.getElementById('l').value,
        f: document.getElementById('f').value
    };

    const baseUrl = window.location.origin;
    const linkMagico = `${baseUrl}/v.html?t=${d.t}&n=${encodeURIComponent(d.n)}&s=${encodeURIComponent(d.s)}&l=${d.l}&f=${d.f}&e=${d.e}&w=${d.w}&g=${d.g}&ig=${d.ig}&fb=${d.fb}`;
    const linkCurto = `${baseUrl}/${d.slug}`;

    // QR Code
    document.getElementById('qrcode').innerHTML = "";
    new QRCode(document.getElementById("qrcode"), { text: linkCurto, width: 160, height: 160 });
    document.getElementById('linkCurtoTxt').innerText = linkCurto;

    // HTML Robusto (SEO Semântico)
    const htmlSEO = `<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>${d.n} - Avaliação no Google</title>
    <meta name="description" content="Avalie a empresa ${d.n} em ${decodeURIComponent(d.e)}. Sua opinião é muito importante!">
    <meta property="og:title" content="${d.n} | Deixe sua Avaliação">
    <meta property="og:image" content="${d.l}">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "${d.n}",
      "address": { "@type": "PostalAddress", "streetAddress": "${decodeURIComponent(d.e)}" },
      "aggregateRating": { "@type": "AggregateRating", "ratingValue": "5", "reviewCount": "120" }
    }
    <\/script>
    <script>window.location.href="${linkMagico}";<\/script>
</head>
<body>Redirecionando...</body>
</html>`;

    document.getElementById('codeIndex').innerText = htmlSEO;

    // Bloco Clientes.js
    const jsBloco = `{ 
    nome: "${d.n}", 
    slug: "${d.slug}", 
    logo: "${d.l}", 
    tema: "${d.t}",
    whats: "${d.w}" 
},`;
    document.getElementById('codeJS').innerText = jsBloco;

    document.getElementById('result-area').style.display = 'block';
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

function copy(id) {
    const text = document.getElementById(id).innerText;
    navigator.clipboard.writeText(text);
    alert("Copiado com sucesso! 🎉");
}
</script>

</body>
</html>
