<div class="card">
    <h2>Gerador ImpulsoWeb10</h2>
    
    <label>ESCOLHA O DESIGN (MODELO)</label>
    <select id="modelo">
        <option value="1">Modelo 1 - Dark Neon (Padrão)</option>
        <option value="2">Modelo 2 - Clean White (Claro)</option>
        <option value="3">Modelo 3 - Blue Corporate (Azul)</option>
    </select>

    <label>NOME DA EMPRESA</label>
    <input id="nome" placeholder="Ex: Óptica Lionda">
    
    <label>LINK GOOGLE (AVALIAÇÃO)</label>
    <input id="google" placeholder="Cole o link aqui">

    <button onclick="gerarLinkMágico()">GERAR LINK DO CLIENTE</button>
    <p id="linkFinal" style="display:none;"></p>
</div>

<script>
function gerarLinkMágico() {
    const mod = document.getElementById('modelo').value;
    const nome = encodeURIComponent(document.getElementById('nome').value);
    const google = btoa(document.getElementById('google').value);
    // ... pega whats e insta ...

    // O link agora leva o ID do modelo (?m=1, ?m=2...)
    const link = `${window.location.origin}/v.html?m=${mod}&n=${nome}&g=${google}`;
    
    document.getElementById('linkFinal').innerText = link;
    document.getElementById('linkFinal').style.display = 'block';
}
</script>
