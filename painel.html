<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel ImpulsoWeb10 | Gerador Inteligente v7.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #fbbf24; --bg: #0f172a; --accent: #38bdf8; --text: #f8fafc; --magic: #a855f7; }
        body { font-family: 'Quicksand', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 950px; margin: 0 auto; background: #1e293b; padding: 30px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid #334155; }
        .header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid #334155; padding-bottom: 20px; }
        .header h2 { color: var(--primary); font-size: 28px; margin: 0; }
        
        /* NOVO CAMPO MÁGICO */
        .magic-box { background: linear-gradient(45deg, #1e293b, #3b0764); padding: 20px; border-radius: 20px; margin-bottom: 25px; border: 2px dashed var(--magic); }
        .magic-box label { color: var(--magic); font-weight: 800; font-size: 14px; margin-bottom: 10px; display: block; }
        .magic-box textarea { width: 100%; background: rgba(0,0,0,0.3); color: #e9d5ff; border: 1px solid var(--magic); padding: 10px; border-radius: 10px; font-size: 12px; resize: none; }
        
        .section-title { background: #334155; color: var(--accent); padding: 10px 15px; border-radius: 10px; font-weight: 800; font-size: 12px; text-transform: uppercase; margin: 20px 0 10px; border-left: 4px solid var(--accent); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; }
        .field { display: flex; flex-direction: column; background: #0f172a; padding: 10px; border-radius: 12px; border: 1px solid #334155; }
        label { font-size: 10px; font-weight: 700; color: #94a3b8; margin-bottom: 5px; }
        input { padding: 10px; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: white; outline: none; }
        input:focus { border-color: var(--accent); }
        button#btnGerar { width: 100%; padding: 20px; background: var(--primary); color: #000; font-weight: 800; border: none; border-radius: 50px; cursor: pointer; margin-top: 25px; font-size: 18px; transition: 0.3s; }
        .result-area { display: none; margin-top: 30px; }
        .code-box { background: #000; color: #10b981; padding: 15px; border-radius: 10px; font-size: 11px; font-family: monospace; overflow-y: auto; max-height: 250px; border: 1px solid #059669; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>🚀 Gerador Ultra ImpulsoWeb10 v7.0</h2>
        <p>Preenchimento Semi-Automático Ativado</p>
    </div>

    <div class="magic-box">
        <label><i class="fas fa-wand-magic-sparkles"></i> 🪄 CAPTURA RÁPIDA (Copie e Cole os dados do Google aqui)</label>
        <textarea id="magicPaste" rows="3" placeholder="Cole aqui o texto copiado da pesquisa do Google (ex: Endereço, Telefone, Nome...)"></textarea>
        <button onclick="magicExtract()" style="margin-top:10px; background: var(--magic); color: white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer; font-weight:bold;">✨ Extrair Dados</button>
    </div>
    
    <div class="section-title">1. Informações do Negócio</div>
    <div class="grid">
        <div class="field"><label>Nome da Empresa</label><input id="n" oninput="autoSlug()"></div>
        <div class="field"><label>URL da Logo</label><input id="l" placeholder="logo.png"></div>
        <div class="field"><label>Pasta (Slug)</label><input id="slug"></div>
    </div>

    <div class="section-title">2. Links de Destino</div>
    <div class="grid">
        <div class="field"><label>Google Review (Avaliação)</label><input id="g" placeholder="https://g.page/r/..."></div>
        <div class="field"><label>Google Maps (Endereço/GPS)</label><input id="maps"></div>
        <div class="field"><label>WhatsApp (Somente números)</label><input id="w" placeholder="5511999999999"></div>
        <div class="field"><label>Catálogo ou Site</label><input id="site"></div>
        <div class="field"><label>Instagram</label><input id="ig"></div>
        <div class="field"><label>Facebook</label><input id="fb"></div>
    </div>

    <button id="btnGerar" onclick="gerarTudo()">CRIAR PÁGINA PROFISSIONAL ⚡</button>

    <div id="result-area" class="result-area">
        <div style="text-align:center; background:white; padding:20px; border-radius:20px; margin-bottom:20px; display:inline-block; width:100%;">
            <div id="qrcode" style="display:flex; justify-content:center;"></div>
            <p id="linkCurtoTxt" style="color:#1e293b; font-weight:bold; margin-top:10px;"></p>
        </div>
        <div class="code-box" id="codeIndex"></div>
        <button onclick="copy('codeIndex')" style="width:100%; padding:15px; margin-top:10px; cursor:pointer; background:var(--accent); border:none; border-radius:10px; font-weight:800; color:white;">Copiar Código HTML</button>
    </div>
</div>

<script>
// FUNÇÃO MÁGICA DE EXTRAÇÃO
function magicExtract() {
    const text = document.getElementById('magicPaste').value;
    
    // 1. Extrair Telefone (WhatsApp) - busca padrão 11 99999-9999 ou similar
    const phoneMatch = text.match(/(?:\(?\d{2}\)?\s?)?9?\d{4}[-\s]?\d{4}/g);
    if(phoneMatch) {
        let cleanPhone = phoneMatch[0].replace(/\D/g, '');
        if(cleanPhone.length === 11) cleanPhone = '55' + cleanPhone;
        document.getElementById('w').value = cleanPhone;
    }

    // 2. Tentar pegar o Nome (geralmente a primeira linha se vier do Google Maps)
    const lines = text.split('\n');
    if(lines[0].length > 3 && lines[0].length < 50) {
        document.getElementById('n').value = lines[0].trim();
        autoSlug();
    }

    // 3. Tentar identificar endereço (se tiver "Rua", "Av", "Alameda")
    const addressMatch = text.match(/(Rua|Av\.|Avenida|Al\.|Alameda|Rod\.)\s[^,]+,\s\d+/i);
    if(addressMatch) {
        // Como o Maps precisa de um Link, aqui nós preenchemos com o que temos
        // Mas o ideal é colar o link real do maps.
        console.log("Endereço achado: " + addressMatch[0]);
    }

    alert("Dados processados! Verifique e complete o que faltou.");
}

function autoSlug() {
    const nome = document.getElementById('n').value;
    const slug = nome.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, '-').replace(/[^\w-]/g, '');
    document.getElementById('slug').value = slug;
}

function gerarTudo() {
    // Mesma lógica anterior de geração do HTML...
    const n = document.getElementById('n').value;
    const l = document.getElementById('l').value || 'logo.png';
    const g = document.getElementById('g').value;
    const maps = document.getElementById('maps').value;
    const site = document.getElementById('site').value;
    const w = document.getElementById('w').value;
    const ig = document.getElementById('ig').value;
    const fb = document.getElementById('fb').value;
    const slug = document.getElementById('slug').value;

    if(!n || !g) return alert("Preencha o Nome e o Google Review!");

    const htmlFinal = `<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>${n} | Oficial</title>
<style>
body{margin:0;font-family:'Segoe UI',sans-serif;background:linear-gradient(-45deg,#0f172a,#1e293b,#334155,#0f172a);background-size:400% 400%;animation:gradientBG 10s ease infinite;display:flex;justify-content:center;align-items:center;min-height:100vh;color:white;text-align:center;}
@keyframes gradientBG{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
.container{background:rgba(255,255,255,0.05);padding:30px 20px;border-radius:30px;backdrop-filter:blur(15px);max-width:350px;width:90%;box-shadow:0 25px 50px rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.1);animation:slideUp 0.8s;}
@keyframes slideUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
.logo{width:90px;height:90px;border-radius:50%;margin-bottom:15px;border:3px solid #fbbf24;object-fit:cover;background:white;}
.botao{display:block;margin:12px auto;padding:14px;width:90%;font-weight:700;text-decoration:none;border-radius:12px;font-size:14px;transition:0.3s;box-sizing:border-box;text-transform:uppercase;}
.google{background:#fbbf24;color:#000;}
.site{background:white;color:#000;}
.whatsapp{background:#25D366;color:white;}
.social{background:rgba(255,255,255,0.1);color:white;border:1px solid rgba(255,255,255,0.2);}
.botao:hover{transform:translateY(-3px);filter:brightness(1.1);}
footer{margin-top:25px;font-size:10px;opacity:0.5;}
footer a{color:#38bdf8;text-decoration:none;}
</style>
</head>
<body>
<div class="container">
    <img src="${l}" class="logo">
    <h1>${n}</h1>
    <div style="color:#fbbf24;font-size:20px;margin-bottom:20px;">★★★★★</div>
    <a class="botao google" href="${g}" target="_blank">⭐ Avaliar no Google</a>
    ${site ? `<a class="botao site" href="${site}" target="_blank">🌐 Ver Catálogo/Site</a>` : ''}
    ${maps ? `<a class="botao social" href="${maps}" target="_blank">📍 Como Chegar (GPS)</a>` : ''}
    ${w ? `<a class="botao whatsapp" href="https://wa.me/${w}" target="_blank">💬 WhatsApp</a>` : ''}
    ${ig ? `<a class="botao social" href="${ig}" target="_blank">📸 Instagram</a>` : ''}
    ${fb ? `<a class="botao social" href="${fb}" target="_blank">🔵 Facebook</a>` : ''}
    <footer>Tecnologia <a href="https://wa.me/5511954950044" target="_blank">ImpulsoWeb10</a></footer>
</div>
</body>
</html>`;

    document.getElementById('codeIndex').innerText = htmlFinal;
    const qrDiv = document.getElementById('qrcode');
    qrDiv.innerHTML = "";
    new QRCode(qrDiv, { text: window.location.origin + "/" + slug, width: 150, height: 150 });
    document.getElementById('linkCurtoTxt').innerText = window.location.origin + "/" + slug;
    document.getElementById('result-area').style.display = 'block';
}

function copy(id) {
    const text = document.getElementById(id).innerText;
    navigator.clipboard.writeText(text).then(() => alert("Copiado!"));
}
</script>
</body>
</html>
