<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Gerador Pro | ImpulsoWeb10</title>
    <style>
        :root { --primary: #22c55e; --accent: #facc15; --bg: #f8fafc; }
        body { font-family: 'Quicksand', sans-serif; background: var(--bg); color: #334155; padding: 20px; }
        .card { max-width: 600px; margin: 20px auto; background: #fff; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        h2 { color: var(--primary); text-align: center; margin-bottom: 25px; }
        label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; color: #94a3b8; margin: 15px 0 5px; }
        input, textarea { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #e2e8f0; background: #fdfdfd; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        button { width: 100%; padding: 16px; background: var(--primary); color: white; font-weight: bold; border: none; border-radius: 50px; cursor: pointer; margin-top: 20px; font-size: 16px; transition: 0.3s; }
        button:hover { transform: scale(1.02); background: #16a34a; }
        #linkDisplay { display: none; margin-top: 25px; padding: 15px; background: #f1f5f9; border: 1px dashed var(--primary); border-radius: 12px; word-break: break-all; font-size: 12px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Painel ImpulsoWeb10</h2>
        
        <div class="grid">
            <div>
                <label>Título (Empresa)</label>
                <input id="n" placeholder="Ex: Óptica Lionda">
            </div>
            <div>
                <label>Subtítulo (Unidade)</label>
                <input id="s" placeholder="Ex: Unidade II">
            </div>
        </div>

        <label>URL da Logo (ou logo.png)</label>
        <input id="l" placeholder="Link da logo ou deixe logo.png">

        <label>URL da Foto de Sucesso (Ex: foto-loja.png)</label>
        <input id="f" placeholder="Aparece quando ganha 5 estrelas">

        <label>Endereço Completo (Rodapé)</label>
        <input id="e" placeholder="Rua, Número, Bairro, Cidade">

        <div class="grid">
            <div>
                <label>WhatsApp Gerente (5511...)</label>
                <input id="w" placeholder="Somente números">
            </div>
            <div>
                <label>Link Google Maps</label>
                <input id="g" placeholder="Cole o link de avaliação">
            </div>
        </div>

        <button onclick="gerar()">GERAR LINK INTELIGENTE 🚀</button>

        <div id="linkDisplay"></div>
        <button id="btnCopy" style="display:none; background:#334155;" onclick="copy()">Copiar Link</button>
    </div>

    <script>
        function gerar() {
            const d = {
                n: encodeURIComponent(document.getElementById('n').value),
                s: encodeURIComponent(document.getElementById('s').value),
                l: document.getElementById('l').value || 'logo.png',
                f: document.getElementById('f').value || 'sucesso.png',
                e: encodeURIComponent(document.getElementById('e').value),
                w: document.getElementById('w').value,
                g: btoa(document.getElementById('g').value) // Codifica link longo
            };

            const link = `${window.location.origin}/v.html?n=${d.n}&s=${d.s}&l=${d.l}&f=${d.f}&e=${d.e}&w=${d.w}&g=${d.g}`;
            const out = document.getElementById('linkDisplay');
            out.innerText = link;
            out.style.display = 'block';
            document.getElementById('btnCopy').style.display = 'block';
        }

        function copy() {
            navigator.clipboard.writeText(document.getElementById('linkDisplay').innerText);
            alert("Link copiado!");
        }
    </script>
</body>
</html>
