<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Ultra Pro | ImpulsoWeb10</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary: #22c55e; --accent: #facc15; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Quicksand', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 650px; margin: 20px auto; background: #fff; padding: 40px; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        h2 { color: var(--primary); text-align: center; margin-bottom: 30px; font-weight: 700; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; color: #94a3b8; margin: 15px 0 5px; }
        input, select, textarea { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #e2e8f0; background: #fdfdfd; box-sizing: border-box; font-family: inherit; }
        
        button { width: 100%; padding: 18px; background: var(--primary); color: white; font-weight: bold; border: none; border-radius: 50px; cursor: pointer; margin-top: 25px; font-size: 16px; transition: 0.3s; box-shadow: 0 10px 20px rgba(34, 197, 94, 0.2); }
        button:hover { transform: translateY(-2px); background: #16a34a; }

        /* ÁREA DE RESULTADO */
        .result-area { display: none; margin-top: 40px; border-top: 2px solid #f1f5f9; padding-top: 20px; }
        .output-group { margin-bottom: 25px; }
        .code-box { background: #f1f5f9; padding: 15px; border-radius: 12px; font-size: 12px; color: #475569; border: 1px dashed var(--primary); word-break: break-all; position: relative; margin-top: 5px; }
        .btn-copy { background: #334155; color: white; border: none; padding: 6px 12px; border-radius: 6px; font-size: 10px; cursor: pointer; margin-top: 8px; float: right; }
        
        #qrcode-container { display: flex; flex-direction: column; align-items: center; margin-top: 20px; background: #fff; padding: 20px; border-radius: 20px; border: 1px solid #e2e8f0; }
        #qrcode { margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>ImpulsoWeb10 - Gerador</h2>
    
    <div class="form-grid">
        <div>
            <label>Nome da Empresa</label>
            <input id="n" placeholder="Ex: Óptica Lionda">
        </div>
        <div>
            <label>Subtítulo / Unidade</label>
            <input id="s" placeholder="Ex: Unidade II">
        </div>
    </div>

    <div class="form-grid">
        <div>
            <label>Pasta no GitHub (Slug)</label>
            <input id="slug" placeholder="Ex: opticalionda2">
        </div>
        <div>
            <label>WhatsApp Gerente</label>
            <input id="w" placeholder="5511999999999">
        </div>
    </div>

    <label>Link Google Maps (Avaliação)</label>
    <input id="g" placeholder="Cole o link de avaliação aqui">

    <label>Endereço Completo (Rodapé)</label>
    <input id="e" placeholder="Rua exemplo, 123 - Bairro">

    <div class="form-grid">
        <div>
            <label>URL da Logo</label>
            <input id="l" placeholder="logo.png">
        </div>
        <div>
            <label>URL Foto Sucesso</label>
            <input id="f" placeholder="sucesso.png">
        </div>
    </div>

    <button onclick="gerarTudo()">GERAR ESTRUTURA COMPLETA 🚀</button>

    <div id="result-area" class="result-area">
        
        <div id="qrcode-container">
            <label>QR CODE DO CLIENTE</label>
            <div id="qrcode"></div>
            <p style="font-size: 10px; color: #94a3b8;">Link Curto: <span id="linkCurtoTxt"></span></p>
        </div>

        <div class="output-group">
            <label>1. Código para o index.html (da pasta do cliente)</label>
            <div id="codeIndex" class="code-box"></div>
            <button class="btn-copy" onclick="copy('codeIndex')">Copiar HTML</button>
        </div>

        <div class="output-group" style="clear:both; padding-top:10px;">
            <label>2. Bloco para o seu arquivo clientes.js (Vitrine)</label>
            <div id="codeJS" class="code-box"></div>
            <button class="btn-copy" onclick="copy('codeJS')">Copiar Bloco JS</button>
        </div>

    </div>
</div>

<script>
function gerarTudo() {
    // Dados
    const slug = document.getElementById('slug').value.toLowerCase().trim();
    const nome = document.getElementById('n').value;
    const sub = document.getElementById('s').value;
    const whats = document.getElementById('w').value;
    const google = btoa(document.getElementById('g').value); // Encode Base64
    const endereco = encodeURIComponent(document.getElementById('e').value);
    const logo = document.getElementById('l').value || 'logo.png';
    const foto = document.getElementById('f').value || 'sucesso.png';

    // 1. Gerar Link Mágico (Dinâmico)
    const baseUrl = window.location.origin;
    const linkMagico = `${baseUrl}/v.html?n=${encodeURIComponent(nome)}&s=${encodeURIComponent(sub)}&l=${logo}&f=${foto}&e=${endereco}&w=${whats}&g=${google}`;

    // 2. Link Curto (Pasta do cliente)
    const linkCurto = `${baseUrl}/${slug}`;

    // 3. Gerar QR Code para o Link Curto
    document.getElementById('qrcode').innerHTML = "";
    new QRCode(document.getElementById("qrcode"), {
        text: linkCurto,
        width: 180,
        height: 180,
        colorDark : "#000000",
        colorLight : "#ffffff",
        correctLevel : QRCode.CorrectLevel.H
    });
    document.getElementById('linkCurtoTxt').innerText = linkCurto;

    // 4. Gerar Código do Index da Pasta
    document.getElementById('codeIndex').innerText = `<script>window.location.href="${linkMagico}";<\/script>`;

    // 5. Gerar Bloco do clientes.js
    const blocoJS = `{ 
    nome: "${nome}", 
    pasta: "${slug}", 
    logo: "${logo}", 
    descricao: "${sub}" 
},`;
    document.getElementById('codeJS').innerText = blocoJS;

    // Mostrar área de resultados
    document.getElementById('result-area').style.display = 'block';
}

function copy(id) {
    const text = document.getElementById(id).innerText;
    navigator.clipboard.writeText(text);
    alert("Copiado com sucesso!");
}
</script>

</body>
</html>
