<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel ImpulsoWeb10 | Gerador Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #22c55e; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Quicksand', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 650px; margin: 20px auto; background: #fff; padding: 35px; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        h2 { color: var(--primary); text-align: center; margin-bottom: 25px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; color: #94a3b8; margin: 12px 0 5px; }
        input, select { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #e2e8f0; background: #fdfdfd; box-sizing: border-box; }
        button { width: 100%; padding: 18px; background: var(--primary); color: white; font-weight: bold; border: none; border-radius: 50px; cursor: pointer; margin-top: 25px; font-size: 16px; transition: 0.3s; }
        button:hover { transform: scale(1.02); background: #16a34a; }

        /* RESULTADOS */
        .result-area { display: none; margin-top: 35px; border-top: 2px solid #f1f5f9; padding-top: 20px; }
        .output-group { margin-bottom: 20px; position: relative; }
        .code-box { background: #f1f5f9; padding: 15px; border-radius: 12px; font-size: 12px; color: #475569; border: 1px dashed var(--primary); word-break: break-all; margin-top: 5px; }
        .btn-copy { background: #334155; color: white; border: none; padding: 6px 12px; border-radius: 6px; font-size: 10px; cursor: pointer; margin-top: 8px; float: right; transition: 0.2s; }
        .btn-copy:active { transform: scale(0.95); }
        
        #qrcode-container { display: flex; flex-direction: column; align-items: center; margin-bottom: 30px; padding: 20px; border: 1px solid #eee; border-radius: 20px; }
        #qrcode { margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🚀 Gerador de Clientes</h2>
    
    <div class="form-grid">
        <div>
            <label>Nome do Cliente</label>
            <input id="n" placeholder="Ex: Óptica Lidia">
        </div>
        <div>
            <label>Subtítulo (Unidade)</label>
            <input id="s" placeholder="Ex: Unidade I">
        </div>
    </div>

    <div class="form-grid">
        <div>
            <label>Nome da Pasta (Slug)</label>
            <input id="slug" placeholder="Ex: lidia">
        </div>
        <div>
            <label>WhatsApp (55...)</label>
            <input id="w" placeholder="5511999999999">
        </div>
    </div>

    <label>Link de Avaliação do Google</label>
    <input id="g" placeholder="Cole o link completo do Google Maps">

    <label>Endereço Completo</label>
    <input id="e" placeholder="Rua exemplo, 100 - Bairro">

    <div class="form-grid">
        <div>
            <label>Link da Logo</label>
            <input id="l" placeholder="logo.png">
        </div>
        <div>
            <label>Link Foto Sucesso</label>
            <input id="f" placeholder="sucesso.png">
        </div>
    </div>

    <button onclick="gerarEstrutura()">GERAR TUDO AGORA ⚡</button>

    <div id="result-area" class="result-area">
        
        <div id="qrcode-container">
            <label>QR CODE (Link Curto)</label>
            <div id="qrcode"></div>
            <p style="font-size: 10px; color: #94a3b8;" id="linkCurtoTxt"></p>
        </div>

        <div class="output-group">
            <label>📁 1. CÓDIGO PARA A PASTA (index.html do cliente)</label>
            <p style="font-size: 10px; color: #64748b; margin-bottom: 5px;">Crie a pasta no GitHub, crie um index.html e cole isso dentro:</p>
            <div id="codeIndex" class="code-box"></div>
            <button class="btn-copy" onclick="copy('codeIndex')">COPIAR HTML DA PASTA</button>
        </div>

        <div class="output-group" style="clear:both; padding-top:20px;">
            <label>🏠 2. BLOCO PARA A VITRINE (clientes.js ou index principal)</label>
            <p style="font-size: 10px; color: #64748b; margin-bottom: 5px;">Cole este bloco na sua lista de clientes para ele aparecer no seu portfólio:</p>
            <div id="codeJS" class="code-box"></div>
            <button class="btn-copy" onclick="copy('codeJS')">COPIAR BLOCO DA VITRINE</button>
        </div>

    </div>
</div>

<script>
function gerarEstrutura() {
    const slug = document.getElementById('slug').value.toLowerCase().trim();
    const nome = document.getElementById('n').value;
    const sub = document.getElementById('s').value;
    const whats = document.getElementById('w').value;
    const google = btoa(document.getElementById('g').value);
    const endereco = encodeURIComponent(document.getElementById('e').value);
    const logo = document.getElementById('l').value || 'logo.png';
    const foto = document.getElementById('f').value || 'sucesso.png';

    // URL base do seu site (ajusta automático)
    const baseUrl = window.location.origin;
    const linkMagico = `${baseUrl}/v.html?n=${encodeURIComponent(nome)}&s=${encodeURIComponent(sub)}&l=${logo}&f=${foto}&e=${endereco}&w=${whats}&g=${google}`;
    const linkCurto = `${baseUrl}/${slug}`;

    // Gerar QR Code
    document.getElementById('qrcode').innerHTML = "";
    new QRCode(document.getElementById("qrcode"), {
        text: linkCurto, width: 150, height: 150
    });
    document.getElementById('linkCurtoTxt').innerText = linkCurto;

    // Campo 1: Pasta do Cliente
    document.getElementById('codeIndex').innerText = `<script>window.location.href="${linkMagico}";<\/script>`;

    // Campo 2: Vitrine/clientes.js
    const blocoJS = `{ 
    nome: "${nome}", 
    pasta: "${slug}", 
    logo: "${logo}", 
    subtitulo: "${sub}" 
},`;
    document.getElementById('codeJS').innerText = blocoJS;

    document.getElementById('result-area').style.display = 'block';
}

function copy(id) {
    const text = document.getElementById(id).innerText;
    navigator.clipboard.writeText(text);
    alert("Copiado! Agora é só colar no GitHub.");
}
</script>

</body>
</html>
