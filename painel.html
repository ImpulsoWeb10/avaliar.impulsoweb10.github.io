<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Gerador de Template - ImpulsoWeb10</title>
    <style>
        body { font-family: sans-serif; background: #050707; color: #fff; padding: 20px; text-align: center; }
        .card { background: #0d1212; padding: 25px; border-radius: 15px; max-width: 500px; margin: auto; border: 1px solid #1a2222; }
        input, textarea { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid #333; background: #000; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #38e391; color: #000; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; margin-top: 10px; }
        #codigoGerado { background: #000; color: #38e391; padding: 15px; border-radius: 8px; text-align: left; white-space: pre-wrap; display: none; font-size: 11px; margin-top: 20px; border: 1px dashed #38e391; max-height: 300px; overflow-y: auto; }
        label { display: block; text-align: left; font-size: 12px; color: #aaa; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Gerador de Página do Cliente</h2>
    
    <label>Nome da Empresa</label>
    <input id="nome" placeholder="Ex: Óptica Lionda">
    
    <label>Link Google Maps</label>
    <input id="google" placeholder="Link de avaliação">
    
    <label>WhatsApp (Opcional - deixe vazio se não tiver)</label>
    <input id="whats" placeholder="5511999999999">
    
    <label>Instagram (Opcional - apenas o @)</label>
    <input id="insta" placeholder="optica_lionda">

    <button onclick="gerarTemplate()">GERAR CÓDIGO DA PÁGINA</button>

    <div id="codigoGerado"></div>
    <button id="btnCopiar" style="display:none; background: #1a2222; color: #38e391; border: 1px solid #38e391;" onclick="copiar()">Copiar Código HTML</button>
</div>

<script>
function gerarTemplate() {
    const nome = document.getElementById('nome').value;
    const google = document.getElementById('google').value;
    const whats = document.getElementById('whats').value;
    const insta = document.getElementById('insta').value;

    // Aqui definimos o padrão visual fixo para todos os clientes
    const html = `<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliar ${nome} | ImpulsoWeb10</title>
    <style>
        body { font-family: Arial, sans-serif; background: #050707; color: white; text-align: center; margin: 0; padding: 40px 20px; }
        .container { max-width: 400px; margin: auto; background: #0d1212; padding: 30px; border-radius: 20px; border: 1px solid #38e391; }
        img { max-width: 120px; margin-bottom: 20px; }
        h1 { font-size: 1.5rem; margin-bottom: 10px; }
        .btn { display: block; padding: 15px; margin: 10px 0; border-radius: 10px; text-decoration: none; font-weight: bold; transition: 0.3s; }
        .btn-google { background: #38e391; color: #000; }
        .btn-whats { background: transparent; border: 1px solid #25D366; color: #25D366; ${whats ? '' : 'display:none;'} }
        .btn-insta { background: transparent; border: 1px solid #E1306C; color: #E1306C; ${insta ? '' : 'display:none;'} }
        footer { margin-top: 30px; font-size: 12px; color: #555; }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo.png" alt="Logo">
        <h1>${nome}</h1>
        <p>Sua avaliação é muito importante para nós!</p>
        
        <a href="${google}" class="btn btn-google">AVALIAR NO GOOGLE ⭐</a>
        
        ${whats ? `<a href="https://wa.me/${whats}" class="btn btn-whats">FALAR NO WHATSAPP</a>` : ''}
        ${insta ? `<a href="https://instagram.com/${insta}" class="btn btn-insta">SEGUIR NO INSTAGRAM</a>` : ''}
        
    </div>
    <footer>Powered by ImpulsoWeb10</footer>
</body>
</html>`;

    document.getElementById('codigoGerado').innerText = html;
    document.getElementById('codigoGerado').style.display = 'block';
    document.getElementById('btnCopiar').style.display = 'block';
}

function copiar() {
    const texto = document.getElementById('codigoGerado').innerText;
    navigator.clipboard.writeText(texto);
    alert("Código copiado! Agora cole no index.html da pasta do cliente.");
}
</script>
</body>
</html>
