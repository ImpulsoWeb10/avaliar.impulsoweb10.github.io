<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel ImpulsoWeb10 | Gerador Premium v4.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #fbbf24; --bg: #0f172a; --accent: #38bdf8; --text: #f8fafc; --danger: #ef4444; }
        body { font-family: 'Quicksand', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: #1e293b; padding: 30px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid #334155; }
        .header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid #334155; padding-bottom: 20px; }
        .header h2 { color: var(--primary); font-size: 28px; font-weight: 800; margin: 0; }
        .section-title { background: #334155; color: var(--accent); padding: 12px 15px; border-radius: 10px; font-weight: 800; font-size: 13px; text-transform: uppercase; margin: 25px 0 15px; border-left: 4px solid var(--accent); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
        .field { display: flex; flex-direction: column; margin-bottom: 10px; background: #0f172a; padding: 10px; border-radius: 12px; border: 1px solid #334155; }
        label { font-size: 10px; font-weight: 700; color: #94a3b8; margin-bottom: 6px; text-transform: uppercase; }
        input, textarea { padding: 12px; border-radius: 8px; border: 2px solid #334155; background: #1e293b; color: white; font-family: inherit; font-size: 14px; width: 100%; box-sizing: border-box; }
        input:focus { border-color: var(--accent); outline: none; }
        button#btnGerar { width: 100%; padding: 20px; background: var(--primary); color: #000; font-weight: 800; border: none; border-radius: 50px; cursor: pointer; margin-top: 30px; font-size: 18px; transition: 0.3s; }
        button#btnGerar:hover { transform: scale(1.02); background: #f59e0b; }
        .result-area { display: none; margin-top: 40px; border-top: 3px solid #334155; padding-top: 30px; }
        .code-box { background: #000; color: #10b981; padding: 20px; border-radius: 15px; font-size: 11px; font-family: monospace; word-break: break-all; max-height: 300px; overflow-y: auto; margin-bottom: 20px; border: 1px solid #059669; }
        #qrcode-wrap { text-align: center; padding: 20px; background: white; border-radius: 20px; margin-bottom: 20px; display: inline-block; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>🚀 Gerador Premium ImpulsoWeb10</h2>
        <p>Modelo Dark Animado com Redes Sociais</p>
    </div>
    
    <div class="section-title">1. Dados Principais</div>
    <div class="grid">
        <div class="field">
            <label>Nome da Empresa *</label>
            <input id="n" placeholder="Ex: Tintas Qualy Quimy" oninput="autoSlug()">
        </div>
        <div class="field">
            <label>Link da Logo (URL)</label>
            <input id="l" placeholder="https://link.com/logo.png">
        </div>
        <div class="field">
            <label>Pasta (Slug)</label>
            <input id="slug" placeholder="ex: tintas-qualy">
        </div>
    </div>

    <div class="section-title">2. Texto e Chamada</div>
    <div class="grid">
        <div class="field" style="grid-column: span 2;">
            <label>Frase de Agradecimento/Subtítulo</label>
            <textarea id="s" rows="2">Se você gostou dos nossos produtos, deixe sua avaliação e acompanhe nossas novidades!</textarea>
        </div>
    </div>

    <div class="section-title">3. Links de Destino</div>
    <div class="grid">
        <div class="field">
            <label>Link Google Review *</label>
            <input id="g" placeholder="https://g.page/r/...">
        </div>
        <div class="field">
            <label>WhatsApp (DDD + Número)</label>
            <input id="w" placeholder="5511999999999">
        </div>
        <div class="field">
            <label>URL Instagram</label>
            <input id="ig" placeholder="https://instagram.com/perfil">
        </div>
    </div>

    <button id="btnGerar" onclick="gerarTudo()">GERAR PÁGINA DO CLIENTE ⚡</button>

    <div id="result-area" class="result-area">
        <div style="text-align:center">
            <div id="qrcode-wrap"><div id="qrcode"></div></div>
            <p id="linkCurtoTxt" style="font-weight: 700; color: var(--accent);"></p>
        </div>
        
        <label>Código para o index.html (Copie e cole no arquivo do cliente)</label>
        <button style="float:right; margin-bottom:5px; cursor:pointer;" onclick="copy('codeIndex')">Copiar Código</button>
        <div id="codeIndex" class="code-box"></div>
    </div>
</div>

<script>
function autoSlug() {
    const nome = document.getElementById('n').value;
    const slug = nome.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, '-').replace(/[^\w-]/g, '');
    document.getElementById('slug').value = slug;
}

function gerarTudo() {
    const n = document.getElementById('n').value;
    const l = document.getElementById('l').value || 'logo.png';
    const s = document.getElementById('s').value;
    const g = document.getElementById('g').value;
    const w = document.getElementById('w').value;
    const ig = document.getElementById('ig').value;
    const slug = document.getElementById('slug').value;

    if(!n || !g) { alert("Nome e Link do Google são obrigatórios!"); return; }

    const urlFinal = window.location.origin + "/" + slug;

    // Gerar o HTML baseado no SEU NOVO MODELO
    const htmlPronto = `<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avalie ${n} ⭐</title>
<style>
body{margin:0;font-family:'Segoe UI',sans-serif;background:linear-gradient(-45deg,#1e1e1e,#2c3e50,#34495e,#1e1e1e);background-size:400% 400%;animation:gradientBG 12s ease infinite;display:flex;justify-content:center;align-items:center;height:100vh;color:white;text-align:center;}
@keyframes gradientBG{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
.container{background:rgba(0,0,0,0.45);padding:35px 25px;border-radius:25px;backdrop-filter:blur(12px);max-width:380px;width:90%;box-shadow:0 20px 50px rgba(0,0,0,0.6);animation:fadeIn 1.2s ease;}
@keyframes fadeIn{from{opacity:0; transform:translateY(20px);}to{opacity:1; transform:translateY(0);}}
.logo{width:120px;margin-bottom:20px;border-radius:12px;object-fit:contain;}
h1{font-size:20px;margin-bottom:10px;}
p{font-size:14px;margin-bottom:18px;line-height:1.4em;}
.estrelas{font-size:24px;margin-bottom:18px;opacity:0.9;}
.botao{display:block;margin:8px auto;padding:12px 18px;width:75%;font-weight:600;text-decoration:none;border-radius:30px;font-size:14px;transition:0.3s;}
.google{background:#FFD700;color:#000;box-shadow:0 0 10px rgba(255,215,0,0.4);}
.whatsapp{background:#25D366;color:white;box-shadow:0 0 10px rgba(37,211,102,0.4);}
.instagram{background:linear-gradient(45deg,#E1306C,#F77737,#FCAF45);color:white;}
.botao:hover{transform:scale(1.05);filter:brightness(1.1);}
footer{margin-top:18px;padding-top:10px;font-size:9px;opacity:0.7;border-top:1px solid rgba(255,255,255,0.1);}
footer a{color:#00d4ff;text-decoration:none;}
</style>
</head>
<body>
<div class="container">
    <img src="${l}" alt="${n}" class="logo">
    <h1>Obrigado por escolher ${n} 💛</h1>
    <p>${s}</p>
    <div class="estrelas">⭐⭐⭐⭐⭐</div>
    <a class="botao google" href="${g}" target="_blank">⭐ Avaliar no Google</a>
    ${w ? `<a class="botao whatsapp" href="https://wa.me/${w}" target="_blank">💬 Falar no WhatsApp</a>` : ''}
    ${ig ? `<a class="botao instagram" href="${ig}" target="_blank">📸 Seguir no Instagram</a>` : ''}
    <footer>
        <div>Qualidade • Confiança • Compromisso</div>
        <div>🔒 Site Seguro | Certificado SSL</div>
        <div style="margin-top:5px;">⚙️ Desenvolvido por <a href="https://wa.me/5511954950044" target="_blank">ImpulsoWeb10</a></div>
    </footer>
</div>
</body>
</html>`;

    document.getElementById('codeIndex').innerText = htmlPronto;
    
    // QR Code
    const qrDiv = document.getElementById('qrcode');
    qrDiv.innerHTML = "";
    new QRCode(qrDiv, { text: urlFinal, width: 150, height: 150 });
    document.getElementById('linkCurtoTxt').innerText = urlFinal;
    
    document.getElementById('result-area').style.display = 'block';
}

function copy(id) {
    const text = document.getElementById(id).innerText;
    navigator.clipboard.writeText(text).then(() => alert("Código copiado!"));
}
</script>
</body>
</html>
