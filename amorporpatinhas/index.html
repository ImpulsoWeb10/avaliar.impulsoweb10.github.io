<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avalie a Amor por Patinhas</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #e0f2f1;
            background-image: radial-gradient(at 0% 0%, hsla(160,100%,95%,1) 0, transparent 50%), 
                              radial-gradient(at 100% 100%, hsla(330,100%,98%,1) 0, transparent 50%);
            color: #334155; text-align: center; min-height: 100vh;
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }

        .container { 
            max-width: 400px; width: 100%; padding: 30px; 
            background-color: #f1f1f1; border-radius: 35px; 
            box-shadow: 20px 20px 60px #bebebe, -20px -20px 60px #ffffff;
        }
        
        .logo { width: 110px; height: 110px; object-fit: contain; border-radius: 50%; border: 4px solid #ff69b4; background: #ffffff; margin-bottom: 10px; }
        .nome-loja { font-family: 'Pacifico', cursive; font-size: 26px; color: #ff69b4; margin-bottom: 20px; }

        .rating-box { margin-bottom: 20px; display: flex; justify-content: center; gap: 10px; }
        .star-btn { font-size: 45px; color: #cbd5e1; cursor: pointer; transition: 0.3s; }
        .star-btn.active { color: #facc15; transform: scale(1.1); }

        /* MODAL (SEGUNDA TELA) */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none; align-items: center;
            justify-content: center; z-index: 1000; padding: 15px;
        }

        .modal-content {
            background: white; padding: 25px; border-radius: 30px;
            max-width: 380px; width: 100%; position: relative;
            animation: bounceIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1001;
        }

        @keyframes bounceIn { 0% { transform: scale(0.3); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        .logo-modal { width: 70px; height: 70px; margin: 0 auto 10px; display: block; border-radius: 50%; border: 2px solid #ff69b4; }
        .instrucao { font-weight: 700; font-size: 14px; margin-bottom: 15px; color: #0f172a; line-height: 1.4; }

        /* BOTÃO GOOGLE AMARELO PULSANDO */
        .btn-google {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            background: #facc15; color: #000; padding: 15px; font-weight: 800;
            border-radius: 15px; text-decoration: none; margin-bottom: 15px;
            animation: pulsarBotao 1.2s infinite ease-in-out; border: none; width: 100%; font-size: 14px;
        }

        @keyframes pulsarBotao { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        textarea { width: 100%; height: 60px; background: #f8fafc; border: 1px solid #cbd5e1; border-radius: 12px; padding: 10px; margin-bottom: 10px; outline: none; font-size: 13px; }
        .btn-whats { background: #22c55e; color: white; padding: 12px; width: 100%; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 10px; }

        /* IMAGEM VETERINÁRIA QUE CRESCE E PULSA */
        .img-vet { width: 100%; border-radius: 15px; margin-top: 15px; display: block; }
        .animar-vet { animation: vetCrescePulsa 2.5s infinite ease-in-out; }

        @keyframes vetCrescePulsa {
            0% { transform: scale(0.5); opacity: 0.7; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.9; }
        }

        .btn-fechar { background: none; border: none; color: #94a3b8; font-weight: 700; cursor: pointer; text-decoration: underline; font-size: 12px; }

        /* RODAPÉ COMPLETO */
        .footer { margin-top: 25px; font-size: 11px; color: #64748b; line-height: 1.6; border-top: 1px dashed #cbd5e1; padding-top: 15px; }
        .footer b { color: #334155; }
        .dev-box { margin-top: 10px; font-weight: bold; }
        .dev-link { color: #d97706; text-decoration: none; background: #fef3c7; padding: 3px 8px; border-radius: 5px; display: inline-block; margin-top: 5px; }
    </style>
</head>

<body>

<div class="container">
    <img src="logo.png" class="logo" alt="Logo">
    <div class="nome-loja">Amor por Patinhas</div>
    <h2>Avalie sua experiência! 🐾</h2>
    
    <div class="rating-box">
        <i class="fas fa-star star-btn" onclick="abrirModalFeedback(1)"></i>
        <i class="fas fa-star star-btn" onclick="abrirModalFeedback(2)"></i>
        <i class="fas fa-star star-btn" onclick="abrirModalFeedback(3)"></i>
        <i class="fas fa-star star-btn" onclick="abrirModalFeedback(4)"></i>
        <i class="fas fa-star star-btn" onclick="abrirModalFeedback(5)"></i>
    </div>

    <div class="footer">
        <p>Av. Turmalina, 855 - Estância Fraternidade</p>
        <p>Itaquaquecetuba - SP, 08589-000</p>
        <p>Contato: <b>011 4643-3909</b></p>
        <div class="dev-box">
            Desenvolvido por: ImpulsoWeb10 <br>
            <a href="https://wa.me/5511954950044?text=Olá! Gostaria de saber mais sobre seus serviços." target="_blank" class="dev-link">
                <i class="fab fa-whatsapp"></i> Saiba mais
            </a>
        </div>
    </div>
</div>

<div class="modal-overlay" id="modalFeedback">
    <div class="modal-content">
        <img src="logo.png" class="logo-modal" alt="Logo">
        
        <p class="instrucao">Clique no Botão amarelo "Avaliar no Google" ou deixe uma msg para o Gerente no WhatsApp.</p>

        <a href="https://g.page/r/CS5Xk3_P3_i7EAE/review" target="_blank" class="btn-google">
            <i class="fab fa-google"></i> AVALIAR NO GOOGLE
        </a>

        <textarea id="textoFeedback" placeholder="Sugestões ou críticas, relate aqui..."></textarea>
        
        <button onclick="enviarParaGerente()" class="btn-whats">
            <i class="fab fa-whatsapp"></i> ENVIAR PARA O GERENTE
        </button>
        
        <button class="btn-fechar" onclick="fecharModal()">Voltar</button>

        <img src="amor-por-patas.png" id="imgVet" class="img-vet" alt="amor-por-patas" onerror="this.src='https://via.placeholder.com/350x180?text=Equipe+Amor+por+Patinhas'">
    </div>
</div>

<script>
    let notaSugerida = 0;

    function abrirModalFeedback(n) {
        notaSugerida = n;
        
        // Pinta as estrelas no fundo
        document.querySelectorAll('.star-btn').forEach((s, i) => s.classList.toggle('active', i < n));
        
        const modal = document.getElementById('modalFeedback');
        const imagem = document.getElementById('imgVet');
        
        modal.style.display = 'flex';

        // PURPURINAS E ANIMAÇÃO SE FOR 4 OU 5 ESTRELAS
        if (n >= 4) {
            imagem.classList.add('animar-vet');
            soltarPurpurinas();
        } else {
            imagem.classList.remove('animar-vet');
        }
    }

    function soltarPurpurinas() {
        // Vários disparos para garantir que apareça na frente do modal
        var duration = 3 * 1000;
        var end = Date.now() + duration;

        (function frame() {
            confetti({
                particleCount: 7,
                angle: 60,
                spread: 55,
                origin: { x: 0, y: 0.6 },
                zIndex: 2000, // IMPORTANTE: Para ficar na frente do modal
                colors: ['#ff69b4', '#facc15', '#ffffff']
            });
            confetti({
                particleCount: 7,
                angle: 120,
                spread: 55,
                origin: { x: 1, y: 0.6 },
                zIndex: 2000,
                colors: ['#ff69b4', '#facc15', '#ffffff']
            });

            if (Date.now() < end) {
                requestAnimationFrame(frame);
            }
        }());
    }

    function fecharModal() {
        document.getElementById('modalFeedback').style.display = 'none';
        document.getElementById('imgVet').classList.remove('animar-vet');
    }

    function enviarParaGerente() {
        const msg = document.getElementById('textoFeedback').value;
        const link = `https://wa.me/5511955883909?text=` + encodeURIComponent(`Avaliação: ${notaSugerida} estrelas\nFeedback: ${msg}`);
        window.open(link, '_blank');
    }

    window.onclick = function(event) {
        if (event.target == document.getElementById('modalFeedback')) fecharModal();
    }
</script>

</body>
</html>
