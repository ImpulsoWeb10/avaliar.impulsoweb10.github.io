<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avalie a Amor por Patinhas</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #e0f2f1;
            background-image: radial-gradient(at 0% 0%, hsla(160,100%,95%,1) 0, transparent 50%), 
                              radial-gradient(at 100% 100%, hsla(330,100%,98%,1) 0, transparent 50%);
            color: #334155;
            text-align: center;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }

        .container { 
            max-width: 400px; width: 100%; padding: 40px 30px; 
            background-color: #f1f1f1;
            background-image: url("https://www.transparenttextures.com/patterns/p6.png");
            border: 2px solid #ffffff;
            border-radius: 35px; 
            box-shadow: 20px 20px 60px #bebebe, -20px -20px 60px #ffffff;
        }
        
        .logo { 
            width: 160px; height: 160px; object-fit: contain; padding: 5px; 
            border-radius: 50%; border: 4px solid #ff69b4; background: #ffffff; 
            box-shadow: 0 8px 20px rgba(255, 105, 180, 0.2); display: block; margin: 0 auto;
        }
        
        .nome-loja { 
            font-family: 'Pacifico', cursive; font-size: 32px; color: #ff69b4; 
            text-shadow: 2px 2px 0px #fff; margin-top: 10px; margin-bottom: 10px; 
        }

        h1 { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: #64748b; margin-bottom: 20px; font-weight: 700; }
        h2 { font-size: 22px; margin-bottom: 15px; font-weight: 700; color: #0f172a; }

        .rating-box { margin-bottom: 25px; display: flex; justify-content: center; gap: 8px; }
        .star-btn { font-size: 42px; color: #cbd5e1; cursor: pointer; transition: all 0.3s; }
        .star-btn.active { color: #facc15; transform: scale(1.2); }

        textarea {
            width: 100%; background: #ffffff; border: 1px solid #d1d5db;
            border-radius: 15px; padding: 15px; margin-bottom: 15px; 
            font-family: inherit; resize: none; outline: none; font-size: 14px;
        }

        .botao {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; padding: 18px; font-size: 16px; font-weight: 800;
            border-radius: 20px; border: none; cursor: pointer; text-decoration: none;
            transition: 0.3s;
        }

        .whatsapp { background: #22c55e; color: white; animation: pulsar 1.8s infinite; }
        @keyframes pulsar { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }

        .hidden { display: none; }

        .footer { margin-top: 40px; font-size: 12px; color: #64748b; border-top: 1px solid #e5e7eb; padding-top: 25px; }
        .ssl-msg { font-weight: bold; color: #059669; margin-bottom: 8px; display: block; }
        .hero-msg { font-weight: bold; color: #ff69b4; margin-bottom: 15px; font-size: 18px; }
        .dev-link { color: #f59e0b; text-decoration: none; font-weight: 800; }
    </style>
</head>

<body>

<div class="container">
    <div class="logo-box">
        <img src="logo.png" class="logo" alt="Logo" onerror="this.src='https://via.placeholder.com/160/FFFFFF/FF69B4?text=Patinhas'">
        <div class="nome-loja">Amor por Patinhas</div>
    </div>

    <h1>Feedback Oficial</h1>
    <h2 id="titulo-dinamico">Como foi sua experiência? 🐾</h2>

    <div class="rating-box">
        <i class="fas fa-star star-btn" onclick="selecionarNota(1)"></i>
        <i class="fas fa-star star-btn" onclick="selecionarNota(2)"></i>
        <i class="fas fa-star star-btn" onclick="selecionarNota(3)"></i>
        <i class="fas fa-star star-btn" onclick="selecionarNota(4)"></i>
        <i class="fas fa-star star-btn" onclick="selecionarNota(5)"></i>
    </div>

    <div id="feedback-area" class="hidden">
        <p style="font-weight: bold; margin-bottom: 10px;">Conte-nos o que achou:</p>
        <textarea id="texto-melhoria" placeholder="Escreva seu comentário aqui..."></textarea>
        
        <button onclick="enviarFeedbackDuplo()" class="botao whatsapp">
            <i class="fab fa-whatsapp"></i> ENVIAR AVALIAÇÃO
        </button>
        <p style="font-size: 11px; color: #94a3b8; margin-top: 10px;">
            Ao clicar, você será guiado para o WhatsApp e o Google.
        </p>
    </div>

    <div class="footer">
        <div id="msg-especial" class="hero-msg"></div>
        <span class="ssl-msg"><i class="fas fa-shield-alt"></i> SITE SEGURO - CERTIFICADO SSL</span>
        <div>Desenvolvido por: <a href="https://impulsoweb10.com.br/" target="_blank" class="dev-link">ImpulsoWeb10</a></div>
    </div>
</div>

<script>
    let notaSelecionada = 0;
    const urlGoogle = "https://g.page/r/CS5Xk3_P3_i7EAE/review";

    function selecionarNota(n) {
        notaSelecionada = n;
        const stars = document.querySelectorAll('.star-btn');
        const feedbackArea = document.getElementById('feedback-area');
        const msgEspecial = document.getElementById('msg-especial');

        stars.forEach((s, i) => {
            if (i < n) s.classList.add('active');
            else s.classList.remove('active');
        });

        feedbackArea.classList.remove('hidden');
        
        if (n >= 4) {
            msgEspecial.innerText = "Você é um herói dos animais! 🐾";
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
        } else {
            msgEspecial.innerText = "";
        }
    }

    function enviarFeedbackDuplo() {
        const texto = document.getElementById('texto-melhoria').value;
        const telefone = "5511954950044"; 
        const mensagem = encodeURIComponent(`Avaliação Amor por Patinhas: ${notaSelecionada} Estrelas\nComentário: ${texto}`);
        
        // 1. Abre o Google em uma aba nova
        window.open(urlGoogle, '_blank');

        // 2. Abre o WhatsApp (pode ser na mesma ou em outra aba)
        // Usamos um pequeno delay (delay) para garantir que o navegador não bloqueie o segundo popup
        setTimeout(() => {
            window.location.href = `https://wa.me/${telefone}?text=${mensagem}`;
        }, 500);
    }
</script>
</body>
</html>
