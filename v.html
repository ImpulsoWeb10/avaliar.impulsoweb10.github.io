<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliação Oficial</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --accent: #22c55e; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Quicksand', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 15px; background: #f1f5f9; transition: opacity 0.4s; opacity: 0; }
        body.visible { opacity: 1; }
        .container { max-width: 400px; width: 100%; padding: 40px 30px; border-radius: 40px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.3); background: #fff; }
        .logo { width: 110px; height: 110px; object-fit: cover; border-radius: 25px; border: 3px solid var(--accent); background: white; margin: 0 auto 15px; display: block; }
        h1 { font-size: 24px; margin-bottom: 5px; font-weight: 700; }
        h2 { font-size: 14px; color: var(--accent); margin-bottom: 25px; font-weight: 700; text-transform: uppercase; }
        .star-btn { font-size: 42px; color: #cbd5e1; cursor: pointer; transition: 0.3s; margin: 0 4px; }
        .star-btn.active { color: var(--accent); transform: scale(1.1); }
        .botao { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 18px; border-radius: 50px; font-weight: 800; text-decoration: none; margin-top: 15px; font-size: 15px; border: none; cursor: pointer; }
        .google { background: var(--accent); color: #000 !important; }
        .whatsapp { background: #25d366; color: white !important; }
        .hidden { display: none !important; }
        textarea { width: 100%; background: rgba(150,150,150,0.1); border: 1px solid rgba(150,150,150,0.2); border-radius: 15px; color: inherit; padding: 15px; margin-top: 15px; outline: none; font-family: inherit; }
    </style>
</head>
<body id="corpo">
<div class="container" id="box">
    <img src="" class="logo" id="imgLogo">
    <h1 id="nome"></h1>
    <h2 id="sub"></h2>
    <div id="etapa1">
        <p style="font-weight: 700; margin-bottom: 15px;">Como foi sua experiência?</p>
        <div class="rating">
            <i class="fas fa-star star-btn" onclick="votar(1)"></i>
            <i class="fas fa-star star-btn" onclick="votar(2)"></i>
            <i class="fas fa-star star-btn" onclick="votar(3)"></i>
            <i class="fas fa-star star-btn" onclick="votar(4)"></i>
            <i class="fas fa-star star-btn" onclick="votar(5)"></i>
        </div>
    </div>
    <div id="feedback-bom" class="hidden">
        <p style="font-weight: 700; margin-bottom: 10px;">Ficamos muito felizes! 🎉</p>
        <a id="linkG" href="#" target="_blank" class="botao google"><i class="fab fa-google"></i> AVALIAR NO GOOGLE</a>
    </div>
    <div id="feedback-ruim" class="hidden">
        <p style="font-weight: 700;">Sentimos muito. Como podemos melhorar?</p>
        <textarea id="msg" rows="3" placeholder="Sua mensagem..."></textarea>
        <button onclick="irWhats()" class="botao whatsapp"><i class="fab fa-whatsapp"></i> FALAR COM GERENTE</button>
    </div>
</div>

<script>
    window.onload = function() {
        const urlP = new URLSearchParams(window.location.search);
        const tId = urlP.get('t') || '2';
        const temas = {
            '1': { b: '#0f172a', c: '#1e293b', t: '#ffffff', a: '#facc15' }, // Dark Neon
            '2': { b: '#f1f5f9', c: '#ffffff', t: '#1e293b', a: '#22c55e' }, // Clean
            '3': { b: '#000000', c: '#111111', t: '#ffffff', a: '#d4af37' }, // Luxury Gold
            '4': { b: '#fff5f5', c: '#ffffff', t: '#1e293b', a: '#e11d48' }  // Red Modern
        };
        const sel = temas[tId] || temas['2'];
        document.body.style.backgroundColor = sel.b;
        document.getElementById('box').style.backgroundColor = sel.c;
        document.getElementById('box').style.color = sel.t;
        document.documentElement.style.setProperty('--accent', sel.a);
        document.getElementById('nome').innerText = urlP.get('n') || 'Empresa';
        document.getElementById('sub').innerText = urlP.get('s') || '';
        document.getElementById('imgLogo').src = urlP.get('l') || 'logo.png';
        try { document.getElementById('linkG').href = atob(urlP.get('g')); } catch(e) {}
        document.body.classList.add('visible');
    };
    function votar(n) {
        document.querySelectorAll('.star-btn').forEach((el, i) => i < n ? el.classList.add('active') : el.classList.remove('active'));
        setTimeout(() => {
            document.getElementById('etapa1').classList.add('hidden');
            if(n >= 4) {
                document.getElementById('feedback-bom').classList.remove('hidden');
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.8 } });
            } else { document.getElementById('feedback-ruim').classList.remove('hidden'); }
        }, 300);
    }
    function irWhats() {
        const urlP = new URLSearchParams(window.location.search);
        const m = document.getElementById('msg').value;
        const w = urlP.get('w');
        window.open(`https://wa.me/${w}?text=Feedback: ${encodeURIComponent(m)}`, '_blank');
    }
</script>
</body>
</html>
