<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="metaTitle">Avaliação Oficial</title>
    <meta name="description" id="metaDesc" content="Página oficial de feedback. Sua opinião ajuda a melhorar nossos serviços.">
    
    <script type="application/ld+json" id="schema-json"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root { --accent: #22c55e; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Quicksand', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 15px; background: #f1f5f9; transition: opacity 0.5s; opacity: 0; }
        body.visible { opacity: 1; }
        
        .container { max-width: 420px; width: 100%; padding: 40px 25px; border-radius: 40px; text-align: center; box-shadow: 0 25px 60px rgba(0,0,0,0.15); background: #fff; position: relative; }
        
        .logo { width: 100px; height: 100px; object-fit: cover; border-radius: 25px; border: 3px solid var(--accent); margin-bottom: 15px; background: #fff; }
        h1 { font-size: 22px; font-weight: 700; margin-bottom: 5px; color: inherit; }
        .subtitle { font-size: 13px; color: var(--accent); text-transform: uppercase; font-weight: 700; margin-bottom: 20px; }
        
        .star-btn { font-size: 42px; color: #cbd5e1; cursor: pointer; transition: 0.2s; margin: 0 4px; background: none; border: none; }
        .star-btn.active { color: var(--accent); transform: scale(1.1); }
        
        .btn-action { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 16px; border-radius: 50px; font-weight: 800; text-decoration: none; margin-top: 12px; transition: 0.3s; font-size: 14px; border: none; cursor: pointer; }
        .google { background: var(--accent); color: #000; }
        .whatsapp { background: #25d366; color: #fff; }
        .social-btn { background: #e2e8f0; color: #475569; font-size: 12px; padding: 10px; }
        
        .hidden { display: none !important; }
        
        /* Informações de Rodapé (SEO) */
        .footer-info { margin-top: 25px; font-size: 11px; color: #94a3b8; line-height: 1.4; border-top: 1px solid #f1f5f9; padding-top: 15px; }
        
        /* FAQ Oculto para Robôs */
        .faq-seo { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); }
    </style>
</head>
<body id="corpo">

<main class="container">
    <header>
        <img src="" class="logo" id="imgLogo" alt="Logo da Empresa">
        <h1 id="nome">...</h1>
        <p class="subtitle" id="sub"></p>
    </header>

    <section id="etapa1">
        <p style="font-weight: 700; margin-bottom: 15px;">Como foi sua experiência?</p>
        <div class="rating-area">
            <button class="fas fa-star star-btn" onclick="votar(1)"></button>
            <button class="fas fa-star star-btn" onclick="votar(2)"></button>
            <button class="fas fa-star star-btn" onclick="votar(3)"></button>
            <button class="fas fa-star star-btn" onclick="votar(4)"></button>
            <button class="fas fa-star star-btn" onclick="votar(5)"></button>
        </div>
    </section>

    <section id="feedback-bom" class="hidden">
        <p style="font-weight: 700; margin-bottom: 15px;">Ficamos muito felizes! 🎉</p>
        <a id="linkG" href="#" target="_blank" class="btn-action google"><i class="fab fa-google"></i> AVALIAR NO GOOGLE</a>
        
        <div id="extra-links" style="margin-top: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
            <a id="linkInsta" href="#" target="_blank" class="btn-action social-btn hidden"><i class="fab fa-instagram"></i> Instagram</a>
            <a id="linkMaps" href="#" target="_blank" class="btn-action social-btn hidden"><i class="fas fa-location-dot"></i> Como Chegar</a>
        </div>
    </section>

    <section id="feedback-ruim" class="hidden">
        <p style="font-weight: 700; margin-bottom: 10px;">Como podemos melhorar?</p>
        <textarea id="msg" rows="3" placeholder="Escreva aqui seu feedback..." style="width:100%; padding:12px; border-radius:15px; border:1px solid #e2e8f0; margin-bottom:10px; font-family: inherit;"></textarea>
        <button onclick="irWhats()" class="btn-action whatsapp"><i class="fab fa-whatsapp"></i> FALAR COM GERENTE</button>
    </section>

    <footer class="footer-info">
        <p id="txtEnd"></p>
        <p style="margin-top: 5px;">© <span id="ano"></span> <span id="nomeFooter"></span></p>
    </footer>

    <div class="faq-seo" id="faq-area"></div>
</main>

<script>
    const urlP = new URLSearchParams(window.location.search);
    
    window.onload = function() {
        const n = urlP.get('n') || 'Empresa Local';
        const s = urlP.get('s') || 'Avaliação Oficial';
        const t = urlP.get('t') || '2';
        const l = urlP.get('l') || 'logo.png';
        const ga = urlP.get('ga');
        const end = urlP.get('end');
        const ig = urlP.get('ig');
        const gmaps = urlP.get('gmaps');
        const faq = urlP.get('faq');

        // Configuração do Tema
        const temas = {
            '1': { b: '#0f172a', c: '#1e293b', t: '#ffffff', a: '#facc15' },
            '2': { b: '#f1f5f9', c: '#ffffff', t: '#1e293b', a: '#22c55e' },
            '3': { b: '#000000', c: '#111111', t: '#ffffff', a: '#d4af37' },
            '4': { b: '#fff5f5', c: '#ffffff', t: '#1e293b', a: '#e11d48' }
        };
        const sel = temas[t] || temas['2'];
        document.body.style.backgroundColor = sel.b;
        document.querySelector('.container').style.backgroundColor = sel.c;
        document.querySelector('.container').style.color = sel.t;
        document.documentElement.style.setProperty('--accent', sel.a);

        // Preenchimento de Dados
        document.getElementById('nome').innerText = n;
        document.getElementById('nomeFooter').innerText = n;
        document.getElementById('sub').innerText = s;
        document.getElementById('imgLogo').src = l;
        document.getElementById('ano').innerText = new Date().getFullYear();
        document.title = `Avaliar ${n} | Canal Oficial`;

        if(end) document.getElementById('txtEnd').innerText = end;
        if(ig) { document.getElementById('linkInsta').href = ig; document.getElementById('linkInsta').classList.remove('hidden'); }
        if(gmaps) { document.getElementById('linkMaps').href = gmaps; document.getElementById('linkMaps').classList.remove('hidden'); }
        
        try { document.getElementById('linkG').href = atob(urlP.get('g')); } catch(e) {}

        // Injeção de Analytics GA4
        if(ga && ga !== 'G-XXXXXXXXXX') {
            const script = document.createElement('script');
            script.src = `https://www.googletagmanager.com/gtag/js?id=${ga}`;
            document.head.appendChild(script);
            window.dataLayer = window.dataLayer || [];
            function gtag(){dataLayer.push(arguments);}
            gtag('js', new Date()); gtag('config', ga);
        }

        // SEO Semântico: FAQ e JSON-LD
        if(faq) {
            const faqList = faq.split(',');
            faqList.forEach(q => {
                const p = document.createElement('p');
                p.innerText = q.trim();
                document.getElementById('faq-area').appendChild(p);
            });
        }

        const schema = {
            "@context": "https://schema.org",
            "@type": "LocalBusiness",
            "name": n,
            "image": l,
            "address": { "@type": "PostalAddress", "streetAddress": end || "" }
        };
        document.getElementById('schema-json').text = JSON.stringify(schema);

        document.body.classList.add('visible');
    };

    function votar(n) {
        const stars = document.querySelectorAll('.star-btn');
        stars.forEach((s, i) => i < n ? s.classList.add('active') : s.classList.remove('active'));
        
        setTimeout(() => {
            document.getElementById('etapa1').classList.add('hidden');
            if(n >= 4) {
                document.getElementById('feedback-bom').classList.remove('hidden');
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.8 } });
            } else {
                document.getElementById('feedback-ruim').classList.remove('hidden');
            }
        }, 300);
    }

    function irWhats() {
        const w = urlP.get('w');
        const msg = document.getElementById('msg').value;
        window.open(`https://wa.me/${w}?text=Feedback: ${encodeURIComponent(msg)}`, '_blank');
    }
</script>
</body>
</html>
