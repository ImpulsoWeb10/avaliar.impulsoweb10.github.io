<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ocram Transporte Executivo | Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #fbbf24; }
        
        body {
            margin: 0; font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(-45deg, #0a0a0a, #1a1a1a, #161b22, #000000);
            background-size: 400% 400%; animation: grad 12s infinite;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; color: white; text-align: center;
            overscroll-behavior-y: contain; 
        }

        @keyframes grad { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

        .card {
            background: rgba(0, 0, 0, 0.75); padding: 40px 20px; border-radius: 40px;
            backdrop-filter: blur(20px); max-width: 360px; width: 92%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.9); border: 1px solid rgba(251, 191, 36, 0.2);
            position: relative; z-index: 1; margin: 20px 0;
        }

        /* LOGO RETANGULAR COM EFEITO DE LUZ */
        .logo-container {
            position: relative;
            display: inline-block;
            margin-bottom: 10px;
            overflow: hidden;
            border-radius: 8px;
        }
        
        .logo-container::after {
            content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 150px; height: 80px; background: var(--gold); filter: blur(50px);
            opacity: 0.4; z-index: -1; animation: glow 3s infinite alternate;
        }
        @keyframes glow { from { opacity: 0.2; scale: 1; } to { opacity: 0.5; scale: 1.2; } }

        .logo-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            z-index: 3;
            transform: skewX(-20deg);
            animation: shimmerLogo 5s infinite;
        }
        @keyframes shimmerLogo {
            0% { left: -150%; }
            20% { left: 150%; }
            100% { left: 150%; }
        }

        .logo { width: 180px; height: auto; position: relative; z-index: 2; display: block; }

        /* NOVO CONTAINER DE ANIMAÇÃO DINÂMICA */
        .dynamic-stage {
            width: 100%;
            height: 200px;
            border-radius: 20px;
            overflow: hidden;
            margin: 20px 0;
            position: relative;
            border: 1px solid rgba(255,255,255,0.1);
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Efeito de vinheta nas bordas */
        .dynamic-stage::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.7);
            pointer-events: none;
            z-index: 5;
        }

        /* Estilo para as Imagens (Invisíveis por padrão) */
        .stage-item {
            max-width: 100%;
            max-height: 100%;
            object-fit: cover;
            position: absolute;
            opacity: 0;
            transform: scale(0.1); /* Começa minúscula */
            transition: transform 1.5s ease-out, opacity 1s ease-in;
            z-index: 2;
        }

        /* Classe que ativa a animação de Zoom-In */
        .stage-item.animate-in {
            opacity: 1;
            transform: scale(1); /* Cresce até o tamanho normal */
        }

        /* Estilo para as Frases */
        .stage-phrase {
            position: absolute;
            width: 80%;
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 1s ease, transform 1s ease;
            z-index: 3;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }

        .stage-phrase.active {
            opacity: 1;
            transform: translateY(0);
        }

        .stage-phrase b {
            color: var(--gold);
        }

        /* BOTÃO E OUTROS ELEMENTOS (MANTIDOS) */
        .btn-google {
            position: relative; display: block; margin: 15px auto; padding: 18px;
            width: 90%; font-weight: 800; text-decoration: none; border-radius: 50px;
            background: var(--gold); color: #000; text-transform: uppercase; font-size: 13px;
            animation: pulse 2.5s infinite; border: none; cursor: pointer;
        }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.6); } 70% { box-shadow: 0 0 0 12px rgba(251, 191, 36, 0); } 100% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0); } }

        .social-row { display: flex; justify-content: center; gap: 12px; margin: 20px 0; }
        .icon-btn {
            width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            text-decoration: none; color: white; font-size: 20px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); transition: 0.3s;
        }
        .wa{background:#25D366;} .tel{background:#38bdf8;} .ig{background:linear-gradient(45deg,#833ab4,#fd1d1d,#fcb045);} .maps{background:#ea4335;}

        /* MODAL (MANTIDO) */
        #modal-info {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
            z-index: 999; display: flex; justify-content: center; align-items: center;
            opacity: 0; visibility: hidden; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #modal-info.active { opacity: 1; visibility: visible; }
        .modal-content {
            background: #111; width: 80%; max-width: 300px; padding: 35px 25px;
            border-radius: 40px; border: 1px solid var(--gold);
            text-align: center; transform: scale(0.7); transition: 0.4s; position: relative;
        }
        #modal-info.active .modal-content { transform: scale(1); }
        .modal-icon { font-size: 50px; color: var(--gold); margin-bottom: 20px; }
        .modal-text { font-size: 18px; font-weight: bold; color: #fff; margin-bottom: 20px; }

        .progress-bar { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--gold); width: 0%; }
        #modal-info.active .progress-fill { animation: fillProgress 4s linear forwards; }
        @keyframes fillProgress { from { width: 0%; } to { width: 100%; } }

        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 28px; color: #555; cursor: pointer; }

        /* RODAPÉ (MANTIDO) */
        .custom-footer { margin-top: 25px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; }
        .footer-link { color: #fff; text-decoration: none; font-size: 11px; line-height: 1.5; display: block; margin-bottom: 10px; }
        .footer-link b { color: var(--gold); font-size: 13px; }
        
        .ssl-info { font-size: 10px; opacity: 0.6; color: #fff; letter-spacing: 0.5px; }
        .ssl-info i { color: #2ecc71; margin-right: 4px; }
    </style>
</head>
<body>

<script>
    // CONFIGURAÇÃO DO PALCO DINÂMICO
    const stageData = [
        { type: 'image', src: 'tranfer1.png', alt: 'Veículo 1' },
        { type: 'phrase', text: 'Viagem <b>Tranquila</b>' },
        { type: 'image', src: 'tranfer2.png', alt: 'Veículo 2' },
        { type: 'phrase', text: 'Aqui você <b>chega bem</b>' },
        { type: 'image', src: 'tranfer3.png', alt: 'Veículo 3' },
        { type: 'phrase', text: 'Pontualidade <b>Absoluta</b>' },
        { type: 'image', src: 'tranfer4.png', alt: 'Veículo 4' },
        { type: 'phrase', text: 'Conforto <b>Premium</b>' },
        { type: 'image', src: 'tranfer5.png', alt: 'Veículo 5' },
        { type: 'phrase', text: 'Sua segurança <b>em 1º lugar</b>' },
        { type: 'image', src: 'tranfer6.png', alt: 'Veículo 6' },
        { type: 'phrase', text: 'Experiência <b>Exclusiva</b>' }
    ];

    const stage = document.getElementById('dynamicStage');
    let currentIndex = 0;

    // Função para criar e gerenciar o ciclo
    function runStageCycle() {
        // Limpa o palco anterior
        stage.innerHTML = '';
        const data = stageData[currentIndex];

        if (data.type === 'image') {
            const img = document.createElement('img');
            img.src = data.src;
            img.alt = data.alt;
            img.className = 'stage-item';
            stage.appendChild(img);
            
            // Ativa a animação de Zoom-In (crescer)
            setTimeout(() => img.classList.add('animate-in'), 100);
            
            // Tempo total da imagem na tela antes de passar para o próximo
            setTimeout(nextStep, 4000); 
        } else {
            const p = document.createElement('p');
            p.innerHTML = data.text;
            p.className = 'stage-phrase';
            stage.appendChild(p);
            
            // Ativa a frase
            setTimeout(() => p.classList.add('active'), 100);
            
            // Tempo total da frase na tela
            setTimeout(nextStep, 3000);
        }
    }

    function nextStep() {
        currentIndex = (currentIndex + 1) % stageData.length; // Ciclo infinito
        runStageCycle();
    }

    // Inicia o ciclo ao carregar a página
    runStageCycle();


    // FUNÇÕES DO MODAL E BOTÕES (MANTIDAS)
    let redirectTimer;
    const sound = document.getElementById('click-sound');

    function handleAction(event, frase, iconName) {
        event.preventDefault();
        const url = event.currentTarget.href;
        sound.currentTime = 0;
        sound.play();

        document.getElementById('m-text').innerText = frase;
        document.getElementById('m-icon').className = 'fas fa-' + iconName;
        document.getElementById('modal-info').classList.add('active');

        redirectTimer = setTimeout(() => {
            window.location.href = url;
        }, 4000);
    }

    function closeModal() {
        clearTimeout(redirectTimer);
        document.getElementById('modal-info').classList.remove('active');
    }
</script>

</body>
