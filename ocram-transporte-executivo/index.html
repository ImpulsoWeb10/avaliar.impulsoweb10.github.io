<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ocram Transporte Executivo | Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #fbbf24; }
        
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(-45deg, #0a0a0a, #1a1a1a, #262626, #000000);
            background-size: 400% 400%;
            animation: grad 12s infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
            text-align: center;
            overflow-x: hidden;
        }

        @keyframes grad { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

        .card {
            background: rgba(0, 0, 0, 0.6);
            padding: 30px 20px;
            border-radius: 30px;
            backdrop-filter: blur(15px);
            max-width: 360px;
            width: 92%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: up 0.8s ease-out;
            position: relative;
        }

        @keyframes up { from{opacity:0; transform:translateY(30px)} to{opacity:1; transform:translateY(0)} }

        /* LOGO COM LUZ ATRÁS */
        .logo-container {
            position: relative;
            display: inline-block;
            margin-bottom: 10px;
        }
        .logo-container::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background: var(--gold);
            filter: blur(40px);
            opacity: 0.4;
            z-index: -1;
            border-radius: 50%;
        }
        .logo { width: 110px; position: relative; z-index: 2; }

        /* CARROSSEL */
        .carousel-container {
            width: 100%;
            height: 180px;
            border-radius: 15px;
            overflow: hidden;
            margin: 15px 0;
            position: relative;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .carousel-track {
            display: flex;
            width: 600%; /* 6 fotos */
            height: 100%;
            animation: slide 18s infinite ease-in-out;
        }
        .carousel-track img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        @keyframes slide {
            0%, 14% { transform: translateX(0); }
            16%, 30% { transform: translateX(-16.66%); }
            32%, 46% { transform: translateX(-33.33%); }
            48%, 62% { transform: translateX(-50%); }
            64%, 78% { transform: translateX(-66.66%); }
            80%, 94% { transform: translateX(-83.33%); }
            100% { transform: translateX(0); }
        }

        .stars { color: var(--gold); font-size: 20px; margin-bottom: 10px; }

        /* BOTÃO PULSANTE COM BRILHO */
        .btn-google {
            position: relative;
            display: block;
            margin: 15px auto;
            padding: 16px;
            width: 90%;
            font-weight: 800;
            text-decoration: none;
            border-radius: 50px;
            background: var(--gold);
            color: #000;
            text-transform: uppercase;
            font-size: 14px;
            overflow: hidden;
            border: none;
            cursor: pointer;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(251, 191, 36, 0); }
            100% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0); }
        }
        .btn-google::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -60%;
            width: 20%;
            height: 200%;
            background: rgba(255,255,255,0.6);
            transform: rotate(30deg);
            animation: shine 3s infinite;
        }
        @keyframes shine {
            0% { left: -60%; }
            20% { left: 120%; }
            100% { left: 120%; }
        }

        .social-row { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
        .icon-btn {
            width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            text-decoration: none; color: white; font-size: 18px; transition: 0.3s;
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
        }
        .wa{background:#25D366;} .ig{background:linear-gradient(45deg,#833ab4,#fd1d1d,#fcb045);} 
        .fb{background:#1877F2;} .maps{background:#ea4335;} .tel{background:#38bdf8;}
        .icon-btn:hover { transform: translateY(-5px) scale(1.1); filter: brightness(1.2); }

        .endereco { font-size: 11px; opacity: 0.7; margin: 15px 0; line-height: 1.4; padding: 0 10px; }

        footer {
            margin-top: 20px; padding-top: 15px; font-size: 10px;
            border-top: 1px solid rgba(255,255,255,0.1); opacity: 0.6;
        }
        footer a { color: #38bdf8; text-decoration: none; font-weight: bold; }
    </style>
</head>
