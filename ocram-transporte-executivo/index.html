<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ocram Transporte Executivo | Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #fbbf24; }
        
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(-45deg, #0a0a0a, #1a1a1a, #161b22, #000000);
            background-size: 400% 400%;
            animation: grad 12s infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
            text-align: center;
            overflow-x: hidden;
        }

        @keyframes grad { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

        .card {
            background: rgba(0, 0, 0, 0.7);
            padding: 35px 20px;
            border-radius: 40px;
            backdrop-filter: blur(20px);
            max-width: 360px;
            width: 92%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.9);
            border: 1px solid rgba(251, 191, 36, 0.15);
            animation: up 1s ease-out;
            position: relative;
        }

        @keyframes up { from{opacity:0; transform:translateY(40px)} to{opacity:1; transform:translateY(0)} }

        /* LOGO COM LUZ DE FUNDO */
        .logo-container {
            position: relative;
            display: inline-block;
            margin-bottom: 5px;
        }
        .logo-container::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90px;
            height: 90px;
            background: var(--gold);
            filter: blur(45px);
            opacity: 0.35;
            z-index: -1;
            border-radius: 50%;
            animation: glow 4s infinite alternate;
        }
        @keyframes glow { from { opacity: 0.2; transform: translate(-50%, -50%) scale(1); } to { opacity: 0.5; transform: translate(-50%, -50%) scale(1.2); } }
        
        .logo { width: 120px; position: relative; z-index: 2; filter: drop-shadow(0 0 10px rgba(0,0,0,0.5)); }

        .seo-phrase {
            font-size: 11px;
            color: var(--gold);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            display: block;
            opacity: 0.9;
        }

        /* CONTAINER DO VÍDEO PREMIUM */
        .video-container {
            width: 100%;
            height: 190px;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 20px;
            position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
            background: #000; /* Fundo preto para o fade-out */
        }
        
        /* Efeito de vinheta nas bordas do vídeo */
        .video-container::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.8);
            pointer-events: none;
            z-index: 2;
        }

        .video-player {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 1;
            animation: taxiFade 6s infinite; /* Sincronizado com o tempo do vídeo */
            z-index: 1;
        }

        /* Animação de fade-out no final do vídeo */
        @keyframes taxiFade {
            0%, 70% { opacity: 1; } /* Fica visível a maior parte do tempo */
            90%, 100% { opacity: 0; } /* Desaparece no final do clipe */
        }

        .stars { color: var(--gold); font-size: 22px; margin-bottom: 15px; text-shadow: 0 0 10px rgba(251, 191, 36, 0.4); }

        /* BOTÃO GOOGLE PULSANTE */
        .btn-google {
            position: relative;
            display: block;
            margin: 10px auto 20px auto;
            padding: 18px;
            width: 90%;
            font-weight: 800;
            text-decoration: none;
            border-radius: 50px;
            background: var(--gold);
            color: #000;
            text-transform: uppercase;
            font-size: 14px;
            overflow: hidden;
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(251, 191, 36, 0.2);
            animation: pulse 2.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.6); }
            70% { transform: scale(1.02); box-shadow: 0 0 0 15px rgba(251, 191, 36, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(251, 191, 36, 0); }
        }

        .btn-google::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255,255,255,0.6), transparent);
            transition: all 0.5s;
            animation: shine 3.5s infinite;
        }

        @keyframes shine {
            0% { left: -100%; }
            25% { left: 100%; }
            100% { left: 100%; }
        }

        .social-row { display: flex; justify-content: center; gap: 12px; margin: 25px 0; }
        .icon-btn {
            width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            text-decoration: none; color: white; font-size: 20px; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15);
        }
        .wa{background:#25D366; box-shadow: 0 5px 15px rgba(37, 211, 102, 0.2);} 
        .ig{background:linear-gradient(45deg,#833ab4,#fd1d1d,#fcb045); box-shadow: 0 5px 15px rgba(253, 29, 29, 0.2);} 
        .fb{background:#1877F2; box-shadow: 0 5px 15px rgba(24, 119, 242, 0.2);} 
        .maps{background:#ea4335; box-shadow: 0 5px 15px rgba(234, 67, 53, 0.2);} 
        .tel{background:#38bdf8; box-shadow: 0 5px 15px rgba(56, 189, 248, 0.2);}

        .icon-btn:hover { transform: translateY(-8px) scale(1.15); filter: brightness(1.2); border-color: white; }

        .endereco { font-size: 11px; opacity: 0.8; margin: 15px 0; line-height: 1.6; padding: 0 10px; color: #e5e7eb; }

        footer {
            margin-top: 25px; padding-top: 15px; font-size: 10px;
            border-top: 1px solid rgba(255,255,255,0.1); opacity: 0.7;
        }
        footer a { color: var(--gold); text-decoration: none; font-weight: bold; }
    </style>
</head>

</div>

</body>
