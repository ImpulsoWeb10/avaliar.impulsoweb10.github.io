<!DOCTYPE html>

<head>
<meta charset="UTF-8">

<title>Hotel Flamboyant | Avaliação</title>

<style>
body{font-family:Arial;text-align:center;background:#ccffcc;margin:0}
.container{padding:30px}

/* LOGO ENTRANDO LATERAL */
.logo-wrap{position:relative;width:240px;height:120px;margin:0 auto 15px;overflow:hidden}
.logo-half{position:absolute;top:0;width:50%;height:100%;overflow:hidden}
.logo-left{left:-120px}
.logo-right{right:-120px}
.logo-half img{width:240px}

.logo-show .logo-left{animation:leftIn 2s forwards}
.logo-show .logo-right{animation:rightIn 2s forwards}

@keyframes leftIn{to{left:0}}
@keyframes rightIn{to{right:0}}

h1{font-size:22px}

/* ESTRELAS */
.stars{font-size:42px;margin-top:15px}
.star{cursor:pointer;margin:0 3px}
.star.white{color:#fff;text-shadow:0 0 5px #999}
.star.blue{color:#00aaff;animation:pulseBlue 1s infinite}

@keyframes pulseBlue{0%{text-shadow:0 0 5px #00aaff}50%{text-shadow:0 0 20px #00aaff}100%{text-shadow:0 0 5px #00aaff}}

.frase{margin-top:20px;font-size:14px;color:#333}
.counter{margin-top:10px;font-size:13px;color:#555}

/* BOTAO GOOGLE */
.google-btn{
 display:inline-block;
 margin-top:25px;
 padding:15px 25px;
 font-size:18px;
 background:yellow;
 color:#000;
 text-decoration:none;
 border-radius:10px;
 opacity:0;
 transform:scale(0.5);
}
.show{opacity:1;transform:scale(1);animation:pulse 1s infinite;transition:.4s}
@keyframes pulse{0%{box-shadow:0 0 10px yellow}50%{box-shadow:0 0 30px yellow}100%{box-shadow:0 0 10px yellow}}

/* RODAPE */
.footer{
 margin-top:30px;
 padding:15px;
 border-radius:12px;
 background:linear-gradient(90deg,#00ff99,#00cc66);
 color:#000;
 font-size:13px;
}
.footer a{color:#000;font-weight:bold;text-decoration:none}
</style>
</head>

<body>
<div class="container">

<div class="logo-wrap logo-show">
 <div class="logo-half logo-left"><img src="logo.jpeg"></div>
 <div class="logo-half logo-right"><img src="logo.jpeg"></div>
</div>

<h1>Como foi sua experiência?</h1>
<p>Hotel Flamboyant ⭐</p>

<div class="stars">
 <span class="star white" onclick="avaliar(1)">★</span>
 <span class="star white" onclick="avaliar(2)">★</span>
 <span class="star white" onclick="avaliar(3)">★</span>
 <span class="star white" onclick="avaliar(4)">★</span>

<p id="frase" class="frase"></p>
<p class="counter">⭐ +479 avaliações realizadas</p>

</div>

</div>

<audio id="audio"><source src="audio.m4a" type="audio/mp4"></audio>

<script>
const frases={
1:"Você sabia? Localização é um dos fatores mais importantes em hotéis.",
2:"Curiosidade: custo-benefício é o que mais atrai hóspedes hoje.",
3:"Conforto influencia diretamente na avaliação dos clientes.",
4:"Hotéis bem localizados recebem mais avaliações positivas.",

};

function avaliar(nota){

 document.getElementById("googleBtn").classList.add("show");
 if(navigator.vibrate){navigator.vibrate([50,30,80]);}
}
</script>

</body>
