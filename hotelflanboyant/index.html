<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotel Flamboyant | Avaliação</title>

<style>
/* TELA ESCURA */
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #121212; 
    color: #ffffff; 
    margin: 0; 
    min-height: 100vh; 
    display: flex; 
    flex-direction: column;
}
.container { padding: 30px; flex: 1; }

/* LOGO PREMIUM */
.logo-box {
    display: inline-block;
    padding: 15px;
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    margin-bottom: 20px;
}
.logo { max-width: 180px; }

h1 { font-size: 20px; }

/* ESTRELAS */
.stars { font-size: 45px; margin: 20px 0; }
.star { color: #444; transition: .3s; cursor: pointer; display: inline-block; }

/* EFEITO PULSAR NA ESTRELA CLICADA */
.pulsing { 
    animation: pulse-star 0.8s infinite; 
    color: gold !important; 
    text-shadow: 0 0 20px gold;
}
@keyframes pulse-star {
    0% { transform: scale(1); }
    50% { transform: scale(1.3); }
    100% { transform: scale(1); }
}

/* AREA DE FEEDBACK (ESCONDIDA INICIALMENTE) */
#feedbackArea {
    display: none;
    margin-top: 20px;
    animation: fadeIn 0.5s;
}

#feedbackText {
    width: 100%;
    max-width: 300px;
    height: 80px;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #333;
    background: #1e1e1e;
    color: #fff;
    font-size: 14px;
    margin-bottom: 15px;
}

/* BOTOES */
.btn-container { display: flex; flex-direction: column; gap: 10px; align-items: center; }

.btn-whatsapp {
    background: #25D366;
    color: #fff;
    padding: 15px 25px;
    text-decoration: none;
    border-radius: 10px;
    font-weight: bold;
    width: 250px;
    border: none;
    cursor: pointer;
}

.btn-google {
    background: #ffd700;
    color: #000;
    padding: 15px 25px;
    text-decoration: none;
    border-radius: 10px;
    font-weight: bold;
    width: 250px;
    animation: pulse-btn 1.5s infinite;
}

@keyframes pulse-btn {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
}

/* RODAPÉ */
footer { background: #000; padding: 15px; font-size: 12px; color: #888; border-top: 1px solid #222; margin-top: 40px;}
footer a { color: #ffd700; text-decoration: none; font-weight: bold; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>

<body>
<div class="container">

    <div class="logo-box">
        <img src="logo.jpeg" class="logo" alt="Hotel Flamboyant">
    </div>

    <h1>Como foi sua experiência?</h1>
    
    <div class="stars">
        <span class="star" onclick="avaliar(1, this)">★</span>
        <span class="star" onclick="avaliar(2, this)">★</span>
        <span class="star" onclick="avaliar(3, this)">★</span>
        <span class="star" onclick="avaliar(4, this)">★</span>
        <span class="star" onclick="avaliar(5, this)">★</span>
    </div>

    <div id="feedbackArea">
        <p id="msgInstrucao" style="color: gold; font-weight: bold;"></p>
        
        <textarea id="feedbackText" placeholder="Deixe aqui sua opinião ou sugestão..."></textarea>
        
        <div class="btn-container">
            <button class="btn-whatsapp" onclick="enviarWhatsapp()">ENVIAR NO WHATSAPP</button>
            <p style="margin: 5px 0; font-size: 12px; color: #888;">OU</p>
            <a href="https://g.page/r/ChIJUXWXBQC3zkQR0ndES89mRso/review" class="btn-google">AVALIAR NO GOOGLE</a>
        </div>
    </div>

</div>

<footer>
    Desenvolvido por: <a href="https://wa.me/5511954950044" target="_blank">Impulsoweb10</a>
</footer>

<script>
let notaSelecionada = 0;

function avaliar(nota, elemento) {
    notaSelecionada = nota;
    
    // Efeito nas estrelas
    document.querySelectorAll('.star').forEach(s => s.classList.remove('pulsing'));
    elemento.classList.add('pulsing');

    // Define a frase instrucional
    const msg = document.getElementById("msgInstrucao");
    if (nota <= 3) {
        msg.innerText = "Nos ajude a melhorar!";
    } else {
        msg.innerText = "Que ótimo! Conte-nos mais:";
    }

    // Mostra a área de feedback
    document.getElementById("feedbackArea").style.display = "block";
    
    if(navigator.vibrate){ navigator.vibrate(50); }
}

function enviarWhatsapp() {
    const texto = document.getElementById("feedbackText").value;
    const numero = "5511954950044";
    
    // Monta a mensagem para o WhatsApp
    let mensagem = `*Avaliação Hotel Flamboyant*%0A`;
    mensagem += `*Nota:* ${notaSelecionada} estrelas ⭐%0A`;
    mensagem += `*Comentário:* ${texto || "O cliente não deixou comentário."}`;

    window.open(`https://wa.me/${numero}?text=${mensagem}`, '_blank');
}
</script>

</body>
</html>
