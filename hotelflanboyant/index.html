<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotel Flamboyant | Avaliação</title>

<style>
    /* FUNDO VERDE NEON */
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        background: #39FF14; 
        margin: 0;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
    }

    .container {
        padding: 30px;
        flex: 1;
    }

    /* LOGO PREMIUM */
    .logo-box {
        display: inline-block;
        padding: 15px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(10px);
        box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        position: relative;
        overflow: hidden;
        margin-bottom: 20px;
    }
    .logo { max-width: 180px; }

    h1 { font-size: 22px; color: #000; margin-bottom: 5px; }

    /* ESTRELAS */
    .stars { font-size: 50px; margin: 20px 0; }
    .star { color: #444; transition: .3s; cursor: pointer; display: inline-block; }

    /* EFEITO PULSAR NA ESTRELA CLICADA */
    .pulsing { 
        animation: pulse-star 0.6s infinite; 
        color: #fff !important; 
        text-shadow: 0 0 15px #fff;
    }
    @keyframes pulse-star {
        0% { transform: scale(1); }
        50% { transform: scale(1.3); }
        100% { transform: scale(1); }
    }

    /* CAIXA DE DIÁLOGO / FRASE */
    .feedback-box {
        margin: 20px auto;
        padding: 15px;
        max-width: 300px;
        background: #000;
        color: #fff;
        border-radius: 10px;
        font-size: 15px;
        display: none; /* Escondido inicial */
        animation: fadeIn 0.5s;
    }

    /* BOTAO GOOGLE */
    #google-btn-container {
        display: none; /* Escondido inicial */
        margin-top: 20px;
    }
    .btn-google {
        display: inline-block;
        padding: 18px 30px;
        font-size: 18px;
        font-weight: bold;
        background: #fff;
        color: #000;
        text-decoration: none;
        border-radius: 50px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        animation: pulse-btn 1.5s infinite;
    }

    @keyframes pulse-btn {
        0% { transform: scale(1); box-shadow: 0 0 5px rgba(255,255,255,0.6); }
        50% { transform: scale(1.05); box-shadow: 0 0 20px rgba(255,255,255,0.8); }
        100% { transform: scale(1); box-shadow: 0 0 5px rgba(255,255,255,0.6); }
    }

    /* SANFONA */
    .accordion { margin: 40px auto; max-width: 350px; text-align: left; }
    .accordion-btn { 
        width: 100%; padding: 12px; border: none; 
        background: #000; color: #fff; border-radius: 8px; cursor: pointer;
    }
    .accordion-content { 
        display: none; background: rgba(255,255,255,0.9); 
        padding: 15px; border-radius: 0 0 8px 8px; font-size: 14px;
    }

    /* RODAPÉ */
    footer {
        background: #000;
        color: #fff;
        padding: 15px;
        font-size: 13px;
    }
    footer a { color: #39FF14; text-decoration: none; font-weight: bold; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>

<body>

<div class="container">
    <div class="logo-box">
        <img src="logo.jpeg" class="logo" alt="Hotel Flamboyant">
    </div>

    <h1>Como foi sua experiência?</h1>
    <p>Sua avaliação é muito importante!</p>

    <div class="stars">
        <span class="star" onclick="avaliar(1, this)">★</span>
        <span class="star" onclick="avaliar(2, this)">★</span>
        <span class="star" onclick="avaliar(3, this)">★</span>
        <span class="star" onclick="avaliar(4, this)">★</span>
        <span class="star" onclick="avaliar(5, this)">★</span>
    </div>

    <div id="feedbackBox" class="feedback-box"></div>
