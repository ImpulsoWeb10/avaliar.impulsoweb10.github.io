<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotel Flamboyant | Avaliação</title>

<style>
/* TELA ESCURA */
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #121212; 
    color: #ffffff; 
    margin: 0; 
    min-height: 100vh; 
    display: flex; 
    flex-direction: column;
}
.container { padding: 30px; flex: 1; }

/* LOGO PREMIUM */
.logo-box {
    display: inline-block;
    padding: 15px;
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    margin-bottom: 20px;
}
.logo { max-width: 160px; }

h1 { font-size: 20px; }

/* ESTRELAS */
.stars { font-size: 45px; margin: 20px 0; }
.star { color: #444; transition: .3s; cursor: pointer; display: inline-block; }

/* EFEITO PULSAR NA ESTRELA CLICADA */
.pulsing { 
    animation: pulse-star 0.8s infinite; 
    color: gold !important; 
    text-shadow: 0 0 20px gold;
}
@keyframes pulse-star {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.3); }
}

/* CAIXA DE TEXTO */
#feedbackArea { display: none; margin-top: 15px; animation: fadeIn 0.5s; }

#feedbackText {
    width: 100%; max-width: 300px; height: 80px;
    padding: 12px; border-radius: 10px; border: 1px solid #333;
    background: #1e1e1e; color: #fff; font-size: 14px;
}

/* BOTOES DINÂMICOS */
.btn-container { 
    display: flex; flex-direction: column; 
    gap: 15px; align-items: center; margin-top: 20px; 
}

/* Estilo Base */
.btn-base {
    text-decoration: none; font-weight: bold; 
    border-radius: 8px; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s;
}

/* Botão WhatsApp */
.btn-whatsapp { background: #25D366; color: #fff; }

/* Botão Google */
.btn-google { background: #ffd700; color: #000; }

/* CLASSES DE TAMANHO */
.btn-grande { width: 280px; height: 55px; font-size: 18px; animation: pulse-btn 1.5s infinite; }
.btn-pequeno { width: 180px; height: 35px; font-size: 12px; opacity: 0.7; }

@keyframes pulse-btn {
    0%, 100% { transform: scale(1); box-shadow: 0 0 5px rgba(255,215,0,0.2); }
    50% { transform: scale(1.03); box-shadow: 0 0 15px rgba(255,215,0,0.4); }
}

/* RODAPÉ */
footer { background: #000; padding: 15px; font-size: 11px; color: #555; border-top: 1px solid #222; }
footer a { color: #888; text-decoration: none; }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>

<body>
<div class="container">

    <div class="logo-box">
        <img src="logo.jpeg" class="logo">
    </div>

    <h1>Como foi sua estadia?</h1>
    
    <div class="stars">
        <span class="star" onclick="avaliar(1, this)">★</span>
        <span class="star" onclick="avaliar(2, this)">★</span>
        <span class="star" onclick="avaliar(3, this)">★</span>
        <span class="star" onclick="avaliar(4, this)">★</span>
        <span class="star" onclick="avaliar(5, this)">★</span>
    </div>

    <div id="feedbackArea">
        <p id="fraseDinamica" style="font-weight: bold; margin-bottom: 10px;"></p>
        <textarea id="feedbackText"></textarea>
        
        <div class="btn-container" id="btnContainer">
            </div>
    </div>

</div>

<footer>
    Desenvolvido por: <a href="https://wa.me/5511954950044" target="_blank">Impulsoweb10</a>
</footer>

<script>
let notaGlobal = 0;

function avaliar(nota, elemento) {
    notaGlobal = nota;
    document.querySelectorAll('.star').forEach(s => s.classList.remove('pulsing'));
    elemento.classList.add('pulsing');

    const area = document.getElementById("feedbackArea");
    const frase = document.getElementById("fraseDinamica");
    const container = document.getElementById("btnContainer");
    const campoTexto = document.getElementById("feedbackText");

    area.style.display = "block";

    // JOGADA: Notas 1 a 3 (Insatisfeito)
    if (nota <= 3) {
        frase.innerHTML = "Sentimos muito 😔<br><span style='font-size:14px; color:#aaa;'>Em que podemos melhorar?</span>";
        campoTexto.placeholder = "Conte-nos o que aconteceu...";
        
        // WhatsApp em destaque (Grande) e Google escondido (Pequeno)
        container.innerHTML = `
            <button class="btn-base btn-whatsapp btn-grande" onclick="enviar()">ENVIAR FEEDBACK NO WHATSAPP</button>
            <a href="https://g.page/r/ChIJUXWXBQC3zkQR0ndES89mRso/review" class="btn-base btn-google btn-pequeno">Avaliá no Google</a>
        `;
    } 
    // JOGADA: Notas 4 e 5 (Satisfeito)
    else {
        frase.innerHTML = "Que alegria! 😍<br><span style='font-size:14px; color:#aaa;'>Sua opinião nos ajuda muito!</span>";
        campoTexto.placeholder = "Deixe um elogio...";

        // Google em destaque (Grande) e WhatsApp secundário (Pequeno)
        container.innerHTML = `
            <a href="https://g.page/r/ChIJUXWXBQC3zkQR0ndES89mRso/review" class="btn-base btn-google btn-grande">AVALIAR NO GOOGLE AGORA</a>
            <button class="btn-base btn-whatsapp btn-pequeno" onclick="enviar()">Enviar pelo WhatsApp</button>
        `;
    }
}

function enviar() {
    const texto = document.getElementById("feedbackText").value;
    const msg = `*Feedback Hotel Flamboyant*%0A*Nota:* ${notaGlobal} Estrelas%0A*Comentário:* ${texto || 'Sem comentário.'}`;
    window.open(`https://wa.me/5511954950044?text=${msg}`, '_blank');
}
</script>

</body>
</html>
