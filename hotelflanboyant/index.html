<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotel Flamboyant em Itaquaquecetuba | Avaliação</title>

<style>
body{font-family:Arial;text-align:center;background:#f5f5f5;margin:0; min-height: 100vh; display: flex; flex-direction: column;}
.container{padding:30px; flex: 1;}

/* LOGO PREMIUM */
.logo-box{
 display:inline-block;
 padding:15px;
 border-radius:20px;
 background:rgba(255,255,255,0.6);
 backdrop-filter:blur(10px);
 box-shadow:0 4px 20px rgba(0,0,0,0.15);
 position:relative;
 overflow:hidden;
}
.logo-box::after{
 content:"";
 position:absolute;
 top:0;left:-100%;
 width:100%;height:100%;
 background:linear-gradient(120deg,transparent,rgba(255,255,255,0.7),transparent);
 animation:shine 3s infinite;
}
@keyframes shine{100%{left:100%}}
.logo{max-width:220px}

h1{font-size:22px}

/* ESTRELAS */
.stars{font-size:42px;margin-top:15px}
.star{color:#ccc;transition:.3s;cursor:pointer; display: inline-block;}
.star:hover{color:gold;transform:scale(1.3);text-shadow:0 0 10px gold}

/* EFEITO PULSAR NA ESTRELA CLICADA */
.pulsing { 
    animation: pulse-star 0.6s infinite; 
    color: gold !important; 
    text-shadow: 0 0 15px gold;
}
@keyframes pulse-star {
    0% { transform: scale(1); }
    50% { transform: scale(1.3); }
    100% { transform: scale(1); }
}

/* CAIXA DE MENSAGEM */
#feedbackMessage {
    margin: 20px auto;
    padding: 15px;
    max-width: 300px;
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 10px;
    font-size: 15px;
    font-weight: bold;
    display: none; /* Escondido inicial */
}

/* BOTAO GOOGLE */
#google-btn-container {
    display: none; /* Escondido inicial */
    margin-top: 20px;
}
.btn-google {
    display: inline-block;
    padding: 18px 30px;
    font-size: 18px;
    font-weight: bold;
    background: #222;
    color: #fff;
    text-decoration: none;
    border-radius: 10px;
    animation: pulse-btn 1s infinite;
}
@keyframes pulse-btn {
    0% { box-shadow: 0 0 5px #444; }
    50% { box-shadow: 0 0 20px #888; }
    100% { box-shadow: 0 0 5px #444; }
}

/* SANFONA */
.accordion{margin-top:25px;text-align:left;max-width:400px;margin:30px auto}
.accordion-btn{width:100%;padding:12px;border:none;background:#222;color:#fff;border-radius:8px; cursor: pointer;}
.accordion-content{display:none;background:#fff;padding:15px;border-radius:8px;margin-top:5px}

/* RODAPÉ */
footer { background: #eee; padding: 15px; font-size: 12px; color: #666; border-top: 1px solid #ddd; }
footer a { color: #000; text-decoration: none; font-weight: bold; }
</style>
</head>

<body>
<div class="container" id="container">

<div class="logo-box">
 <img src="logo.jpeg" class="logo">
</div>

<h1>Como foi sua experiência no Hotel Flamboyant?</h1>
<p>Hotel em Itaquaquecetuba ⭐</p>

<div class="stars">
 <span class="star" onclick="avaliar(1, this)">★</span>
 <span class="star" onclick="avaliar(2, this)">★</span>
 <span class="star" onclick="avaliar(3, this)">★</span>
 <span class="star" onclick="avaliar(4, this)">★</span>
 <span class="star" onclick="avaliar(5, this)">★</span>
</div>

<div id="feedbackMessage"></div>

<div id="google-btn-container">
    <a href="https://g.page/r/ChIJUXWXBQC3zkQR0ndES89mRso/review" class="btn-google">
        AVALIAR NO GOOGLE
    </a>
</div>

<div class="accordion">
 <button class="accordion-btn" onclick="toggleAccordion()">Ver diferenciais ▼</button>
 <div id="accordionContent" class="accordion-content">
  ✔ Ótima localização<br>
  ✔ Próximo à Santa Isabel<br>
  ✔ Conforto e tranquilidade<br>
  ✔ Excelente custo-benefício
 </div>
</div>

</div>

<footer>
    Desenvolvido por: <a href="https://wa.me/5511954950044" target="_blank">Impulsoweb10</a>
</footer>

<script>
function avaliar(nota, elemento) {
    // 1. Efeito visual nas estrelas
    document.querySelectorAll('.star').forEach(s => s.classList.remove('pulsing'));
    elemento.classList.add('pulsing');

    const msgBox = document.getElementById("feedbackMessage");
    const btnGoogle = document.getElementById("google-btn-container");

    // 2. Lógica de frases solicitada
    if (nota <= 3) {
        msgBox.innerHTML = "Nos ajude a melhorar!<br>Deixe aqui sua opinião.";
    } else {
        msgBox.innerHTML = "Clique em avaliar no Google e nos ajude com sua opinião.";
    }

    // 3. Faz aparecer os elementos
    msgBox.style.display = "block";
    btnGoogle.style.display = "block";

    // 4. Vibração (opcional)
    if(navigator.vibrate){ navigator.vibrate(50); }
}

function toggleAccordion(){
 const c=document.getElementById("accordionContent");
 c.style.display=c.style.display==="block"?"none":"block";
}
</script>

</body>
</html>
