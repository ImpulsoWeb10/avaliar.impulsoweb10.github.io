<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotel Flamboyant | Avaliação</title>

<style>
body{font-family:Arial;text-align:center;background:#ccffcc;margin:0}
.container{padding:30px}

/* LOGO */
.logo-box{margin-bottom:10px}
.logo{max-width:220px}

h1{font-size:22px}

/* ESTRELAS */
.stars{font-size:42px;margin-top:15px}
.star{color:#ccc;cursor:pointer;margin:0 4px;transition:.3s}
.star:hover{transform:scale(1.2)}
.star.blue{color:#00e5ff;animation:pulseBlue 1s infinite}

@keyframes pulseBlue{0%{text-shadow:0 0 5px #00e5ff}50%{text-shadow:0 0 20px #00e5ff}100%{text-shadow:0 0 5px #00e5ff}}

.frase{margin-top:20px;font-size:15px;color:#333;min-height:40px}

/* BOTAO GOOGLE */
.google-btn{
 display:inline-block;
 margin-top:25px;
 padding:15px 25px;
 font-size:18px;
 background:yellow;
 color:#000;
 text-decoration:none;
 border-radius:10px;
 opacity:0;
 transform:scale(0.5);
}
.show{opacity:1;transform:scale(1);animation:pulse 1s infinite;transition:.4s}
@keyframes pulse{0%{box-shadow:0 0 10px yellow}50%{box-shadow:0 0 30px yellow}100%{box-shadow:0 0 10px yellow}}

/* RODAPE */
.footer{
 margin-top:40px;
 padding:15px;
 border-radius:12px;
 background:linear-gradient(90deg,#ffd166,#ff9f1c);
 color:#000;
 font-size:13px;
}
.footer a{color:#000;font-weight:bold;text-decoration:none}
</style>
</head>

<body>
<div class="container">

<div class="logo-box">
 <img src="logo.jpeg" class="logo">
</div>

<h1>Como foi sua experiência no Hotel Flamboyant?</h1>
<p>Toque nas estrelas ⭐</p>

<div class="stars">
 <span class="star" onclick="avaliar(1)">★</span>
 <span class="star" onclick="avaliar(2)">★</span>
 <span class="star" onclick="avaliar(3)">★</span>
 <span class="star" onclick="avaliar(4)">★</span>
 <span class="star blue" onclick="avaliar(5)">★</span>
</div>

<p id="frase" class="frase"></p>

<a id="googleBtn" href="avaliar.html" class="google-btn">AVALIAR NO GOOGLE</a>

<div class="footer">
 <div style="margin-bottom:6px;font-weight:bold;">Gostaria de um link personalizado assim para sua empresa? <a href="https://wa.me/5511954950055">Saiba mais!</a></div>
 Desenvolvido por: <a href="https://wa.me/5511954950055">ImpulsoWeb10</a>
</div>

</div>

<audio id="audio"><source src="audio.m4a" type="audio/mp4"></audio>

<script>
const frases={
1:"A localização de um hotel impacta diretamente na experiência do hóspede.",
2:"Custo-benefício é um dos fatores mais avaliados por clientes.",
3:"Conforto e limpeza são essenciais para boas avaliações.",
4:"Um bom atendimento aumenta a chance de recomendação.",
5:"Avaliações positivas ajudam outros clientes a escolher melhor."
};

function avaliar(nota){
 document.getElementById("audio").play().catch(()=>{});
 document.getElementById("frase").innerText=frases[nota];
 document.getElementById("googleBtn").classList.add("show");
 if(navigator.vibrate){navigator.vibrate([50,30,80]);}
}
</script>

</body>
</html>
