<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotel Flamboyant | Avaliação</title>

<style>
/* TELA ESCURA PREMIUM */
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #0a0a0a; 
    color: #ffffff; 
    margin: 0; 
    min-height: 100vh; 
    display: flex; 
    flex-direction: column;
}
.container { padding: 20px; flex: 1; }

/* LOGO COM BRILHO PULSANTE */
.logo-box {
    display: inline-block;
    padding: 15px;
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.05);
    position: relative;
    overflow: hidden;
    margin-bottom: 10px;
    border: 1px solid rgba(255,255,255,0.1);
}
.logo-box::after {
    content: "";
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.4), transparent);
    animation: shine 2.5s infinite;
}
@keyframes shine { 100% { left: 100%; } }
.logo { max-width: 180px; }

h1 { font-size: 19px; margin: 10px 0; }

/* ESTRELAS */
.stars { font-size: 42px; margin: 15px 0; }
.star { color: #333; transition: .3s; cursor: pointer; display: inline-block; }

.pulsing { 
    animation: pulse-star 0.8s infinite; 
    color: #FFD700 !important; 
    text-shadow: 0 0 15px #FFD700;
}
@keyframes pulse-star { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }

/* AREA DINÂMICA */
#feedbackArea { display: none; animation: fadeIn 0.4s ease; margin-top: 10px; }

/* CAIXA DE DIÁLOGO DINÂMICA */
#feedbackText {
    width: 90%;
    max-width: 320px;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #444;
    background: #1a1a1a;
    color: #fff;
    font-size: 14px;
    transition: all 0.4s ease;
}

/* CLASSES DE PROPORÇÃO DA CAIXA */
.caixa-grande { height: 120px; border-color: #ff4444 !important; }
.caixa-pequena { height: 45px; opacity: 0.6; font-size: 12px !important; }

/* BOTÕES */
.btn-container { 
    display: flex; flex-direction: column; 
    gap: 12px; align-items: center; margin-top: 20px; 
}
.btn-base {
    text-decoration: none; font-weight: bold; 
    border-radius: 12px; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.btn-whatsapp { background: #25D366; color: #fff; }
.btn-google { background: #FFD700; color: #000; }

/* TAMANHOS DOS BOTÕES */
.btn-destaque { width: 280px; height: 58px; font-size: 17px; box-shadow: 0 5px 20px rgba(0,0,0,0.4); animation: pulse-btn 1.5s infinite; }
.btn-discreto { width: 160px; height: 35px; font-size: 11px; opacity: 0.5; }

@keyframes pulse-btn {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.04); }
}

footer { background: #000; padding: 15px; font-size: 11px; color: #444; border-top: 1px solid #111; }
footer a { color: #666; text-decoration: none; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>

<body>
<div class="container">

    <div class="logo-box">
        <img src="logo.jpeg" class="logo">
    </div>

    <h1>Como foi sua estadia?</h1>
    
    <div class="stars">
        <span class="star" onclick="avaliar(1, this)">★</span>
        <span class="star" onclick="avaliar(2, this)">★</span>
        <span class="star" onclick="avaliar(3, this)">★</span>
        <span class="star" onclick="avaliar(4, this)">★</span>
        <span class="star" onclick="avaliar(5, this)">★</span>
    </div>

    <div id="feedbackArea">
        <p id="fraseTopo" style="font-weight: bold; margin-bottom: 12px;"></p>
        
        <textarea id="feedbackText"></textarea>
        
        <div class="btn-container" id="btnContainer"></div>
    </div>

</div>

<footer>
    Desenvolvido por: <a href="https://wa.me/5511954950044" target="_blank">Impulsoweb10</a>
</footer>

<script>
let notaAtual = 0;

function avaliar(nota, elemento) {
    notaAtual = nota;
    document.querySelectorAll('.star').forEach(s => s.classList.remove('pulsing'));
    elemento.classList.add('pulsing');

    const area = document.getElementById("feedbackArea");
    const frase = document.getElementById("fraseTopo");
    const caixa = document.getElementById("feedbackText");
    const container = document.getElementById("btnContainer");

    area.style.display = "block";

    // ESTRATÉGIA NOTA 1-3 (RECLAMAÇÃO PRIVADA)
    if (nota <= 3) {
        frase.innerHTML = "Sentimos muito 😔 em que podemos melhorar?";
        
        // Caixa de texto ganha destaque (maior)
        caixa.className = "caixa-grande";
        caixa.placeholder = "Descreva aqui sua insatisfação para nossa gerência...";
        
        // Botão WhatsApp Gigante, Google vira link pequeno
        container.innerHTML = `
            <button class="btn-base btn-whatsapp btn-destaque" onclick="enviar()">ENVIAR PARA GERÊNCIA VIA WHATSAPP</button>
            <a href="https://g.page/r/ChIJUXWXBQC3zkQR0ndES89mRso/review" class="btn-base btn-google btn-discreto">Avaliar no Google</a>
        `;
    } 
    // ESTRATÉGIA NOTA 4-5 (SUCESSO PÚBLICO)
    else {
        frase.innerHTML = "Que alegria! 😍 nos ajude com sua nota:";
        
        // Caixa de texto fica pequena (secundária)
        caixa.className = "caixa-pequena";
        caixa.placeholder = "Deixe um elogio rápido (opcional)...";

        // Botão Google Gigante, WhatsApp vira link pequeno
        container.innerHTML = `
            <a href="https://g.page/r/ChIJUXWXBQC3zkQR0ndES89mRso/review" class="btn-base btn-google btn-destaque">FINALIZAR NO GOOGLE ⭐⭐⭐⭐⭐</a>
            <button class="btn-base btn-whatsapp btn-discreto" onclick="enviar()">Enviar Elogio via Whats</button>
        `;
    }
}

function enviar() {
    const texto = document.getElementById("feedbackText").value;
    const fone = "5511954950044";
    const msg = `*Relatório de Estadia*%0A*Estrelas:* ${notaAtual}%0A*Feedback:* ${texto || 'O cliente não digitou.'}`;
    window.open(`https://wa.me/${fone}?text=${msg}`, '_blank');
}
</script>

</body>
</html>
