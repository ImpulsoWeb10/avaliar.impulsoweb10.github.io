<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Óptica Lionda | Unidade II</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Quicksand', sans-serif; background: linear-gradient(135deg, #0f172a, #1e293b); color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 15px; }

        .container {
            max-width: 420px; width: 100%; background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(12px); padding: 30px 20px; border-radius: 35px;
            border: 1px solid rgba(255, 255, 255, 0.15); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            text-align: center; position: relative;
        }

        .logo-container {
            background: white; width: 160px; margin: 0 auto 15px; padding: 8px;
            border-radius: 20px; border: 3px solid #facc15; display: flex;
            align-items: center; justify-content: center; transition: 0.4s;
        }
        
        .logo { max-width: 100%; height: auto; display: block; }
        .logo-compacta { transform: scale(0.8); margin-bottom: -15px; }

        h1 { font-size: 26px; margin-bottom: 2px; }
        h2 { font-size: 16px; color: #facc15; margin-bottom: 20px; font-weight: normal; }
        
        #instrucao { font-size: 16px; font-weight: 700; color: #facc15; margin-bottom: 15px; min-height: 24px; }

        .rating-box { margin-bottom: 20px; display: flex; justify-content: center; gap: 8px; }
        .star-btn { font-size: 44px; color: #475569; cursor: pointer; transition: 0.3s; }
        .star-btn.active { color: #facc15; transform: scale(1.1); }

        /* ANIMAÇÃO DE CRESCER E PULSAR PARA A SEGUNDA TELA */
        .feedback-content {
            transform: scale(0);
            opacity: 0;
        }

        .animar-feedback {
            animation: crescerEPulsar 1.5s forwards ease-in-out;
        }

        @keyframes crescerEPulsar {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); opacity: 1; }
            70% { transform: scale(0.98); }
            100% { transform: scale(1); opacity: 1; }
        }

        .img-retangular {
            width: 100%; height: 140px; object-fit: cover; border-radius: 15px;
            margin: 0 auto 20px; border: 2px solid #facc15; display: block;
        }

        .btn-google {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; padding: 16px; border-radius: 50px; font-weight: 800;
            text-decoration: none; transition: 0.3s; border: none; cursor: pointer; 
            background: #facc15; color: #000; margin-bottom: 20px; font-size: 14px;
        }

        .social-row { 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
            margin-bottom: 20px; 
        }

        /* CONTAINER DOS BOTÕES COM LEGENDA */
        .btn-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .btn-round {
            display: flex; align-items: center; justify-content: center;
            width: 45px; height: 45px;
            border-radius: 50%;
            text-decoration: none; color: white;
            font-size: 20px;
            transition: transform 0.2s;
        }

        .btn-legend {
            font-size: 10px;
            font-weight: 700;
            color: #cbd5e1;
            text-transform: none;
        }

        .whatsapp { background-color: #25D366; }
        .phone { background-color: #00AEEF; }
        .instagram { background-color: #E1306C; }
        .maps { background-color: #EA4335; }

        textarea {
            width: 100%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3);
            border-radius: 15px; color: white; padding: 12px; margin-bottom: 12px; resize: none;
        }

        .btn-whatsapp-large {
            width: 100%; padding: 16px; border-radius: 50px; background: #25D366;
            color: white; font-weight: 800; border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .hidden { display: none; }

        .footer { margin-top: 25px; font-size: 12px; color: #cbd5e1; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; }
        .marca-impulsoweb { color: #22c55e; text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container" id="logo-wrap">
        <img src="logo.png" class="logo" id="main-logo" alt="Logo">
    </div>

    <h1>Óptica Lionda</h1>
    <h2>Unidade II</h2>
    
    <p id="instrucao">Como foi sua experiência hoje?</p>

    <div class="rating-box">
        <i class="fas fa-star star-btn" onclick="avaliar(1)"></i>
        <i class="fas fa-star star-btn" onclick="avaliar(2)"></i>
        <i class="fas fa-star star-btn" onclick="avaliar(3)"></i>
        <i class="fas fa-star star-btn" onclick="avaliar(4)"></i>
        <i class="fas fa-star star-btn" onclick="avaliar(5)"></i>
    </div>

    <div id="feedback-bom" class="hidden feedback-content">
        <img src="optica-lionda.png" class="img-retangular" alt="Sucesso">
        
        <a href="https://g.page/r/CYK6OdJELWHSEAE/review" target="_blank" class="btn-google">
            <i class="fab fa-google"></i> AVALIAR NO GOOGLE
        </a>

        <div class="social-row">
            <div class="btn-wrapper">
                <a href="https://wa.me/5511999822103" target="_blank" class="btn-round whatsapp">
                    <i class="fab fa-whatsapp"></i>
                </a>
                <span class="btn-legend">Whats</span>
            </div>
            <div class="btn-wrapper">
                <a href="tel:11999822103" class="btn-round phone">
                    <i class="fas fa-phone-alt"></i>
                </a>
                <span class="btn-legend">Ligar</span>
            </div>
            <div class="btn-wrapper">
                <a href="https://www.instagram.com/oticalionda/" target="_blank" class="btn-round instagram">
                    <i class="fab fa-instagram"></i>
                </a>
                <span class="btn-legend">Insta</span>
            </div>
            <div class="btn-wrapper">
                <a href="https://share.google/1wl0WlbIpAFRFYOVz" target="_blank" class="btn-round maps">
                    <i class="fas fa-map-marker-alt"></i>
                </a>
                <span class="btn-legend">Como chegar</span>
            </div>
        </div>
    </div>

    <div id="feedback-ruim" class="hidden feedback-content">
        <p style="margin-bottom: 12px; color: #facc15;" id="msg-desculpa"></p>
        <textarea id="texto-melhoria" rows="3" placeholder="Conte para nós como podemos melhorar..."></textarea>
        <button onclick="enviarWhatsApp()" class="btn-whatsapp-large">
            <i class="fab fa-whatsapp"></i> FALAR COM O GERENTE
        </button>
    </div>

    <div class="footer">
        <b>📍 Estr. Pedro da Cunha Albuquerque Lopes, 2235</b><br>
        (11) 99982-2103<br>
        <div style="margin-top: 15px;">
            © 2026 | Desenvolvido por <a href="https://wa.me/5511954950044" target="_blank" class="marca-impulsoweb">ImpulsoWeb10</a>
        </div>
    </div>
</div>

<script>
    let notaSelecionada = 0;
    const frasesDesculpas = { 1: "Sentimos muito. Vamos melhorar! 😔", 2: "Sentimos muito. Queremos ouvir você. 😟", 3: "Como podemos ser nota 10? 😐" };

    function avaliar(n) {
        notaSelecionada = n;
        document.querySelectorAll('.star-btn').forEach((s, i) => i < n ? s.classList.add('active') : s.classList.remove('active'));
        document.getElementById('logo-wrap').classList.add('logo-compacta');
        document.getElementById('instrucao').classList.add('hidden');

        const bom = document.getElementById('feedback-bom');
        const ruim = document.getElementById('feedback-ruim');

        if (n >= 4) {
            bom.classList.remove('hidden');
            ruim.classList.add('hidden');
            bom.classList.add('animar-feedback');
            confetti({ particleCount: 100, spread: 60, origin: { y: 0.8 } });
        } else {
            document.getElementById('msg-desculpa').innerText = frasesDesculpas[n];
            ruim.classList.remove('hidden');
            bom.classList.add('hidden');
            ruim.classList.add('animar-feedback');
        }
    }

    function enviarWhatsApp() {
        const texto = document.getElementById('texto-melhoria').value;
        if (!texto) { alert("Por favor, conte-nos como podemos melhorar."); return; }
        window.open(`https://wa.me/5511999822103?text=Feedback Unidade II (${notaSelecionada} estrelas): ${texto}`, '_blank');
    }
</script>

</body>
</html>
