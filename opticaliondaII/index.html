<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Óptica Lionda | Unidade II</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Quicksand', sans-serif; background: linear-gradient(135deg, #0f172a, #1e293b); color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 15px; }

        .container {
            max-width: 420px; width: 100%; background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(12px); padding: 25px 20px; border-radius: 35px;
            border: 1px solid rgba(255, 255, 255, 0.15); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            text-align: center; position: relative;
        }

        .logo-container {
            background: white; width: 150px; margin: 0 auto 15px; padding: 8px;
            border-radius: 20px; border: 3px solid #facc15; display: flex;
            align-items: center; justify-content: center; transition: 0.4s;
        }
        
        .logo { max-width: 100%; height: auto; display: block; }
        .logo-compacta { transform: scale(0.7); margin-bottom: -10px; }

        h1 { font-size: 24px; margin-bottom: 2px; }
        h2 { font-size: 15px; color: #facc15; margin-bottom: 15px; font-weight: normal; }
        
        #instrucao { font-size: 16px; font-weight: 700; color: #facc15; margin-bottom: 15px; }

        .rating-box { margin-bottom: 20px; display: flex; justify-content: center; gap: 8px; }
        .star-btn { font-size: 40px; color: #475569; cursor: pointer; transition: 0.3s; }
        .star-btn.active { color: #facc15; transform: scale(1.1); }

        /* GRID DE BOTÕES PEQUENOS E REDONDOS */
        .social-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px; 
            margin-top: 15px; 
        }

        .botao-redondo {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            aspect-ratio: 1 / 1; border-radius: 20px; font-weight: 700; font-size: 11px;
            text-decoration: none; transition: 0.3s; border: none; color: white;
            padding: 10px; text-transform: uppercase; gap: 5px;
        }

        .botao-redondo i { font-size: 24px; }

        .google { background: #facc15; color: #000; animation: pulsar 2s infinite; }
        .instagram { background: #E1306C; }
        .whatsapp { background: #22c55e; }
        .maps { background: #4285F4; }

        @keyframes pulsar {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .img-retangular {
            width: 100%; height: 120px; object-fit: cover; border-radius: 15px;
            margin-bottom: 15px; border: 2px solid #facc15; transform: scale(0);
            animation: crescer 0.5s forwards ease-out;
        }

        @keyframes crescer { to { transform: scale(1); } }

        textarea {
            width: 100%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3);
            border-radius: 15px; color: white; padding: 12px; margin-bottom: 12px; resize: none;
        }

        .btn-largo {
            width: 100%; padding: 15px; border-radius: 50px; background: #22c55e;
            color: white; font-weight: 800; border: none; cursor: pointer;
        }

        .hidden { display: none; }

        .footer { margin-top: 25px; font-size: 11px; color: #cbd5e1; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; }
        .marca-impulsoweb { color: #22c55e; text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container" id="logo-wrap">
        <img src="logo.png" class="logo" id="main-logo" alt="Logo">
    </div>

    <h1>Óptica Lionda</h1>
    <h2>Unidade II</h2>
    
    <p id="instrucao">Como foi sua experiência hoje?</p>

    <div class="rating-box">
        <i class="fas fa-star star-btn" onclick="avaliar(1)"></i>
        <i class="fas fa-star star-btn" onclick="avaliar(2)"></i>
        <i class="fas fa-star star-btn" onclick="avaliar(3)"></i>
        <i class="fas fa-star star-btn" onclick="avaliar(4)"></i>
        <i class="fas fa-star star-btn" onclick="avaliar(5)"></i>
    </div>

    <div id="feedback-bom" class="hidden">
        <img src="optica-lionda.png" class="img-retangular" alt="Sucesso">
        <div class="social-grid">
            <a href="https://share.google/1wl0WlbIpAFRFYOVz" target="_blank" class="botao-redondo google">
                <i class="fab fa-google"></i><span>Google</span>
            </a>
            <a href="https://www.instagram.com/oticalionda/" target="_blank" class="botao-redondo instagram">
                <i class="fab fa-instagram"></i><span>Instagram</span>
            </a>
            <a href="https://wa.me/5511999822103" target="_blank" class="botao-redondo whatsapp">
                <i class="fab fa-whatsapp"></i><span>WhatsApp</span>
            </a>
            <a href="https://share.google/1wl0WlbIpAFRFYOVz" target="_blank" class="botao-redondo maps">
                <i class="fas fa-map-marker-alt"></i><span>Maps</span>
            </a>
        </div>
    </div>

    <div id="feedback-ruim" class="hidden">
        <p style="margin-bottom: 12px; color: #facc15;" id="msg-desculpa"></p>
        <textarea id="texto-melhoria" rows="3" placeholder="Conte para nós como podemos melhorar..."></textarea>
        <button onclick="enviarWhatsApp()" class="btn-largo">
            <i class="fab fa-whatsapp"></i> FALAR COM O GERENTE
        </button>
    </div>

    <div class="footer">
        <b>📍 Estr. Pedro da Cunha Albuquerque Lopes, 2235</b><br>
        (11) 99982-2103<br>
        <div style="margin-top: 10px;">
            © 2026 | <a href="https://wa.me/5511954950044" target="_blank" class="marca-impulsoweb">ImpulsoWeb10</a>
        </div>
    </div>
</div>

<script>
    let notaSelecionada = 0;
    const frasesDesculpas = { 1: "Sentimos muito. Vamos melhorar! 😔", 2: "Sentimos muito. Queremos ouvir você. 😟", 3: "Como podemos ser nota 10? 😐" };

    function avaliar(n) {
        notaSelecionada = n;
        document.querySelectorAll('.star-btn').forEach((s, i) => i < n ? s.classList.add('active') : s.classList.remove('active'));
        document.getElementById('logo-wrap').classList.add('logo-compacta');
        document.getElementById('instrucao').classList.add('hidden');

        if (n >= 4) {
            document.getElementById('feedback-bom').classList.remove('hidden');
            document.getElementById('feedback-ruim').classList.add('hidden');
            confetti({ particleCount: 100, spread: 60, origin: { y: 0.8 } });
        } else {
            document.getElementById('msg-desculpa').innerText = frasesDesculpas[n];
            document.getElementById('feedback-ruim').classList.remove('hidden');
            document.getElementById('feedback-bom').classList.add('hidden');
        }
    }

    function enviarWhatsApp() {
        const texto = document.getElementById('texto-melhoria').value;
        if (!texto) { alert("Por favor, conte-nos como podemos melhorar."); return; }
        window.open(`https://wa.me/5511999822103?text=Feedback Unidade II (${notaSelecionada} estrelas): ${texto}`, '_blank');
    }
</script>

</body>
</html>
