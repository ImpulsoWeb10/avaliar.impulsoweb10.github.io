<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotoGestão Pro - V3.0</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --primary: #fbbf24; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --success: #22c55e; --danger: #ef4444; --accent: #6366f1; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; padding-bottom: 120px; }
        
        .header { text-align: center; padding: 10px 0; color: var(--primary); }
        .config-section { background: rgba(99, 102, 241, 0.1); border: 1px dashed var(--accent); padding: 15px; border-radius: 15px; margin-bottom: 15px; }
        
        .form-add { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid #334155; margin-bottom: 20px; }
        label { font-size: 11px; color: var(--primary); font-weight: bold; text-transform: uppercase; }
        input { width: 100%; padding: 12px; margin: 5px 0 10px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; font-size: 15px; box-sizing: border-box; }
        
        .btn-add { width: 100%; background: var(--primary); color: #000; border: none; padding: 16px; border-radius: 12px; font-weight: 900; cursor: pointer; }

        /* Lista de Entregas na Tela */
        .entrega-item { background: var(--card); padding: 12px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; border-left: 4px solid var(--primary); }

        /* Floating Menu */
        .fab { position: fixed; bottom: 90px; right: 20px; width: 60px; height: 60px; background: var(--accent); color: white; border-radius: 50%; border: none; font-size: 24px; z-index: 100; box-shadow: 0 5px 15px rgba(0,0,0,0.4); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200; align-items: flex-end; }
        .modal-content { background: var(--card); width: 100%; border-radius: 30px 30px 0 0; padding: 25px; box-sizing: border-box; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .menu-btn { background: #334155; border: none; padding: 15px; border-radius: 12px; color: white; display: flex; flex-direction: column; align-items: center; gap: 8px; font-size: 11px; font-weight: bold; }
        
        .summary-fixed { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--success); color: #000; padding: 15px; text-align: center; font-weight: 900; z-index: 90; }

        /* ESTILO DO RECIBO (EXCLUSIVO PARA PDF E IMAGEM) */
        #render-target { 
            position: absolute; left: -9999px; top: 0; /* Escondido da tela normal */
            width: 400px; background: white; color: black; padding: 30px; font-family: monospace; 
        }
        .recibo-header { border-bottom: 2px solid #000; text-align: center; margin-bottom: 15px; }
        .recibo-row { display: flex; justify-content: space-between; border-bottom: 1px dashed #eee; padding: 5px 0; }
        
        @media print {
            body * { display: none !important; }
            #render-target { position: static !important; display: block !important; width: 100% !important; margin: 0 !important; }
        }
    </style>
</head>
<body>

    <div class="header"><h1>MOTO GESTÃO PRO</h1></div>

    <div class="config-section">
        <label>Seu Nome / Nome da Empresa</label>
        <input type="text" id="empresa" placeholder="Sua Marca">
    </div>

    <div class="form-add">
        <label>Local / Cliente</label>
        <input type="text" id="cliente" placeholder="Ex: Pizzaria, Farmácia...">
        <div style="display:flex; gap:10px;">
            <div style="flex:1">
                <label>Valor R$</label>
                <input type="number" id="valor" placeholder="0,00">
            </div>
            <div style="flex:1">
                <label>KM</label>
                <input type="number" id="km" placeholder="KM">
            </div>
        </div>
        <button class="btn-add" onclick="lancar()">LANÇAR CORRIDA</button>
    </div>

    <div id="lista-tela"></div>

    <button class="fab" onclick="abrirMenu()"><i class="fas fa-bars"></i></button>

    <div class="summary-fixed" id="footer-lucro">LUCRO REAL: R$ 0,00</div>

    <div id="modalMenu" class="modal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="menu-grid">
                <button class="menu-btn" onclick="enviarZap()"><i class="fab fa-whatsapp" style="color:#25d366"></i>WHATSAPP</button>
                <button class="menu-btn" onclick="gerarPDF()"><i class="fas fa-file-pdf" style="color:#ef4444"></i>GERAR PDF</button>
                <button class="menu-btn" onclick="salvarImagem()"><i class="fas fa-image" style="color:#6366f1"></i>SALVAR IMAGEM</button>
                <button class="menu-btn" onclick="location.reload()"><i class="fas fa-sync"></i>RESETAR DIA</button>
            </div>
        </div>
    </div>

    <div id="render-target">
        <div class="recibo-header">
            <h2 id="rec-empresa">EMPRESA</h2>
            <p>RECIBO DE SERVIÇOS</p>
            <p id="rec-data"></p>
        </div>
        <div id="rec-corpo"></div>
        <div style="margin-top:15px; border-top: 2px solid #000; padding-top:10px;">
            <div class="recibo-row"><span>BRUTO:</span> <b id="rec-bruto"></b></div>
            <div class="recibo-row"><span>CUSTOS (GAS/MANUT):</span> <b id="rec-custo"></b></div>
            <div class="recibo-row" style="font-size:18px;"><span>LUCRO REAL:</span> <b id="rec-lucro"></b></div>
        </div>
        <p style="text-align:center; margin-top:30px;">____________________________<br>Assinatura</p>
    </div>

    <script>
        let dados = { faturamento: 0, km: 0, entregas: [] };

        function lancar() {
            const v = parseFloat(document.getElementById('valor').value);
            const k = parseFloat(document.getElementById('km').value);
            const c = document.getElementById('cliente').value || "Particular";

            if(!v || !k) return alert("Preencha Valor e KM!");

            dados.faturamento += v;
            dados.km += k;
            dados.entregas.push({cliente: c, valor: v, km: k});

            // Atualiza tela
            const item = document.createElement('div');
            item.className = 'entrega-item';
            item.innerHTML = `<div><b>${c}</b><br><small>${k} KM</small></div> <b>R$ ${v.toFixed(2)}</b>`;
            document.getElementById('lista-tela').prepend(item);

            atualizarCalculos();
            document.getElementById('valor').value = '';
            document.getElementById('km').value = '';
            document.getElementById('cliente').value = '';
        }

        function atualizarCalculos() {
            const custo = (dados.km / 35 * 5.80) + (dados.km * 0.15);
            const lucro = dados.faturamento - custo;
            document.getElementById('footer-lucro').innerText = `LUCRO REAL: R$ ${lucro.toFixed(2)}`;
            
            // Prepara área oculta para o PDF/Imagem
            document.getElementById('rec-empresa').innerText = document.getElementById('empresa').value || "MOTOBY";
            document.getElementById('rec-data').innerText = new Date().toLocaleString();
            document.getElementById('rec-bruto').innerText = `R$ ${dados.faturamento.toFixed(2)}`;
            document.getElementById('rec-custo').innerText = `R$ ${custo.toFixed(2)}`;
            document.getElementById('rec-lucro').innerText = `R$ ${lucro.toFixed(2)}`;
            
            let html = "";
            dados.entregas.forEach(e => {
                html += `<div class="recibo-row"><span>${e.cliente} (${e.km}km)</span> <span>R$ ${e.valor.toFixed(2)}</span></div>`;
            });
            document.getElementById('rec-corpo').innerHTML = html;
        }

        function abrirMenu() { document.getElementById('modalMenu').style.display = 'flex'; }

        function gerarPDF() { window.print(); }

        function salvarImagem() {
            const target = document.getElementById('render-target');
            target.style.position = "static";
            target.style.left = "0";
            
            html2canvas(target).then(canvas => {
                const link = document.createElement('a');
                link.download = `recibo-${Date.now()}.png`;
                link.href = canvas.toDataURL();
                link.click();
                target.style.position = "absolute";
                target.style.left = "-9999px";
            });
        }

        function enviarZap() {
            const resumo = encodeURIComponent(`🛵 *RESUMO DO DIA*\n\n💰 Bruto: R$ ${dados.faturamento.toFixed(2)}\n⛽ Custos: R$ ${(dados.km/35*5.80 + dados.km*0.15).toFixed(2)}\n✅ *Lucro Real: R$ ${(dados.faturamento - (dados.km/35*5.80 + dados.km*0.15)).toFixed(2)}*`);
            window.open(`https://wa.me/?text=${resumo}`);
        }
    </script>
</body>
</html>
