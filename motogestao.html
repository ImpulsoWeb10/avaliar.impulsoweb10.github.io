<!DOCTYPE html>
<html lang="pt-br">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XXXXXXXXXX');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotoGestão Pro v17 - ImpulsoWeb10</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { 
            --primary: #f58220; --secondary: #004a80; --bg: #0d1212; 
            --card: #1a2222; --text: #ffffff; --success: #22c55e; --danger: #ef4444;
        }
        @media (prefers-color-scheme: light) {
            :root { --bg: #f8f9fa; --card: #ffffff; --text: #1a2222; }
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; padding-bottom: 220px; transition: 0.3s; }
        
        /* HEADER V17 - RED LINE MÁXIMA */
        #header-principal {
            background: linear-gradient(135deg, #f58220 0%, #b35a00 100%); 
            padding: 35px 20px; border-radius: 0 0 45px 45px; margin: -15px -15px 20px -15px;
            display: flex; align-items: center; gap: 20px; border-bottom: 5px solid var(--secondary);
            box-shadow: 0 10px 30px rgba(245, 130, 32, 0.3);
        }

        .logo-box { 
            width: 100px; height: 100px; border-radius: 22px; border: 3px solid #fff; 
            position: relative; overflow: hidden; background: #fff; flex-shrink: 0;
        }
        .logo-box img { width: 100%; height: 100%; object-fit: cover; }
        .logo-box::after {
            content: ""; position: absolute; top: 0; left: -150%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
            transform: skewX(-20deg); animation: shine 3.5s infinite;
        }
        @keyframes shine { 0% { left: -150%; } 20% { left: 150%; } 100% { left: 150%; } }

        .red-line-text h2 { margin: 0; font-size: 22px; color: #000; font-weight: 900; line-height: 1.1; text-transform: uppercase; }
        .red-line-text p { margin: 8px 0 0; font-size: 14px; font-weight: 800; color: #fff; text-transform: uppercase; }

        /* DASHBOARD METAS */
        .meta-container { background: rgba(0,0,0,0.15); border-radius: 15px; padding: 12px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .meta-bar-bg { background: #333; height: 14px; border-radius: 7px; overflow: hidden; margin-top: 8px; }
        #meta-progress { background: var(--success); height: 100%; width: 0%; transition: 1s cubic-bezier(0.17, 0.67, 0.83, 0.67); box-shadow: 0 0 15px var(--success); }

        /* ALERTAS */
        .alerta-manutencao { background: var(--danger); color: white; padding: 12px; border-radius: 12px; font-weight: 900; text-align: center; margin-bottom: 15px; display: none; border: 2px solid #fff; }

        /* FORMULÁRIO */
        .form-add { background: var(--card); padding: 20px; border-radius: 25px; border: 1px solid rgba(51, 65, 85, 0.5); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        label { font-size: 10px; font-weight: 900; color: var(--primary); text-transform: uppercase; margin-top: 10px; display: block; }
        input, select { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #334155; background: #080c0c; color: #fff; margin-top: 5px; outline: none; }
        input:focus { border-color: var(--primary); }
        
        .btn-main { width: 100%; background: linear-gradient(90deg, var(--secondary), var(--primary)); color: #fff; border: none; padding: 18px; border-radius: 15px; font-weight: 900; text-transform: uppercase; margin-top: 15px; cursor: pointer; }
        
        /* LISTA DETALHADA */
        .entrega-card { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 10px; border-left: 5px solid var(--primary); font-size: 14px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .tag-gasto { color: var(--danger); font-size: 11px; display: block; margin-left: 12px; margin-top: 3px; font-weight: 600; }
        .tag-manut { color: #888; font-size: 11px; display: block; margin-left: 12px; font-style: italic; }

        /* FIXOS */
        .btn-sos { position: fixed; bottom: 85px; right: 20px; background: var(--danger); color: white; width: 55px; height: 55px; border-radius: 50%; border: 3px solid #fff; z-index: 1000; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .summary-fixed { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--secondary); color: #fff; padding: 20px; text-align: center; font-weight: 900; z-index: 90; border-top: 3px solid var(--primary); font-size: 20px; }
        .btn-fim { position: fixed; bottom: 85px; left: 15px; right: 85px; background: var(--danger); color: white; border: none; padding: 18px; border-radius: 15px; font-weight: 900; z-index: 80; text-transform: uppercase; }

        /* MODO FOCO */
        .modo-foco #header-principal { background: var(--bg); padding: 10px; border-radius: 0; justify-content: center; }
        .modo-foco .red-line-text, .modo-foco .meta-container { display: none; }
        .modo-foco .logo-box { width: 130px; height: 130px; }

        /* MODAIS */
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 2000; padding: 20px; flex-direction: column; align-items: center; overflow-y: auto; }
        .recibo-card { background: white; color: black; padding: 25px; border-radius: 5px; width: 100%; max-width: 380px; font-family: monospace; }
    </style>
</head>
<body id="body-app">

    <div id="conteudo">
        <header id="header-principal">
            <div class="logo-box"><img src="impulsoweb10.jpg" alt="Logo"></div>
            <div class="red-line-text">
                <h2>SISTEMA Nº1<br><span style="background:#000; color:#fff; padding: 0 6px; border-radius: 3px;">ELITE MOTO</span></h2>
                <p>PARE DE PERDER TEMPO E DINHEIRO!</p>
            </div>
        </header>

        <div id="aviso-oleo" class="alerta-manutencao">🚨 HORA DE TROCAR O ÓLEO! (1.000 KM RODADOS)</div>

        <div class="meta-container">
            <div style="display:flex; justify-content:space-between; font-size:12px; font-weight:900;">
                <span>META DIÁRIA</span>
                <span id="txt-meta">R$ 0 / R$ 200</span>
            </div>
            <div class="meta-bar-bg"><div id="meta-progress"></div></div>
        </div>

        <div class="form-add">
            <div style="display:flex; gap:10px; align-items: center;">
                <div style="flex:1"><label>Sua Meta Hoje R$</label><input type="number" id="meta-valor" value="200" onchange="atualizarMeta()"></div>
            </div>

            <label>Qual o destino / cliente?</label>
            <input type="text" id="cliente" placeholder="Ex: Ifood, Particular, Loggi..." onfocus="ativarModoFoco()" onblur="desativarModoFoco()">
            
            <div style="display:flex; gap:10px; margin-top:10px;">
                <div style="flex:1"><label>Ganho R$</label><input type="number" id="valor" placeholder="0.00" step="0.01"></div>
                <div style="flex:1"><label>KM Rodada</label><input type="number" id="km" placeholder="0"></div>
            </div>
            
            <label>Gasto Extra nesta entrega?</label>
            <div style="display:flex; gap:5px;">
                <input type="text" id="gasto-total-input" placeholder="R$ 0.00" readonly onclick="abrirModalGasto()" style="background:#000; cursor:pointer;">
                <button onclick="abrirModalGasto()" style="background:var(--danger); color:white; border:none; width:65px; height:45px; border-radius:12px; font-weight:bold; font-size:24px;">+</button>
            </div>
            
            <button class="btn-main" onclick="salvarEntrega()">SALVAR CORRIDA 💰</button>
        </div>

        <div id="lista-entregas" style="margin-top:20px;"></div>
        
        <button class="btn-main" style="background:#334155; margin-bottom: 20px;" onclick="verHistorico()">📁 VER HISTÓRICO DE DIAS ANTERIORES</button>
        
        <button class="btn-fim" onclick="gerarReciboFinal()">🚩 FINALIZAR DIA</button>
        <div class="summary-fixed" id="footer-lucro">LUCRO REAL: R$ 0,00</div>
    </div>

    <button class="btn-sos" onclick="sosGPS()"><i class="fas fa-bullhorn"></i></button>

    <audio id="audio-cash"><source src="https://assets.mixkit.co/active_storage/sfx/2017/2017-preview.mp3" type="audio/mpeg"></audio>

    <div id="modalGasto" class="overlay" style="justify-content:center;">
        <div class="form-add" style="width:100%; max-width:320px;">
            <h3 style="color:var(--danger); margin-top:0;">Lançar Despesa</h3>
            <select id="tipo-gasto"><option>Combustível</option><option>Pedágio</option><option>Refeição</option><option>Oficina</option><option>Outros</option></select>
            <input type="number" id="valor-gasto" placeholder="R$ 0.00" style="margin-top:15px;">
            <button class="btn-main" style="background:var(--danger)" onclick="addGastoLista()">ADICIONAR</button>
            <div id="preview-gastos" style="margin:15px 0; color:var(--danger); font-size:12px; font-weight:bold;"></div>
            <button class="btn-main" style="background:var(--success)" onclick="document.getElementById('modalGasto').style.display='none'">CONFIRMAR ✅</button>
        </div>
    </div>

    <div id="modalRecibo" class="overlay">
        <div id="recibo-area" class="recibo-card">
            <div style="text-align:center">
                <img src="impulsoweb10.jpg" style="width:60px; border-radius:10px;">
                <h3 style="margin:5px 0;">RELATÓRIO DE ELITE</h3>
                <small id="rec-data"></small>
            </div>
            <hr style="border:1px dashed #000;">
            <div id="rec-corpo"></div>
            <hr style="border:1px dashed #000;">
            <div id="rec-resumo"></div>
        </div>
        <div style="width:100%; max-width:380px; margin-top:15px;">
            <button class="btn-main" onclick="baixarPDF()">📥 BAIXAR PDF</button>
            <button class="btn-main" style="background:#25D366" onclick="enviarWhatsApp()">🟢 WHATSAPP DETALHADO</button>
            <button class="btn-main" style="background:var(--success)" onclick="arquivarEFechar()">💾 ARQUIVAR E ZERAR TUDO</button>
        </div>
    </div>

    <div id="modalHistorico" class="overlay">
        <div class="form-add" style="width:100%; max-width:350px;">
            <h2 style="color:var(--primary)">HISTÓRICO DE LUCRO</h2>
            <div id="lista-hist"></div>
            <button class="btn-main" onclick="document.getElementById('modalHistorico').style.display='none'">VOLTAR</button>
        </div>
    </div>

    <script>
        let entregas = JSON.parse(localStorage.getItem('moto_v17_data')) || [];
        let kmTotalApp = parseFloat(localStorage.getItem('moto_v17_km_total')) || 0;
        let historico = JSON.parse(localStorage.getItem('moto_v17_hist')) || [];
        let gastosTemp = [];
        let metaDiaria = 200;

        function ativarModoFoco() { document.getElementById('body-app').classList.add('modo-foco'); }
        function desativarModoFoco() { if(document.getElementById('cliente').value === "") document.getElementById('body-app').classList.remove('modo-foco'); }

        function atualizarMeta() {
            metaDiaria = parseFloat(document.getElementById('meta-valor').value) || 200;
            atualizarTela();
        }

        function abrirModalGasto() { document.getElementById('modalGasto').style.display = 'flex'; }

        function addGastoLista() {
            const v = parseFloat(document.getElementById('valor-gasto').value);
            const t = document.getElementById('tipo-gasto').value;
            if(!v) return;
            gastosTemp.push({tipo: t, valor: v});
            document.getElementById('preview-gastos').innerHTML += `<div>❌ ${t}: R$ ${v.toFixed(2)}</div>`;
            document.getElementById('gasto-total-input').value = `R$ ${gastosTemp.reduce((a,b)=>a+b.valor,0).toFixed(2)}`;
            document.getElementById('valor-gasto').value = '';
        }

        function sosGPS() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    const url = `https://www.google.com/maps?q=${lat},${lon}`;
                    window.open(`https://wa.me/?text=🚨 *PEDIDO DE AJUDA!* Localização atual: ${url}`);
                });
            } else { alert("GPS desativado."); }
        }

        function salvarEntrega() {
            const v = parseFloat(document.getElementById('valor').value) || 0;
            const k = parseFloat(document.getElementById('km').value) || 0;
            const c = document.getElementById('cliente').value || "Corrida";
            if(v <= 0) return alert("Insira o valor ganho!");

            const manut = k * 0.15;
            entregas.push({ 
                cliente: c, valor: v, km: k, 
                gastos: [...gastosTemp], 
                totalG: gastosTemp.reduce((a,b)=>a+b.valor,0), 
                manutencao: manut 
            });
            
            kmTotalApp += k;
            localStorage.setItem('moto_v17_data', JSON.stringify(entregas));
            localStorage.setItem('moto_v17_km_total', kmTotalApp);

            document.getElementById('audio-cash').play();
            
            // Verificação de Meta
            let brutoAtual = entregas.reduce((a,b)=>a+b.valor, 0);
            if(brutoAtual >= metaDiaria && (brutoAtual - v) < metaDiaria) {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            }

            gastosTemp = [];
            document.getElementById('cliente').value = ''; document.getElementById('valor').value = ''; 
            document.getElementById('km').value = ''; document.getElementById('gasto-total-input').value = '';
            document.getElementById('preview-gastos').innerHTML = '';
            document.getElementById('body-app').classList.remove('modo-foco');
            
            atualizarTela();
            gtag('event', 'salvar_corrida', { 'valor': v });
        }

        function atualizarTela() {
            const lista = document.getElementById('lista-entregas');
            lista.innerHTML = ""; let b=0, k=0, g=0, m=0;
            
            entregas.forEach(e => {
                b += e.valor; k += e.km; g += e.totalG; m += e.manutencao;
                let tagsG = e.gastos.map(gt => `<span class="tag-gasto">└ ${gt.tipo}: R$ ${gt.valor.toFixed(2)}</span>`).join('');
                lista.innerHTML += `<div class="entrega-card">
                    <div style="display:flex; justify-content:space-between;"><b>${e.cliente} (${e.km}km)</b><b style="color:var(--success)">R$ ${e.valor.toFixed(2)}</b></div>
                    ${tagsG}
                    <span class="tag-manut">└ Reserva Manut: R$ ${e.manutencao.toFixed(2)}</span>
                </div>`;
            });

            const gas = (k / 35 * 6.20);
            const lucro = b - gas - g - m;
            document.getElementById('footer-lucro').innerText = `LUCRO REAL: R$ ${lucro.toFixed(2)}`;

            // Barra Meta
            let perc = (b / metaDiaria) * 100;
            document.getElementById('meta-progress').style.width = Math.min(perc, 100) + "%";
            document.getElementById('txt-meta').innerText = `R$ ${b.toFixed(2)} / R$ ${metaDiaria}`;

            // Alerta Óleo
            if(kmTotalApp >= 1000) document.getElementById('aviso-oleo').style.display = 'block';
        }

        function gerarReciboFinal() {
            if(!entregas.length) return;
            document.getElementById('modalRecibo').style.display = 'flex';
            document.getElementById('rec-data').innerText = new Date().toLocaleString();
            let b=0, k=0, g=0, m=0, h = "";
            entregas.forEach(e => {
                b+=e.valor; k+=e.km; g+=e.totalG; m+=e.manutencao;
                h += `<div style="margin-bottom:8px;"><b>• ${e.cliente} (${e.km}km): R$ ${e.valor.toFixed(2)}</b><br>`;
                e.gastos.forEach(gt => h += `<span style="color:red; font-size:10px;">  - ${gt.tipo}: R$ ${gt.valor.toFixed(2)}</span><br>`);
                h += `</div>`;
            });
            const gas = (k / 35 * 6.20);
            document.getElementById('rec-corpo').innerHTML = h;
            document.getElementById('rec-resumo').innerHTML = `
                <div style="display:flex; justify-content:space-between;"><span>GANHO BRUTO:</span><b>R$ ${b.toFixed(2)}</b></div>
                <div style="display:flex; justify-content:space-between; color:red;"><span>GASTOS EXTRAS:</span><b>R$ ${g.toFixed(2)}</b></div>
                <div style="display:flex; justify-content:space-between; color:orange;"><span>GASOLINA:</span><b>R$ ${gas.toFixed(2)}</b></div>
                <div style="display:flex; justify-content:space-between; color:gray;"><span>MANUTENÇÃO:</span><b>R$ ${m.toFixed(2)}</b></div>
                <div style="background:#000; color:#fff; padding:10px; margin-top:10px; display:flex; justify-content:space-between; font-size:18px;"><span>LUCRO:</span><b>R$ ${(b-gas-g-m).toFixed(2)}</b></div>
            `;
            gtag('event', 'gerar_recibo');
        }

        function enviarWhatsApp() {
            let b=0, k=0, g=0, m=0, txt = `🏁 *EXTRATO ELITE MOTO*\n\n`;
            entregas.forEach(e => {
                txt += `📦 *${e.cliente}* (${e.km}km)\n💰 Ganhou: R$ ${e.valor.toFixed(2)}\n`;
                e.gastos.forEach(gt => txt += `❌ ${gt.tipo}: R$ ${gt.valor.toFixed(2)}\n`);
                b += e.valor; k += e.km; g += e.totalG; m += e.manutencao;
            });
            const gas = (k / 35 * 6.20);
            txt += `──────────────────\n📊 *RESUMO FINAL*\nBruto: R$ ${b.toFixed(2)}\nGasolina: R$ ${gas.toFixed(2)}\nFundo Oficina: R$ ${m.toFixed(2)}\n──────────────────\n✅ *LUCRO: R$ ${(b-gas-g-m).toFixed(2)}*`;
            window.open(`https://wa.me/?text=${encodeURIComponent(txt)}`);
        }

        function baixarPDF() {
            const { jsPDF } = window.jspdf;
            html2canvas(document.querySelector("#recibo-area")).then(canvas => {
                const pdf = new jsPDF('p', 'mm', 'a4');
                pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 10, 10, 180, 0);
                pdf.save(`Relatorio_Elite.pdf`);
            });
        }

        function arquivarEFechar() {
            historico.push({ data: new Date().toLocaleDateString(), lucro: document.getElementById('footer-lucro').innerText });
            localStorage.setItem('moto_v17_hist', JSON.stringify(historico));
            localStorage.removeItem('moto_v17_data');
            location.reload();
        }

        function verHistorico() {
            document.getElementById('modalHistorico').style.display = 'flex';
            document.getElementById('lista-hist').innerHTML = historico.map(h => `<div style="padding:15px; border-bottom:1px solid #334155; display:flex; justify-content:space-between;"><span>${h.data}</span> <b>${h.lucro}</b></div>`).join('');
        }
        
        atualizarTela();
    </script>
</body>
</html>
