<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotoGestão Pro v55 - Elite Platinum</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary: #f58220; --secondary: #004a80; --bg: #0d1212; --card: #1a2222; --text: #ffffff; --success: #22c55e; --danger: #ff0000; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; padding-bottom: 100px; }
        
        .red-line-box { border-bottom: 5px solid #ff0000 !important; margin-bottom: 5px; display: inline-block; }
        .red-line-text { font-weight: 950 !important; color: #ffffff !important; text-transform: uppercase; font-size: 18px; letter-spacing: 1px; }

        #tela-login { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #444; background: #000; color: #fff; margin-top: 5px; box-sizing: border-box; }
        .btn-main { width: 100%; background: linear-gradient(90deg, var(--secondary), var(--primary)); color: #fff; border: none; padding: 16px; border-radius: 12px; font-weight: 900; text-transform: uppercase; cursor: pointer; margin-top: 10px; }
        
        #header-principal { background: linear-gradient(135deg, #f58220 0%, #b35a00 100%); padding: 15px; border-radius: 0 0 25px 25px; display: flex; align-items: center; gap: 10px; border-bottom: 3px solid var(--secondary); transition: 0.3s; }
        #status-tag { display: none; background: var(--success); color: #000; font-size: 11px; font-weight: 900; padding: 4px 10px; border-radius: 20px; text-transform: uppercase; border: 2px solid #fff; }

        .meta-container { background: #000; border-radius: 10px; height: 12px; margin: 10px 0; overflow: hidden; border: 1px solid #333; }
        #meta-bar { background: var(--success); width: 0%; height: 100%; transition: 0.5s; box-shadow: 0 0 10px var(--success); }

        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 5000; padding: 20px; flex-direction: column; overflow-y: auto; align-items: center; justify-content: center; }
        
        #recibo-visual { background: #fff; color: #000; padding: 20px; width: 100%; max-width: 280px; font-family: 'Courier New', monospace; font-size: 12px; line-height: 1.2; }
        .gasto-vermelho { color: #ff0000; font-weight: bold; }
        .divisor { border-top: 1px dashed #000; margin: 8px 0; }
        
        .summary-fixed { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--secondary); color: #fff; padding: 15px; text-align: center; z-index: 90; border-top: 4px solid var(--primary); font-weight: bold; font-size: 18px; }
        
        .btn-small { background: #1a2222; color: #666; border: 1px solid #333; padding: 5px 10px; border-radius: 5px; font-size: 9px; cursor: pointer; margin-top: 15px; text-transform: uppercase; }
        .hist-card { background: #1a2222; padding: 10px; border-radius: 10px; margin-bottom: 8px; border-left: 4px solid var(--success); text-align: left; width: 100%; box-sizing: border-box;}
    </style>
</head>
<body>

    <audio id="som-money" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2017/2017-preview.mp3" type="audio/mpeg">
    </audio>

    <div id="tela-login">
        <img src="impulsoweb10.jpg" style="width: 80px; border-radius: 10px; margin-bottom: 15px;">
        <div class="red-line-box"><span class="red-line-text">SISTEMA DE GESTÃO DE ELITE</span></div>
        <p style="font-size: 10px; color: #aaa; font-weight: bold; margin-top: 5px;">NÃO PERCA TEMPO NEM DINHEIRO, GESTÃO É A CHAVE DO LUCRO</p>
        <p style="font-size: 12px; color: var(--primary); font-weight: 900; margin-bottom: 20px;">IMPULSO WEB 10</p>
        
        <div id="login-primeiro" style="width: 100%; max-width: 280px;">
            <input type="text" id="login-nome" placeholder="Seu Nome Completo">
            <input type="tel" id="login-celular" placeholder="WhatsApp">
            <button class="btn-main" onclick="primeiroAcesso()">SOLICITAR ACESSO ➔</button>
        </div>

        <div id="login-recorrente" style="display:none; width: 100%; max-width: 280px;">
            <button class="btn-main" onclick="entrarPainel()">ACESSAR MEU PAINEL ➔</button>
        </div>
    </div>

    <div id="app" style="display:none;">
        <header id="header-principal">
            <img src="impulsoweb10.jpg" style="width: 40px; border-radius: 8px; border: 1px solid #fff;">
            <div id="status-container">
                <div class="red-line-box" id="box-titulo"><span class="red-line-text" style="font-size: 12px;">IMPULSO WEB 10</span></div>
                <div id="status-tag"></div>
            </div>
        </header>

        <div style="background: var(--card); padding:15px; border-radius:15px; margin-top:10px; border:1px solid #333;">
            <div class="meta-container"><div id="meta-bar"></div></div>
            
            <input type="text" id="cidade" placeholder="Cidade / Destino" onfocus="ficarOnline()">
            
            <select id="cliente" onchange="togglePacotes()">
                <option value="Avulso">Serviço Avulso</option>
                <option value="Shopee">Shopee</option>
                <option value="Mercado Livre">Mercado Livre</option>
            </select>

            <div id="area-pacotes" style="display:none; margin-top:10px; background:rgba(255,165,0,0.05); padding:10px; border-radius:10px;">
                <div style="display:flex; gap:5px;">
                    <input type="number" id="qtd-pacotes" placeholder="Qtd" oninput="calcAutom()">
                    <input type="number" id="val-unitario" value="2.50" oninput="calcAutom()">
                </div>
            </div>

            <div style="display:flex; gap:5px; margin-top:10px;">
                <input type="number" id="valor" placeholder="R$ Ganho">
                <input type="number" id="km" placeholder="KM Rota">
            </div>

            <button class="btn-main" style="background:#333; font-size: 12px;" onclick="abrirModalGastos()">➕ LANÇAR GASTOS EXTRAS (HOJE)</button>
            <button class="btn-main" onclick="registrarOperacao()">REGISTRAR OPERAÇÃO 💰</button>
            
            <center><button class="btn-small" onclick="abrirHistorico()">📊 Histórico</button></center>
        </div>

        <div id="lista" style="margin-top:10px;"></div>
        
        <button class="btn-main" style="background:var(--danger); margin-top:20px;" onclick="gerarFechamento()">🚩 FECHAR EXPEDIENTE</button>
        <div class="summary-fixed" id="resumo-lucro">LUCRO: R$ 0,00</div>
    </div>

    <div id="modalHistorico" class="overlay">
        <div style="background:var(--card); padding:20px; border-radius:20px; width:90%; border:1px solid #444; max-height: 80vh; overflow-y: auto;">
            <h3 style="color:var(--primary); margin-top:0;">HISTÓRICO DE LUCROS</h3>
            <div id="lista-historico-itens"></div>
            <button class="btn-main" style="background:#333;" onclick="document.getElementById('modalHistorico').style.display='none'">FECHAR</button>
        </div>
    </div>

    <div id="modalGastos" class="overlay">
        <div style="background:var(--card); padding:20px; border-radius:20px; width:85%; border:2px solid var(--primary);">
            <select id="tipo-gasto">
                <option value="Almoço">Almoço</option>
                <option value="Gasolina Extra">Gasolina Extra</option>
                <option value="Pedágio">Pedágio</option>
                <option value="Lanche">Lanche/Água</option>
            </select>
            <input type="number" id="valor-gasto" placeholder="Valor R$">
            <button class="btn-main" onclick="addGastoTemp()">+ ADICIONAR MAIS</button>
            <button class="btn-main" style="background:var(--success);" onclick="document.getElementById('modalGastos').style.display='none'">OK, VOLTAR</button>
            <div id="lista-gastos-temp" style="font-size:11px; color:#aaa; margin-top:10px;"></div>
        </div>
    </div>

    <div id="modalRecibo" class="overlay">
        <div id="recibo-visual">
            <div style="text-align:center; font-weight:bold; font-size:16px;">COMPROVANTE</div>
            <div style="text-align:center;"><small id="rec-data"></small></div>
            <div class="divisor"></div>
            <div id="rec-lista"></div>
            <div class="divisor"></div>
            <div id="rec-calculos"></div>
            <div style="background:#000; color:#fff; text-align:center; padding:10px; margin-top:10px; font-weight:bold;">
                LUCRO LÍQUIDO: <span id="rec-total"></span>
            </div>
            <div style="text-align:center; margin-top:15px; font-weight:bold;">IMPULSO WEB 10</div>
        </div>
        <button class="btn-main" style="background:#fff; color:#000;" onclick="exportPDF()">📥 SALVAR PDF</button>
        <button class="btn-main" style="background:#25D366;" onclick="exportZap()">🟢 ENVIAR WHATSAPP</button>
        <button class="btn-main" style="background:var(--danger);" onclick="encerrarDia()">⚠️ ENCERRAR E LIMPAR DIA</button>
    </div>

    <script>
        let entregas = [];
        let gastosTemp = [];
        let user = JSON.parse(localStorage.getItem('user_elite_v55'));

        if(user) {
            document.getElementById('login-primeiro').style.display = 'none';
            document.getElementById('login-recorrente').style.display = 'block';
        }

        function primeiroAcesso() {
            let n = document.getElementById('login-nome').value;
            let c = document.getElementById('login-celular').value;
            if(!n || !c) return alert("Preencha Nome e Zap!");
            user = {nome: n, zap: c};
            localStorage.setItem('user_elite_v55', JSON.stringify(user));
            window.open(`https://wa.me/5511954950044?text=${encodeURIComponent("🚀 NOVO PILOTO\nNOME: "+n+"\nZAP: "+c)}`);
            entrarPainel();
        }

        function entrarPainel() {
            document.getElementById('tela-login').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            document.getElementById('som-money').play().then(() => document.getElementById('som-money').pause());
        }

        function ficarOnline() {
            document.getElementById('box-titulo').style.display = 'none';
            let tag = document.getElementById('status-tag');
            tag.style.display = 'inline-block';
            tag.innerText = `● ONLINE: ${user.nome.toUpperCase()}`;
        }

        function togglePacotes() {
            let cli = document.getElementById('cliente').value;
            // AGORA SHOPEE E MERCADO LIVRE ATIVAM OS PACOTES
            document.getElementById('area-pacotes').style.display = (cli === 'Avulso' ? 'none' : 'block');
            document.getElementById('valor').readOnly = (cli !== 'Avulso');
            if(cli === 'Avulso') {
                document.getElementById('qtd-pacotes').value = '';
                document.getElementById('valor').value = '';
            }
        }

        function calcAutom() {
            let q = parseFloat(document.getElementById('qtd-pacotes').value) || 0;
            let u = parseFloat(document.getElementById('val-unitario').value) || 0;
            document.getElementById('valor').value = (q * u).toFixed(2);
        }

        function abrirModalGastos() { document.getElementById('modalGastos').style.display = 'flex'; }
        
        function addGastoTemp() {
            let v = parseFloat(document.getElementById('valor-gasto').value) || 0;
            if(v > 0) {
                gastosTemp.push({tipo: document.getElementById('tipo-gasto').value, valor: v});
                document.getElementById('lista-gastos-temp').innerHTML += `• ${document.getElementById('tipo-gasto').value}: R$ ${v.toFixed(2)}<br>`;
                document.getElementById('valor-gasto').value = '';
            }
        }

        function registrarOperacao() {
            let v = parseFloat(document.getElementById('valor').value) || 0;
            if(v <= 0) return alert("Valor inválido!");
            entregas.push({
                cid: document.getElementById('cidade').value || "Rota",
                cli: document.getElementById('cliente').value,
                val: v,
                km: parseFloat(document.getElementById('km').value) || 0,
                gastos: [...gastosTemp]
            });
            document.getElementById('som-money').currentTime = 0;
            document.getElementById('som-money').play();
            gastosTemp = []; document.getElementById('lista-gastos-temp').innerHTML = '';
            document.getElementById('valor').value = ''; document.getElementById('cidade').value = ''; document.getElementById('km').value = '';
            atualizarPainel();
        }

        function atualizarPainel() {
            let brt = 0, kmt = 0, gst = 0;
            entregas.forEach(e => { brt += e.val; kmt += e.km; e.gastos.forEach(g => gst += g.valor); });
            let lucro = brt - (kmt/35*6.20) - (kmt*0.15) - gst;
            document.getElementById('resumo-lucro').innerText = `LUCRO: R$ ${lucro.toFixed(2)}`;
            document.getElementById('meta-bar').style.width = Math.min((lucro/200)*100, 100) + "%";
            document.getElementById('lista').innerHTML = entregas.map(e => `<div style="background:#1a2222; padding:8px; margin-bottom:5px; border-radius:8px; font-size:11px; border-left:3px solid var(--primary);">${e.cid} (${e.cli}) - R$ ${e.val.toFixed(2)}</div>`).join('');
        }

        function gerarFechamento() {
            document.getElementById('modalRecibo').style.display = 'flex';
            document.getElementById('rec-data').innerText = new Date().toLocaleString();
            let brt = 0, kmt = 0, gst = 0, html = "";
            entregas.forEach(e => {
                brt += e.val; kmt += e.km;
                html += `<div><b>${e.cli}:</b> ${e.cid} <span style="float:right">${e.val.toFixed(2)}</span></div>`;
                e.gastos.forEach(g => { gst += g.valor; html += `<div class="gasto-vermelho">↳ ${g.tipo} <span style="float:right">-${g.valor.toFixed(2)}</span></div>`; });
            });
            let gasolina = (kmt/35*6.20);
            let manutTotal = (kmt * 0.15);
            html += `<div style="color:blue; font-weight:bold; margin-top:5px;">🕒 RESERVA MOTO (15%) <span style="float:right">-${manutTotal.toFixed(2)}</span></div>`;
            document.getElementById('rec-lista').innerHTML = html;
            document.getElementById('rec-calculos').innerHTML = `BRUTO: <span style="float:right">${brt.toFixed(2)}</span><br>KM TOTAL: <span style="float:right">${kmt} KM</span><br>GASOLINA EST.: <span style="float:right">-${gasolina.toFixed(2)}</span>`;
            document.getElementById('rec-total').innerText = `R$ ${(brt - gasolina - manutTotal - gst).toFixed(2)}`;
        }

        function encerrarDia() {
            let lucroFinal = document.getElementById('rec-total').innerText;
            let data = new Date().toLocaleDateString();
            let hist = JSON.parse(localStorage.getItem('hist_elite')) || [];
            hist.unshift({data: data, lucro: lucroFinal});
            localStorage.setItem('hist_elite', JSON.stringify(hist));
            location.reload();
        }

        function abrirHistorico() {
            document.getElementById('modalHistorico').style.display = 'flex';
            let hist = JSON.parse(localStorage.getItem('hist_elite')) || [];
            document.getElementById('lista-historico-itens').innerHTML = hist.length ? hist.map(h => `<div class="hist-card">📅 ${h.data} <br> <b style="color:#22c55e">LUCRO: ${h.lucro}</b></div>`).join('') : '<p>Nenhum registro ainda.</p>';
        }

        function exportZap() {
            let brt = 0, kmt = 0, gst = 0;
            let msg = `🏁 *FECHAMENTO IMPULSO WEB 10*\n👤 *PILOTO:* ${user.nome}\n📅 ${new Date().toLocaleDateString()}\n\n*DETALHAMENTO:*`;
            entregas.forEach(e => {
                msg += `\n📍 ${e.cid} (${e.cli}): R$ ${e.val.toFixed(2)}`;
                brt += e.val; kmt += e.km;
                e.gastos.forEach(g => { gst += g.valor; msg += `\n   ❌ ${g.tipo}: -R$ ${g.valor.toFixed(2)}`; });
            });
            let manutTotal = (kmt * 0.15);
            msg += `\n\n🕒 *RESERVA MOTO (15%):* R$ ${manutTotal.toFixed(2)}`;
            msg += `\n\n📊 *RESUMO FINAL:*`;
            msg += `\n💰 Bruto: R$ ${brt.toFixed(2)}`;
            msg += `\n⛽ Gasolina Est: R$ ${(kmt/35*6.20).toFixed(2)}`;
            msg += `\n──────────────────`;
            msg += `\n✅ *LUCRO LÍQUIDO: ${document.getElementById('rec-total').innerText}*`;
            msg += `\n\n🚀 *IMPULSO WEB 10*`;
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
        }

        function exportPDF() {
            html2canvas(document.querySelector("#recibo-visual")).then(canvas => {
                const pdf = new jspdf.jsPDF('p', 'mm', [80, 160]);
                pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, 80, 0);
                pdf.save(`COMPROVANTE_ELITE.pdf`);
            });
        }
    </script>
</body>
</html>
