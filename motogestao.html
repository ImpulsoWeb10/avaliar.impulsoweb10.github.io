<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotoGestão Pro - ImpulsoWeb10</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #f58220; --secondary: #004a80; --bg: #0d1212; 
            --card: #1a2222; --text: #ffffff; --success: #22c55e; --danger: #ef4444;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; padding-bottom: 180px; overflow-x: hidden; }
        
        /* HEADER DINÂMICO ASIMÉTRICO V12 */
        #header-principal {
            background: linear-gradient(135deg, #f58220 0%, #b35a00 100%); 
            padding: 25px 20px; border-radius: 0 0 40px 40px; margin: -15px -15px 25px -15px;
            display: flex; align-items: center; justify-content: flex-start; gap: 20px;
            box-shadow: 0 15px 35px rgba(245, 130, 32, 0.4);
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            border-bottom: 4px solid var(--secondary);
        }

        .logo-box { 
            width: 90px; height: 90px; border-radius: 20px; 
            border: 3px solid #fff; box-shadow: 0 8px 15px rgba(0,0,0,0.3);
            position: relative; overflow: hidden; background: #fff;
            transition: all 0.6s ease; flex-shrink: 0;
        }
        .logo-box img { width: 100%; height: 100%; object-fit: cover; }
        
        /* TEXTO DA RED LINE MAIOR */
        .red-line-text { text-align: left; transition: all 0.4s ease; }
        .red-line-text h2 { margin: 0; font-size: 18px; color: #000; font-weight: 900; line-height: 1.1; text-transform: uppercase; }
        .red-line-text p { margin: 6px 0 0; font-size: 13px; font-weight: 800; color: #fff; opacity: 1; text-shadow: 1px 1px 2px rgba(0,0,0,0.2); }

        /* MODO FOCO (LOGO NO CENTRO) */
        .modo-foco #header-principal { 
            background: var(--bg); padding: 10px; border-bottom: 2px solid var(--primary); 
            border-radius: 0; justify-content: center; box-shadow: none;
        }
        .modo-foco .red-line-text { display: none; width: 0; opacity: 0; }
        .modo-foco .logo-box { width: 130px; height: 130px; transform: rotate(0deg); margin: 0 auto; }

        /* INTERFACE */
        .form-add { background: var(--card); padding: 20px; border-radius: 25px; border: 1px solid #334155; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        label { font-size: 10px; color: var(--primary); font-weight: bold; text-transform: uppercase; display: block; margin: 10px 0 5px; }
        input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #334155; background: #080c0c; color: white; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); background: #000; }
        
        .btn-main { width: 100%; background: linear-gradient(90deg, var(--secondary), var(--primary)); color: #fff; border: none; padding: 18px; border-radius: 15px; font-weight: 900; cursor: pointer; text-transform: uppercase; margin-top: 15px; }
        .btn-fim { position: fixed; bottom: 85px; left: 15px; right: 15px; background: var(--danger); color: white; border: none; padding: 18px; border-radius: 15px; font-weight: 900; z-index: 100; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        .summary-fixed { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--secondary); color: #fff; padding: 20px; text-align: center; font-weight: 900; z-index: 90; border-top: 3px solid var(--primary); font-size: 20px; }

        .entrega-card { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 10px; border-left: 5px solid var(--primary); position: relative; }
        .gasto-tag { font-size: 11px; color: var(--danger); display: block; margin-top: 5px; font-style: italic; }

        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.97); z-index: 2000; padding: 20px; overflow-y: auto; flex-direction: column; align-items: center; }
        .recibo-card { background: white; color: black; padding: 30px; border-radius: 5px; width: 100%; max-width: 380px; font-family: monospace; }
    </style>
</head>
<body id="body-app">

    <div id="conteudo">
        <header id="header-principal">
            <div class="logo-box"><img src="impulsoweb10.jpg" alt="Logo"></div>
            <div class="red-line-text">
                <h2>SISTEMA Nº1<br><span style="background:#000; color:#fff; padding: 0 5px; border-radius: 3px;">ELITE MOTO</span></h2>
                <p>PARE DE PERDER DINHEIRO!</p>
            </div>
        </header>

        <button class="btn-main" style="background:rgba(245, 130, 32, 0.1); border:1px solid var(--primary); margin-bottom:15px; font-size: 12px;" onclick="verHistorico()">
            📁 ACESSAR MEU HISTÓRICO
        </button>

        <div class="form-add">
            <label>Qual o destino?</label>
            <input type="text" id="cliente" placeholder="Ex: Ifood, Particular..." onfocus="ativarModoFoco()" onblur="desativarModoFoco()">
            
            <div style="display:flex; gap:10px;">
                <div style="flex:1"><label>Ganho R$</label><input type="number" id="valor" placeholder="0.00" step="0.01"></div>
                <div style="flex:1"><label>KM</label><input type="number" id="km" placeholder="0"></div>
            </div>
            
            <label>Gasto Extra</label>
            <div style="display:flex; gap:5px;">
                <input type="text" id="gasto-total-input" placeholder="R$ 0.00" readonly onclick="abrirModalGasto()" style="background: #111;">
                <button onclick="abrirModalGasto()" style="background:var(--danger); color:white; border:none; width:65px; border-radius:12px; font-weight:bold; font-size:25px;">+</button>
            </div>
            
            <button class="btn-main" onclick="salvarEntrega()">SALVAR CORRIDA 💰</button>
        </div>

        <div id="lista-entregas"></div>
        <button class="btn-fim" onclick="gerarReciboFinal()">🚩 FINALIZAR TURNO</button>
        <div class="summary-fixed" id="footer-lucro">LUCRO: R$ 0,00</div>
    </div>

    <audio id="audio-cash" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2017/2017-preview.mp3" type="audio/mpeg">
    </audio>

    <div id="modalGasto" class="overlay" style="justify-content:center;">
        <div class="form-add" style="width:100%; max-width:320px; border-color: var(--danger);">
            <h3 style="color:var(--danger); margin-top:0;">Nova Despesa</h3>
            <select id="tipo-gasto" style="width:100%; padding:12px; border-radius:10px; background:#000; color:#fff;">
                <option>Combustível</option><option>Pedágio</option><option>Refeição</option><option>Outros</option>
            </select>
            <input type="number" id="valor-gasto" placeholder="Valor R$ 0.00" style="margin-top:15px;">
            <button class="btn-main" style="background:var(--danger)" onclick="addGastoLista()">ADICIONAR</button>
            <div id="preview-gastos" style="margin:15px 0; font-size:13px; color:var(--danger);"></div>
            <button class="btn-main" style="background:var(--success)" onclick="document.getElementById('modalGasto').style.display='none'">CONFIRMAR ✅</button>
        </div>
    </div>

    <div id="modalRecibo" class="overlay">
        <div id="recibo-area" class="recibo-card">
            <div style="text-align:center">
                <img src="impulsoweb10.jpg" style="width:60px; border-radius:10px; margin-bottom:10px;">
                <h3 style="margin:0;">RELATÓRIO DE ELITE</h3>
                <small id="rec-data"></small>
            </div>
            <hr style="border:1px dashed #eee; margin:15px 0;">
            <div id="rec-corpo"></div>
            <hr style="border:1px dashed #eee; margin:15px 0;">
            <div id="rec-resumo-financeiro"></div>
        </div>
        <div style="width:100%; max-width:380px; margin-top:20px;">
            <button class="btn-main" onclick="baixarPDF()">📥 BAIXAR PDF</button>
            <button class="btn-main" style="background:#25D366" onclick="enviarWhatsApp()">🟢 ENVIAR WHATSAPP</button>
            <button class="btn-main" style="background:var(--success)" onclick="arquivarEFechar()">💾 ARQUIVAR E ZERAR TUDO</button>
        </div>
    </div>

    <script>
        let entregas = JSON.parse(localStorage.getItem('moto_v12_data')) || [];
        let gastosTemp = [];
        let historico = JSON.parse(localStorage.getItem('moto_v12_hist')) || [];

        function ativarModoFoco() { document.getElementById('body-app').classList.add('modo-foco'); }
        function desativarModoFoco() { if(document.getElementById('cliente').value === "") { document.getElementById('body-app').classList.remove('modo-foco'); } }
        function abrirModalGasto() { document.getElementById('modalGasto').style.display = 'flex'; }

        function addGastoLista() {
            const v = parseFloat(document.getElementById('valor-gasto').value);
            const t = document.getElementById('tipo-gasto').value;
            if(!v) return;
            gastosTemp.push({tipo: t, valor: v});
            document.getElementById('preview-gastos').innerHTML += `<div>• ${t}: R$ ${v.toFixed(2)}</div>`;
            document.getElementById('gasto-total-input').value = `R$ ${gastosTemp.reduce((a,b)=>a+b.valor,0).toFixed(2)}`;
            document.getElementById('valor-gasto').value = '';
        }

        function salvarEntrega() {
            const v = parseFloat(document.getElementById('valor').value) || 0;
            const k = parseFloat(document.getElementById('km').value) || 0;
            const c = document.getElementById('cliente').value || "Corrida";
            if(v <= 0) return alert("Insira o valor!");
            
            entregas.push({cliente: c, valor: v, km: k, gastos: [...gastosTemp], totalG: gastosTemp.reduce((a,b)=>a+b.valor,0)});
            localStorage.setItem('moto_v12_data', JSON.stringify(entregas));

            const audio = document.getElementById('audio-cash');
            audio.currentTime = 0;
            audio.play().catch(e => console.log("Som ativo"));

            gastosTemp = []; 
            document.getElementById('cliente').value = ''; document.getElementById('valor').value = ''; 
            document.getElementById('km').value = ''; document.getElementById('gasto-total-input').value = '';
            document.getElementById('preview-gastos').innerHTML = '';
            document.getElementById('body-app').classList.remove('modo-foco');
            atualizarTela();
        }

        function atualizarTela() {
            const lista = document.getElementById('lista-entregas');
            lista.innerHTML = ""; let b=0, k=0, g=0;
            entregas.forEach(e => {
                b += e.valor; k += e.km; g += e.totalG;
                let hG = e.gastos.map(gt => `<span class="gasto-tag">└ ${gt.tipo}: R$ ${gt.valor.toFixed(2)}</span>`).join('');
                lista.innerHTML += `<div class="entrega-card"><div style="display:flex; justify-content:space-between;"><b>${e.cliente}</b><b style="color:var(--success)">R$ ${e.valor.toFixed(2)}</b></div>${hG}</div>`;
            });
            const cKm = (k / 35 * 6.00) + (k * 0.15);
            document.getElementById('footer-lucro').innerText = `LUCRO: R$ ${(b - cKm - g).toFixed(2)}`;
        }

        function gerarReciboFinal() {
            if(!entregas.length) return;
            document.getElementById('modalRecibo').style.display = 'flex';
            document.getElementById('rec-data').innerText = new Date().toLocaleString();
            let b=0, k=0, g=0, html = "";
            entregas.forEach(e => {
                b += e.valor; k += e.km; g += e.totalG;
                html += `<div style="margin-bottom:8px;"><b>${e.cliente}</b>: R$ ${e.valor.toFixed(2)}`;
                e.gastos.forEach(gt => html += `<div style="font-size:10px; color:#555; padding-left:10px;">└ ${gt.tipo}: R$ ${gt.valor.toFixed(2)}</div>`);
                html += `</div>`;
            });
            const cKm = (k / 35 * 6.00) + (k * 0.15);
            document.getElementById('rec-corpo').innerHTML = html;
            document.getElementById('rec-resumo-financeiro').innerHTML = `<div style="background:#000; color:#fff; padding:10px; display:flex; justify-content:space-between; font-size:18px;"><span>LUCRO:</span> <b>R$ ${(b - cKm - g).toFixed(2)}</b></div>`;
        }

        function enviarWhatsApp() {
            let b=0, k=0, g=0, txt = `🏁 *EXTRATO MOTO ELITE*\n\n`;
            entregas.forEach(e => {
                txt += `📦 *${e.cliente}*: R$ ${e.valor.toFixed(2)}\n`;
                e.gastos.forEach(gt => txt += `   └ 💸 ${gt.tipo}: R$ ${gt.valor.toFixed(2)}\n`);
                b += e.valor; k += e.km; g += e.totalG;
            });
            const cKm = (k / 35 * 6.00) + (k * 0.15);
            txt += `\n✅ *LUCRO REAL: R$ ${(b - cKm - g).toFixed(2)}*`;
            window.open(`https://wa.me/?text=${encodeURIComponent(txt)}`);
        }

        function baixarPDF() {
            const { jsPDF } = window.jspdf;
            html2canvas(document.querySelector("#recibo-area")).then(canvas => {
                const pdf = new jsPDF('p', 'mm', 'a4');
                pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 10, 10, 180, 0);
                pdf.save(`extrato_elite.pdf`);
            });
        }

        function arquivarEFechar() {
            historico.push({ data: new Date().toLocaleDateString(), lucro: document.getElementById('footer-lucro').innerText });
            localStorage.setItem('moto_v12_hist', JSON.stringify(historico));
            localStorage.removeItem('moto_v12_data');
            location.reload();
        }

        function verHistorico() {
            document.getElementById('modalHistorico').style.display = 'flex';
            document.getElementById('lista-hist').innerHTML = historico.map(h => `<div style="padding:15px; border-bottom:1px solid #334155; display:flex; justify-content:space-between;"><span>${h.data}</span> <b>${h.lucro}</b></div>`).join('');
        }
        
        atualizarTela();
    </script>
</body>
</html>
