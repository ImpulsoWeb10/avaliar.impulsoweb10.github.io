<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotoGestão Pro v42 - Segurança Total</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary: #f58220; --secondary: #004a80; --bg: #0d1212; --card: #1a2222; --text: #ffffff; --success: #22c55e; --danger: #ff0000; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; padding-bottom: 250px; }
        
        /* RED LINE */
        .red-line-box { border-bottom: 5px solid #ff0000 !important; margin-bottom: 5px; display: inline-block; }
        .red-line-text { font-weight: 950 !important; color: #ffffff !important; text-transform: uppercase; font-size: 18px; letter-spacing: 1px; }
        .sub-frase { color: #aaa; font-size: 9px; font-weight: bold; text-transform: uppercase; display: block; margin-top: 5px; }

        #header-principal { background: linear-gradient(135deg, #f58220 0%, #b35a00 100%); padding: 20px; border-radius: 0 0 30px 30px; margin: -15px -15px 20px -15px; display: flex; align-items: center; gap: 15px; border-bottom: 4px solid var(--secondary); }
        .logo-box { width: 50px; height: 50px; border-radius: 10px; border: 2px solid #fff; overflow: hidden; background: #fff; }
        .logo-box img { width: 100%; height: 100%; object-fit: cover; }

        #tela-login { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .btn-google { background: #fff; color: #000; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 15px; padding: 12px; border-radius: 10px; font-weight: bold; width: 100%; border: none; cursor: pointer; }
        
        .form-add { background: var(--card); padding: 15px; border-radius: 20px; border: 1px solid #333; margin-bottom: 10px; }
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #444; background: #000; color: #fff; margin-top: 5px; box-sizing: border-box; }
        .btn-main { width: 100%; background: linear-gradient(90deg, var(--secondary), var(--primary)); color: #fff; border: none; padding: 16px; border-radius: 12px; font-weight: 900; text-transform: uppercase; cursor: pointer; margin-top: 10px; }
        
        .meta-container { background: #000; border-radius: 10px; height: 12px; margin: 10px 0; overflow: hidden; border: 1px solid #333; }
        #meta-bar { background: var(--success); width: 0%; height: 100%; transition: 0.5s; }
        .summary-fixed { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--secondary); color: #fff; padding: 15px; text-align: center; z-index: 90; border-top: 4px solid var(--primary); font-weight: bold; font-size: 18px; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 5000; padding: 20px; flex-direction: column; overflow-y: auto; align-items: center; }
        #recibo-visual { background: #fff; color: #000; padding: 20px; width: 100%; max-width: 300px; font-family: 'Courier New', monospace; font-size: 11px; }
        .tarja { background: #000; color: #fff; padding: 10px; text-align: center; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="tela-login">
        <img src="impulsoweb10.jpg" style="width: 80px; border-radius: 10px; margin-bottom: 15px;">
        <div class="red-line-box"><span class="red-line-text">SISTEMA DE GESTÃO ELITE</span></div>
        <span class="sub-frase">NÃO PERCA TEMPO, NEM DINHEIRO. GESTÃO É A CHAVE DO LUCRO!</span>
        
        <div id="login-primeiro" style="width: 100%; max-width: 280px; margin-top: 30px;">
            <input type="text" id="login-nome" placeholder="Seu Nome">
            <input type="tel" id="login-celular" placeholder="WhatsApp">
            <button class="btn-main" onclick="primeiroAcesso()">SOLICITAR ACESSO ➔</button>
        </div>

        <div id="login-recorrente" style="display:none; width: 100%; max-width: 280px; margin-top: 30px;">
            <button class="btn-main" onclick="entrarDireto()">ENTRAR NO PAINEL ➔</button>
            <button class="btn-google">
                <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" width="18"> Entrar com Google
            </button>
        </div>
    </div>

    <div id="app" style="display:none;">
        <header id="header-principal">
            <div class="logo-box"><img src="impulsoweb10.jpg"></div>
            <div id="header-info">
                <div id="meta-frase-topo">
                    <div class="red-line-box"><span class="red-line-text" style="font-size:14px;">SISTEMA DE GESTÃO ELITE</span></div>
                    <span class="sub-frase" style="font-size:7px;">GESTÃO É A CHAVE DO LUCRO!</span>
                </div>
                <div id="status-display" style="display:none; color:var(--success); font-weight:900; font-size:11px;">● ONLINE</div>
            </div>
        </header>

        <div class="form-add">
            <label style="font-size:9px; color:var(--primary);">META DO DIA (R$ 200)</label>
            <div class="meta-container"><div id="meta-bar"></div></div>
            
            <input type="text" id="cidade" placeholder="Cidade / Destino" onfocus="focarTrabalho()">
            <select id="cliente" onchange="togglePacotes()">
                <option value="Avulso">Avulso</option>
                <option value="Shopee">Shopee</option>
                <option value="Mercado Livre">Mercado Livre</option>
            </select>

            <div id="area-pacotes" style="display:none; margin-top:10px;">
                <div style="display:flex; gap:5px;">
                    <input type="number" id="qtd-pacotes" placeholder="Qtd Pacotes" oninput="calcAutom()">
                    <input type="number" id="val-unitario" value="2.50" oninput="calcAutom()">
                </div>
            </div>

            <div style="display:flex; gap:5px; margin-top:10px;">
                <input type="number" id="valor" placeholder="Valor R$">
                <input type="number" id="km" placeholder="KM Rota">
            </div>

            <label style="margin-top:10px;">DESPESA EXTRA</label>
            <div style="display:flex; gap:5px;">
                <select id="tipo-gasto" style="flex:1.5;">
                    <option value="">Nenhuma</option>
                    <option value="Almoço">Almoço</option>
                    <option value="Gasolina Extra">Gasolina Extra</option>
                    <option value="Pedágio">Pedágio</option>
                    <option value="Outros">Outros</option>
                </select>
                <input type="number" id="valor-gasto" placeholder="R$" style="flex:1;">
            </div>
            
            <button class="btn-main" onclick="addEntrega()">REGISTRAR OPERAÇÃO 💰</button>
        </div>

        <div id="lista"></div>
        <button onclick="gerarFechamento()" style="position:fixed; bottom:80px; left:15px; right:15px; background:var(--danger); color:#fff; border:none; padding:18px; border-radius:15px; font-weight:bold; z-index:100;">🚩 FECHAR EXPEDIENTE</button>
        <div class="summary-fixed" id="resumo-lucro">LUCRO: R$ 0,00</div>
    </div>

    <div id="modalRecibo" class="overlay">
        <div id="recibo-visual">
            <div style="text-align:center;">
                <h3 style="margin:0;">RELATÓRIO ELITE</h3>
                <small id="rec-data"></small>
            </div>
            <hr>
            <b>ROTAS:</b> <div id="rec-lista"></div>
            <hr>
            <b>DESPESAS:</b> <div id="rec-gastos"></div>
            <hr>
            <div id="rec-calculos"></div>
            <div class="tarja">LUCRO LÍQUIDO: <span id="rec-total"></span></div>
        </div>
        <button class="btn-main" style="background:#000;" onclick="exportPDF()">📥 BAIXAR PDF</button>
        <button class="btn-main" style="background:#25D366;" onclick="exportZap()">🟢 ENVIAR WHATSAPP</button>
        <button class="btn-main" style="background:var(--success);" onclick="finalizarTudo()">✅ ZERAR E FINALIZAR</button>
    </div>

    <script>
        let dados = JSON.parse(localStorage.getItem('elite_v42_data')) || [];
        let gastos = JSON.parse(localStorage.getItem('elite_v42_gastos')) || [];
        let user = JSON.parse(localStorage.getItem('elite_v42_user'));

        // CHECA SE JÁ ACESSOU UMA VEZ
        if(user) {
            document.getElementById('login-primeiro').style.display = 'none';
            document.getElementById('login-recorrente').style.display = 'block';
        }

        function primeiroAcesso() {
            let n = document.getElementById('login-nome').value;
            let c = document.getElementById('login-celular').value;
            if(!n || !c) return alert("Preencha nome e celular!");
            
            user = {nome: n, zap: c};
            localStorage.setItem('elite_v42_user', JSON.stringify(user));

            // Manda Zap para você notificando o acesso
            let msg = `🚀 *NOVO PILOTO ELITE*\n👤 Nome: ${n}\n📱 Celular: ${c}\nAcabou de acessar o sistema!`;
            window.open(`https://wa.me/5511954950044?text=${encodeURIComponent(msg)}`);
            
            entrarDireto();
        }

        function entrarDireto() {
            document.getElementById('tela-login').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            atualizar();
        }

        function focarTrabalho() {
            document.getElementById('meta-frase-topo').style.display = 'none';
            document.getElementById('status-display').style.display = 'block';
            document.getElementById('status-display').innerText = `● ONLINE: ${user.nome.toUpperCase()}`;
        }

        function togglePacotes() {
            let cli = document.getElementById('cliente').value;
            document.getElementById('area-pacotes').style.display = (cli === 'Avulso' ? 'none' : 'block');
            document.getElementById('valor').readOnly = (cli !== 'Avulso');
        }

        function calcAutom() {
            let q = parseFloat(document.getElementById('qtd-pacotes').value) || 0;
            let u = parseFloat(document.getElementById('val-unitario').value) || 0;
            document.getElementById('valor').value = (q * u).toFixed(2);
        }

        function addEntrega() {
            let v = parseFloat(document.getElementById('valor').value) || 0;
            let gV = parseFloat(document.getElementById('valor-gasto').value) || 0;
            let gT = document.getElementById('tipo-gasto').value;

            if(v > 0) {
                dados.push({
                    cid: document.getElementById('cidade').value || "Rota",
                    cli: document.getElementById('cliente').value,
                    val: v,
                    km: parseFloat(document.getElementById('km').value) || 0
                });
            }
            if(gV > 0 && gT !== "") {
                gastos.push({ tipo: gT, valor: gV });
            }

            localStorage.setItem('elite_v42_data', JSON.stringify(dados));
            localStorage.setItem('elite_v42_gastos', JSON.stringify(gastos));
            location.reload();
        }

        function atualizar() {
            let brt = 0, kmt = 0, gstTotal = 0;
            dados.forEach(d => { brt += d.val; kmt += d.km; });
            gastos.forEach(g => { gstTotal += g.valor; });
            
            let gas = (kmt/35*6.20); let man = (kmt*0.15); let lucro = brt - gas - man - gstTotal;
            document.getElementById('resumo-lucro').innerText = `LUCRO LÍQUIDO: R$ ${lucro.toFixed(2)}`;
            let perc = (lucro / 200) * 100;
            document.getElementById('meta-bar').style.width = Math.min(perc, 100) + "%";
            
            let html = "";
            dados.forEach(d => { html += `<div style="background:#1a2222; padding:10px; border-radius:10px; margin-bottom:5px; border-left:4px solid var(--primary); font-size:12px;"><b>${d.cid}</b> - ${d.cli} <span style="float:right">R$ ${d.val.toFixed(2)}</span></div>`; });
            document.getElementById('lista').innerHTML = html;
        }

        function gerarFechamento() {
            document.getElementById('modalRecibo').style.display = 'flex';
            document.getElementById('rec-data').innerText = new Date().toLocaleString();
            let brt = 0, kmt = 0, gstTotal = 0, hEnt = "", hGst = "";
            dados.forEach(d => { brt += d.val; kmt += d.km; hEnt += `<div>• ${d.cid}: R$ ${d.val.toFixed(2)}</div>`; });
            gastos.forEach(g => { gstTotal += g.valor; hGst += `<div>• ${g.tipo}: R$ ${g.valor.toFixed(2)}</div>`; });
            let gas = (kmt/35*6.20); let man = (kmt*0.15);
            document.getElementById('rec-lista').innerHTML = hEnt;
            document.getElementById('rec-gastos').innerHTML = hGst || "Sem despesas";
            document.getElementById('rec-calculos').innerHTML = `BRUTO: R$ ${brt.toFixed(2)}<br>GASOLINA: R$ ${gas.toFixed(2)}<br>MANUTENÇÃO: R$ ${man.toFixed(2)}<br>DESPESAS: R$ ${gstTotal.toFixed(2)}`;
            document.getElementById('rec-total').innerText = `R$ ${(brt-gas-man-gstTotal).toFixed(2)}`;
        }

        function exportZap() {
            let brt = 0, kmt = 0, gstTotal = 0;
            let txt = `🏁 *FECHAMENTO ELITE*\n👤 Piloto: ${user.nome}\n\n*ROTAS:*`;
            dados.forEach(d => { txt += `\n📍 ${d.cid}: R$ ${d.val.toFixed(2)}`; brt += d.val; kmt += d.km; });
            gastos.forEach(g => { gstTotal += g.valor; });
            let gas = (kmt/35*6.20); let man = (kmt*0.15);
            txt += `\n\n*RESUMO:*\n💰 Bruto: R$ ${brt.toFixed(2)}\n⛽ Gas: R$ ${gas.toFixed(2)}\n🛠️ Manut: R$ ${man.toFixed(2)}\n🍔 Despesas: R$ ${gstTotal.toFixed(2)}\n📏 KM: ${kmt}km\n────────────────\n✅ *LUCRO: R$ ${(brt-gas-man-gstTotal).toFixed(2)}*`;
            window.open(`https://wa.me/?text=${encodeURIComponent(txt)}`);
        }

        function exportPDF() {
            html2canvas(document.querySelector("#recibo-visual")).then(canvas => {
                const pdf = new jspdf.jsPDF('p', 'mm', [80, 180]);
                pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, 80, 0);
                pdf.save(`FECHAMENTO_ELITE.pdf`);
            });
        }

        function finalizarTudo() {
            localStorage.removeItem('elite_v42_data');
            localStorage.removeItem('elite_v42_gastos');
            location.reload();
        }
    </script>
</body>
</html>
