<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotoGestão Pro v43 - Elite Final</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary: #f58220; --secondary: #004a80; --bg: #0d1212; --card: #1a2222; --text: #ffffff; --success: #22c55e; --danger: #ff0000; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; padding-bottom: 250px; }
        
        /* RED LINE */
        .red-line-box { border-bottom: 5px solid #ff0000 !important; margin-bottom: 5px; display: inline-block; }
        .red-line-text { font-weight: 950 !important; color: #ffffff !important; text-transform: uppercase; font-size: 18px; letter-spacing: 1px; }

        #header-principal { background: linear-gradient(135deg, #f58220 0%, #b35a00 100%); padding: 20px; border-radius: 0 0 30px 30px; margin: -15px -15px 20px -15px; display: flex; align-items: center; gap: 15px; border-bottom: 4px solid var(--secondary); }
        .logo-box { width: 50px; height: 50px; border-radius: 10px; border: 2px solid #fff; overflow: hidden; background: #fff; }
        .logo-box img { width: 100%; height: 100%; object-fit: cover; }

        .meta-container { background: #000; border-radius: 10px; height: 12px; margin: 10px 0; overflow: hidden; border: 1px solid #333; }
        #meta-bar { background: var(--success); width: 0%; height: 100%; transition: 0.5s; }

        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #444; background: #000; color: #fff; margin-top: 5px; box-sizing: border-box; }
        .btn-main { width: 100%; background: linear-gradient(90deg, var(--secondary), var(--primary)); color: #fff; border: none; padding: 16px; border-radius: 12px; font-weight: 900; text-transform: uppercase; cursor: pointer; margin-top: 10px; }
        
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 5000; padding: 20px; flex-direction: column; overflow-y: auto; align-items: center; justify-content: center; }
        
        /* ESTILO MAQUININHA */
        #recibo-visual { background: #fff; color: #000; padding: 20px; width: 100%; max-width: 280px; font-family: 'Courier New', Courier, monospace; font-size: 12px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .gasto-vermelho { color: #ff0000; font-weight: bold; }
        .summary-fixed { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--secondary); color: #fff; padding: 15px; text-align: center; z-index: 90; border-top: 4px solid var(--primary); font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>

    <audio id="som-money" src="https://www.soundjay.com/misc/sounds/cash-register-05.mp3"></audio>

    <div id="app">
        <header id="header-principal">
            <div class="logo-box"><img src="impulsoweb10.jpg"></div>
            <div>
                <div class="red-line-box"><span class="red-line-text" style="font-size:14px;">SISTEMA DE GESTÃO ELITE</span></div>
            </div>
        </header>

        <div style="background: var(--card); padding:15px; border-radius:20px; border:1px solid #333;">
            <label style="font-size:10px; color:var(--primary); font-weight:bold;">META DE GANHO</label>
            <div class="meta-container"><div id="meta-bar"></div></div>
            
            <input type="text" id="cidade" placeholder="Cidade / Destino">
            <select id="cliente" onchange="togglePacotes()">
                <option value="Avulso">Avulso</option>
                <option value="Shopee">Shopee</option>
                <option value="Mercado Livre">Mercado Livre</option>
            </select>

            <div id="area-pacotes" style="display:none; margin-top:10px; background:rgba(255,255,255,0.05); padding:10px; border-radius:10px;">
                <div style="display:flex; gap:5px;">
                    <input type="number" id="qtd-pacotes" placeholder="Qtd" oninput="calcAutom()">
                    <input type="number" id="val-unitario" value="2.50" oninput="calcAutom()">
                </div>
            </div>

            <div style="display:flex; gap:5px; margin-top:10px;">
                <input type="number" id="valor" placeholder="R$ Ganho">
                <input type="number" id="km" placeholder="KM Rota">
            </div>

            <button class="btn-main" style="background:#333;" onclick="abrirModalGastos()">➕ ADICIONAR GASTOS (OPCIONAL)</button>
            <button class="btn-main" onclick="registrarTudo()">REGISTRAR OPERAÇÃO 💰</button>
        </div>

        <div id="lista" style="margin-top:15px;"></div>
        
        <button onclick="gerarFechamento()" style="position:fixed; bottom:80px; left:15px; right:15px; background:var(--danger); color:#fff; border:none; padding:18px; border-radius:15px; font-weight:bold; z-index:100;">🚩 FECHAR EXPEDIENTE</button>
        <div class="summary-fixed" id="resumo-lucro">LUCRO: R$ 0,00</div>
    </div>

    <div id="modalGastos" class="overlay">
        <div style="background:var(--card); padding:20px; border-radius:20px; width:90%; max-width:300px; border:2px solid var(--primary);">
            <h3 style="margin-top:0; color:var(--primary);">LANÇAR GASTOS</h3>
            <select id="tipo-gasto">
                <option value="Almoço">Almoço</option>
                <option value="Gasolina Extra">Gasolina Extra</option>
                <option value="Pedágio">Pedágio</option>
                <option value="Outros">Outros</option>
            </select>
            <input type="number" id="valor-gasto" placeholder="Valor R$">
            <button class="btn-main" onclick="addGastoTemp()" style="background:var(--secondary);">+ ADICIONAR MAIS 1 GASTO</button>
            <button class="btn-main" onclick="fecharModalGastos()" style="background:var(--success);">OK, TERMINADO</button>
            <div id="lista-gastos-temp" style="font-size:10px; color:#aaa; margin-top:10px;"></div>
        </div>
    </div>

    <div id="modalRecibo" class="overlay">
        <div id="recibo-visual">
            <div style="text-align:center; border-bottom:1px dashed #000; padding-bottom:10px;">
                <b>IMPULSO WEB 10 - ELITE</b><br>
                <span>COMPROVANTE DE TURNO</span><br>
                <small id="rec-data"></small>
            </div>
            <div style="margin-top:10px;" id="rec-lista"></div>
            <div style="border-top:1px dashed #000; margin-top:10px; padding-top:10px;" id="rec-calculos"></div>
            <div style="background:#000; color:#fff; text-align:center; padding:5px; margin-top:10px; font-weight:bold;">
                LUCRO: <span id="rec-total"></span>
            </div>
        </div>
        <button class="btn-main" style="background:#fff; color:#000;" onclick="exportPDF()">📥 SALVAR PDF</button>
        <button class="btn-main" style="background:#25D366;" onclick="exportZap()">🟢 ENVIAR WHATSAPP</button>
        <button class="btn-main" style="background:var(--danger);" onclick="location.reload()">✅ ZERAR TUDO</button>
    </div>

    <script>
        let entregas = [];
        let gastosTemp = [];
        let totalGastoAcumulado = 0;

        function togglePacotes() {
            let cli = document.getElementById('cliente').value;
            document.getElementById('area-pacotes').style.display = (cli === 'Avulso' ? 'none' : 'block');
            document.getElementById('valor').readOnly = (cli !== 'Avulso');
        }

        function calcAutom() {
            let q = parseFloat(document.getElementById('qtd-pacotes').value) || 0;
            let u = parseFloat(document.getElementById('val-unitario').value) || 0;
            document.getElementById('valor').value = (q * u).toFixed(2);
        }

        function abrirModalGastos() { document.getElementById('modalGastos').style.display = 'flex'; }
        
        function addGastoTemp() {
            let t = document.getElementById('tipo-gasto').value;
            let v = parseFloat(document.getElementById('valor-gasto').value) || 0;
            if(v > 0) {
                gastosTemp.push({tipo: t, valor: v});
                document.getElementById('lista-gastos-temp').innerHTML += `• ${t}: R$ ${v.toFixed(2)}<br>`;
                document.getElementById('valor-gasto').value = '';
            }
        }

        function fecharModalGastos() { document.getElementById('modalGastos').style.display = 'none'; }

        function registrarTudo() {
            let v = parseFloat(document.getElementById('valor').value) || 0;
            if(v <= 0) return alert("Insira o valor ganho!");

            entregas.push({
                cid: document.getElementById('cidade').value || "Rota",
                cli: document.getElementById('cliente').value,
                val: v,
                km: parseFloat(document.getElementById('km').value) || 0,
                gastos: [...gastosTemp]
            });

            // SOM DE REGISTRO
            document.getElementById('som-money').play();

            // Limpeza
            gastosTemp = [];
            document.getElementById('lista-gastos-temp').innerHTML = '';
            document.getElementById('valor').value = '';
            document.getElementById('cidade').value = '';
            document.getElementById('km').value = '';
            
            atualizarPainel();
        }

        function atualizarPainel() {
            let brt = 0, kmt = 0, gst = 0;
            let html = "";
            entregas.forEach(e => {
                brt += e.val; kmt += e.km;
                e.gastos.forEach(g => gst += g.valor);
                html += `<div style="background:var(--card); padding:10px; border-radius:10px; margin-bottom:5px; border-left:4px solid var(--primary); font-size:12px;"><b>${e.cid}</b> (${e.cli}) <span style="float:right">R$ ${e.val.toFixed(2)}</span></div>`;
            });
            let gas = (kmt/35*6.20); let man = (kmt*0.15); let lucro = brt - gas - man - gst;
            document.getElementById('lista').innerHTML = html;
            document.getElementById('resumo-lucro').innerText = `LUCRO ATUAL: R$ ${lucro.toFixed(2)}`;
            document.getElementById('meta-bar').style.width = Math.min((lucro/200)*100, 100) + "%";
        }

        function gerarFechamento() {
            document.getElementById('modalRecibo').style.display = 'flex';
            document.getElementById('rec-data').innerText = new Date().toLocaleString();
            let brt = 0, kmt = 0, gst = 0, hRotas = "", hGst = "";
            entregas.forEach(e => {
                brt += e.val; kmt += e.km;
                hRotas += `<div>${e.cid.toUpperCase()} <span style="float:right">${e.val.toFixed(2)}</span></div>`;
                e.gastos.forEach(g => {
                    gst += g.valor;
                    hGst += `<div class="gasto-vermelho">${g.tipo.toUpperCase()} <span style="float:right">-${g.valor.toFixed(2)}</span></div>`;
                });
            });
            let gas = (kmt/35*6.20); let man = (kmt*0.15);
            document.getElementById('rec-lista').innerHTML = hRotas + "<br>" + hGst;
            document.getElementById('rec-calculos').innerHTML = `BRUTO: R$ ${brt.toFixed(2)}<br>GASOLINA: R$ ${gas.toFixed(2)}<br>MANUT.: R$ ${man.toFixed(2)}<br>KM: ${kmt}km`;
            document.getElementById('rec-total').innerText = `R$ ${(brt-gas-man-gst).toFixed(2)}`;
        }

        function exportZap() {
            let brt = 0, kmt = 0, gst = 0, txt = `🏁 *RELATÓRIO ELITE*\n👤 Piloto: ${document.title}\n\n*ROTAS:*`;
            entregas.forEach(e => {
                txt += `\n📍 ${e.cid}: R$ ${e.val.toFixed(2)}`;
                brt += e.val; kmt += e.km;
                e.gastos.forEach(g => { gst += g.valor; txt += `\n❌ ${g.tipo}: -R$ ${g.valor.toFixed(2)}`; });
            });
            let gas = (kmt/35*6.20); let man = (kmt*0.15);
            txt += `\n\n*RESUMO:*\n💰 Bruto: R$ ${brt.toFixed(2)}\n⛽ Gas: R$ ${gas.toFixed(2)}\n🛠️ Manut: R$ ${man.toFixed(2)}\n📏 KM: ${kmt}km\n────────────────\n✅ *LUCRO: R$ ${(brt-gas-man-gst).toFixed(2)}*`;
            window.open(`https://wa.me/?text=${encodeURIComponent(txt)}`);
        }

        function exportPDF() {
            html2canvas(document.querySelector("#recibo-visual")).then(canvas => {
                const pdf = new jspdf.jsPDF('p', 'mm', [80, 160]);
                pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, 80, 0);
                pdf.save(`FECHAMENTO_ELITE.pdf`);
            });
        }
    </script>
</body>
</html>
