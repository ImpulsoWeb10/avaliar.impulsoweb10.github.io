<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotoGestão Pro v23 - ImpulsoWeb10</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --primary: #f58220; --secondary: #004a80; --bg: #0d1212; --card: #1a2222; --text: #ffffff; --success: #22c55e; --danger: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; padding-bottom: 220px; }
        
        /* LOGIN FUNIL */
        #tela-login { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; }
        
        /* HEADER */
        #header-principal { background: linear-gradient(135deg, #f58220 0%, #b35a00 100%); padding: 25px 20px; border-radius: 0 0 35px 35px; margin: -15px -15px 20px -15px; display: flex; align-items: center; gap: 15px; border-bottom: 4px solid var(--secondary); }
        .logo-box { width: 65px; height: 65px; border-radius: 12px; border: 2px solid #fff; overflow: hidden; background: #fff; }
        .logo-box img { width: 100%; height: 100%; object-fit: cover; }
        
        /* FORM */
        .form-add { background: var(--card); padding: 18px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 15px; }
        label { font-size: 10px; font-weight: 900; color: var(--primary); text-transform: uppercase; display: block; margin-top: 8px; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #334155; background: #000; color: #fff; margin-top: 5px; box-sizing: border-box; outline: none; }
        
        .btn-main { width: 100%; background: linear-gradient(90deg, var(--secondary), var(--primary)); color: #fff; border: none; padding: 16px; border-radius: 12px; font-weight: 900; text-transform: uppercase; cursor: pointer; margin-top: 10px; }
        .summary-fixed { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--secondary); color: #fff; padding: 20px; text-align: center; font-weight: 900; z-index: 90; border-top: 3px solid var(--primary); font-size: 18px; }

        /* LISTA */
        .entrega-card { background: var(--card); padding: 12px; border-radius: 12px; margin-bottom: 8px; border-left: 4px solid var(--primary); font-size: 13px; }
        
        /* ESTILO RECIBO CARTÃO (BANCO) */
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; padding: 20px; flex-direction: column; align-items: center; overflow-y: auto; }
        #recibo-visual { background: #f8f9fa; color: #000; padding: 25px; width: 100%; max-width: 340px; font-family: 'Courier New', Courier, monospace; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .dashed-line { border-top: 1px dashed #000; margin: 10px 0; }
        .tarja-preta { background: #000; color: #fff; padding: 15px; margin: 20px -25px -25px -25px; text-align: center; font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="tela-login">
        <img src="impulsoweb10.jpg" style="width: 80px; border-radius: 15px; margin-bottom: 10px;">
        <h2 style="color:var(--primary); margin:0;">LOGIN PILOTO</h2>
        <div id="area-manual" style="width: 100%; max-width: 280px; margin-top:20px;">
            <input type="text" id="login-nome" placeholder="Nome Completo">
            <input type="tel" id="login-celular" placeholder="WhatsApp">
            <button class="btn-main" onclick="salvarPrimeiroAcesso()">ENTRAR NO SISTEMA 🚀</button>
        </div>
        <div id="area-hibrida" style="display:none; width: 100%; max-width: 280px;">
            <button class="btn-main" onclick="liberarApp()">ENTRAR AGORA ➔</button>
        </div>
    </div>

    <div id="app-container" style="display:none;">
        <header id="header-principal">
            <div class="logo-box"><img src="impulsoweb10.jpg"></div>
            <div>
                <h2 style="margin:0; font-size:16px; color:#000;">EXTRATO BANCÁRIO MOTO</h2>
                <small id="user-tag" style="background:#000; color:#fff; padding:2px 5px; border-radius:4px;"></small>
            </div>
        </header>

        <div class="form-add">
            <label>Cidade da Entrega</label>
            <input type="text" id="cidade" placeholder="Ex: São Paulo, SBC, Rio...">
            <label>Cliente / Destino</label>
            <input type="text" id="cliente" placeholder="Ex: Ifood, Loggi...">
            <div style="display:flex; gap:10px;">
                <div style="flex:1"><label>Ganho R$</label><input type="number" id="valor" placeholder="0.00"></div>
                <div style="flex:1"><label>KM</label><input type="number" id="km" placeholder="0"></div>
            </div>
            <button class="btn-main" onclick="salvarEntrega()">REGISTRAR OPERAÇÃO 💰</button>
        </div>

        <div id="lista-entregas"></div>
        <button style="position:fixed; bottom:85px; left:15px; right:15px; background:var(--danger); color:white; border:none; padding:18px; border-radius:15px; font-weight:900; z-index:80;" onclick="abrirFechamento()">🚩 FECHAR EXTRATO DO DIA</button>
        <div class="summary-fixed" id="footer-lucro">LUCRO LÍQUIDO: R$ 0,00</div>
    </div>

    <div id="modalRecibo" class="overlay">
        <div id="recibo-visual">
            <div style="text-align:center;">
                <h2 style="margin:0;">COMPROVANTE</h2>
                <p style="margin:0; font-size:12px;">IMPULSO WEB 10 - SISTEMAS</p>
                <p id="rec-data" style="font-size:10px;"></p>
            </div>
            <div class="dashed-line"></div>
            <div id="rec-corpo" style="font-size:11px; line-height:1.5;"></div>
            <div class="dashed-line"></div>
            <div id="rec-detalhes-tecnicos" style="font-size:11px;"></div>
            <div class="tarja-preta">
                TOTAL LÍQUIDO<br>
                <span id="total-final-preto">R$ 0,00</span>
            </div>
        </div>
        <div style="width:100%; max-width:340px; margin-top:20px;">
            <button class="btn-main" style="background:#000;" onclick="baixarPDF()">📥 SALVAR PDF BANCÁRIO</button>
            <button class="btn-main" style="background:#25D366;" onclick="enviarZap()">🟢 ENVIAR WHATSAPP</button>
            <button class="btn-main" style="background:var(--success);" onclick="location.reload()">💾 NOVO DIA</button>
        </div>
    </div>

    <script>
        const SEU_ZAP = "5511954950044";
        let user = JSON.parse(localStorage.getItem('moto_v23_user'));
        let entregas = JSON.parse(localStorage.getItem('moto_v23_data')) || [];

        window.onload = () => {
            if(user) {
                document.getElementById('area-manual').style.display = 'none';
                document.getElementById('area-hibrida').style.display = 'block';
            }
        };

        function salvarPrimeiroAcesso() {
            const nome = document.getElementById('login-nome').value;
            const celular = document.getElementById('login-celular').value;
            if(!nome || !celular) return alert("Preencha os dados!");
            user = { nome, celular };
            localStorage.setItem('moto_v23_user', JSON.stringify(user));
            window.open(`https://wa.me/${SEU_ZAP}?text=🚀 *CADASTRO:* ${nome} (${celular})`);
            liberarApp();
        }

        function liberarApp() {
            document.getElementById('tela-login').style.display = 'none';
            document.getElementById('app-container').style.display = 'block';
            document.getElementById('user-tag').innerText = `PILOTO: ${user.nome.toUpperCase()}`;
            atualizarTela();
        }

        function salvarEntrega() {
            const v = parseFloat(document.getElementById('valor').value) || 0;
            const k = parseFloat(document.getElementById('km').value) || 0;
            const cid = document.getElementById('cidade').value || "Não Info";
            const cli = document.getElementById('cliente').value || "Entrega";
            if(v <= 0) return alert("Valor inválido");

            entregas.push({ cidade: cid, cliente: cli, valor: v, km: k, gas: (k/35*6.20), manut: (k*0.15) });
            localStorage.setItem('moto_v23_data', JSON.stringify(entregas));
            
            new Audio('https://assets.mixkit.co/active_storage/sfx/2017/2017-preview.mp3').play();
            document.getElementById('valor').value=''; document.getElementById('km').value=''; document.getElementById('cidade').value=''; document.getElementById('cliente').value='';
            atualizarTela();
        }

        function atualizarTela() {
            const lista = document.getElementById('lista-entregas');
            lista.innerHTML = ""; let b=0, k=0, g=0, m=0;
            entregas.forEach(e => {
                b += e.valor; k += e.km; g += e.gas; m += e.manut;
                lista.innerHTML += `<div class="entrega-card"><b>${e.cidade}</b> - ${e.cliente}<br><span style="color:var(--success)">R$ ${e.valor.toFixed(2)}</span> | ${e.km}km</div>`;
            });
            document.getElementById('footer-lucro').innerText = `LUCRO LÍQUIDO: R$ ${(b-g-m).toFixed(2)}`;
        }

        function abrirFechamento() {
            document.getElementById('modalRecibo').style.display = 'flex';
            document.getElementById('rec-data').innerText = `DATA: ${new Date().toLocaleDateString()} HORA: ${new Date().toLocaleTimeString()}`;
            let h = ""; let b=0, k=0, g=0, m=0;
            
            entregas.forEach(e => {
                b+=e.valor; k+=e.km; g+=e.gas; m+=e.manut;
                h += `<div style="display:flex; justify-content:space-between;"><span>${e.cidade.substring(0,10)}/${e.cliente.substring(0,8)}</span> <span>R$ ${e.valor.toFixed(2)}</span></div>`;
            });
            
            document.getElementById('rec-corpo').innerHTML = h;
            document.getElementById('rec-detalhes-tecnicos').innerHTML = `
                SOMA BRUTA: R$ ${b.toFixed(2)}<br>
                DISTÂNCIA: ${k.toFixed(1)} KM<br>
                DESPESA GASOLINA: - R$ ${g.toFixed(2)}<br>
                RESERVA OFICINA: - R$ ${m.toFixed(2)}<br>
                ESTABELECIMENTO: ELITE MOTO PRO
            `;
            document.getElementById('total-final-preto').innerText = `R$ ${(b-g-m).toFixed(2)}`;
        }

        function baixarPDF() {
            const { jsPDF } = window.jspdf;
            html2canvas(document.querySelector("#recibo-visual")).then(canvas => {
                const pdf = new jsPDF('p', 'mm', [80, 160]);
                pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, 80, 0);
                pdf.save(`EXTRATO_${user.nome.replace(' ','_')}.pdf`);
            });
        }

        function enviarZap() {
            let b=0, k=0, g=0, m=0;
            entregas.forEach(e => { b+=e.valor; k+=e.km; g+=e.gas; m+=e.manut; });
            const txt = `🏁 *COMPROVANTE ELITE MOTO*\n\n👤 Piloto: ${user.nome}\n💰 Bruto: R$ ${b.toFixed(2)}\n⛽ Gas: R$ ${g.toFixed(2)}\n🛠️ Manut: R$ ${m.toFixed(2)}\n📍 KM: ${k.toFixed(1)}\n\n*LUCRO LÍQUIDO: R$ ${(b-g-m).toFixed(2)}*`;
            window.open(`https://wa.me/?text=${encodeURIComponent(txt)}`);
        }
    </script>
</body>
</html>
