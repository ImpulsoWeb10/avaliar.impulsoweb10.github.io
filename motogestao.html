<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotoGestão Pro - ImpulsoWeb10</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #fbbf24; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --success: #22c55e; --danger: #ef4444; --accent: #6366f1; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; padding-bottom: 100px; }
        
        .header { text-align: center; padding: 15px 0; border-bottom: 1px solid #334155; margin-bottom: 20px; }
        .header h1 { font-size: 18px; margin: 0; color: var(--primary); letter-spacing: 1px; }
        
        /* Stats */
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-card { background: var(--card); padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #334155; position: relative; overflow: hidden; }
        .stat-card span { font-size: 9px; text-transform: uppercase; color: #94a3b8; display: block; font-weight: bold; }
        .stat-card b { font-size: 18px; display: block; margin-top: 5px; }

        /* Inputs */
        .form-add { background: var(--card); padding: 20px; border-radius: 20px; margin-bottom: 20px; border: 1px solid #334155; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        label { font-size: 11px; color: var(--primary); font-weight: bold; text-transform: uppercase; }
        input { width: 100%; padding: 14px; margin: 8px 0 15px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; font-size: 16px; box-sizing: border-box; }
        
        .btn-add { width: 100%; background: var(--primary); color: #000; border: none; padding: 16px; border-radius: 12px; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; }
        .btn-add:active { transform: scale(0.95); }

        /* Lista */
        .entrega-item { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid var(--primary); animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        .entrega-info b { font-size: 14px; color: #fff; }
        .entrega-info small { color: #94a3b8; }
        .entrega-val { font-weight: 800; color: var(--success); font-size: 16px; }

        /* Floating Action Button (FAB) */
        .fab { position: fixed; bottom: 85px; right: 20px; width: 60px; height: 60px; background: var(--accent); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 5px 20px rgba(99, 102, 241, 0.4); cursor: pointer; z-index: 100; border: none; }

        /* Footer Total */
        .summary-fixed { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--success); color: #000; padding: 18px; text-align: center; font-weight: 900; font-size: 16px; box-shadow: 0 -5px 20px rgba(0,0,0,0.4); z-index: 90; border-radius: 20px 20px 0 0; }

        /* Modal Estilizado */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 200; align-items: flex-end; }
        .modal-content { background: var(--card); width: 100%; border-radius: 30px 30px 0 0; padding: 30px 20px; box-sizing: border-box; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .modal-title { text-align: center; margin-bottom: 25px; color: var(--primary); font-weight: bold; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .menu-btn { background: #334155; border: none; padding: 20px; border-radius: 15px; color: white; display: flex; flex-direction: column; align-items: center; gap: 10px; font-size: 12px; font-weight: bold; cursor: pointer; }
        .menu-btn i { font-size: 24px; color: var(--primary); }
        .menu-btn.whatsapp i { color: #25d366; }
        .menu-btn.pdf i { color: #ff4444; }

        /* Área de Impressão (Invisível na tela) */
        #recibo-print { display: none; background: white; color: black; padding: 20px; font-family: monospace; }
        @media print {
            body * { display: none; }
            #recibo-print { display: block; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1><i class="fas fa-bolt"></i> MOTO GESTÃO PRO</h1>
    </div>

    <div class="stat-grid">
        <div class="stat-card">
            <span>Desgaste (Gas+Manut)</span>
            <b id="custo-total" style="color: var(--danger);">R$ 0,00</b>
        </div>
        <div class="stat-card">
            <span>KM Total Hoje</span>
            <b id="km-total-display">0 KM</b>
        </div>
    </div>

    <div class="form-add">
        <label>Valor Recebido</label>
        <input type="number" id="valor" placeholder="R$ 0,00" inputmode="decimal">
        
        <label>KM da Corrida</label>
        <input type="number" id="km" placeholder="KM" inputmode="numeric">
        
        <button class="btn-add" onclick="addEntrega()">
            <i class="fas fa-plus"></i> LANÇAR AGORA
        </button>
    </div>

    <div id="lista-entregas"></div>

    <button class="fab" onclick="toggleModal()">
        <i class="fas fa-ellipsis-v"></i>
    </button>

    <div class="summary-fixed" id="total-liquido">
        LUCRO REAL: R$ 0,00
    </div>

    <div id="actionModal" class="modal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-title">AÇÕES DO ESCRITÓRIO</div>
            <div class="menu-grid">
                <button class="menu-btn whatsapp" onclick="enviarWhats()">
                    <i class="fab fa-whatsapp"></i>
                    ENVIAR RESUMO
                </button>
                <button class="menu-btn" onclick="gerarRecibo()">
                    <i class="fas fa-receipt"></i>
                    GERAR RECIBO
                </button>
                <button class="menu-btn pdf" onclick="window.print()">
                    <i class="fas fa-file-pdf"></i>
                    SALVAR PDF
                </button>
                <button class="menu-btn" onclick="limparTudo()">
                    <i class="fas fa-trash"></i>
                    LIMPAR DIA
                </button>
            </div>
            <button style="width:100%; margin-top:20px; padding:10px; background:none; border:none; color:#94a3b8; font-weight:bold;" onclick="toggleModal()">FECHAR</button>
        </div>
    </div>

    <div id="recibo-print">
        <h2 style="text-align:center">RECIBO DE ENTREGA</h2>
        <hr>
        <p>Data: <span id="r-data"></span></p>
        <p>Entregador: Autônomo</p>
        <hr>
        <h3>TOTAL DO DIA: <span id="r-total"></span></h3>
        <p>KM Rodados: <span id="r-km"></span></p>
        <br>
        <p style="text-align:center">Obrigado pela preferência!</p>
    </div>

    <script>
        let faturamento = 0;
        let kmGeral = 0;

        function addEntrega() {
            const v = parseFloat(document.getElementById('valor').value);
            const k = parseFloat(document.getElementById('km').value);
            if(!v || !k) return;

            faturamento += v;
            kmGeral += k;

            const lista = document.getElementById('lista-entregas');
            const item = document.createElement('div');
            item.className = 'entrega-item';
            item.innerHTML = `
                <div class="entrega-info">
                    <b>Corrida #${lista.children.length + 1}</b><br>
                    <small>${k} KM rodados</small>
                </div>
                <div class="entrega-val">R$ ${v.toFixed(2)}</div>
            `;
            lista.prepend(item);
            atualizar();
            document.getElementById('valor').value = '';
            document.getElementById('km').value = '';
        }

        function atualizar() {
            const custo = (kmGeral / 35 * 5.80) + (kmGeral * 0.15);
            const lucro = faturamento - custo;

            document.getElementById('custo-total').innerText = `R$ ${custo.toFixed(2)}`;
            document.getElementById('km-total-display').innerText = `${kmGeral} KM`;
            document.getElementById('total-liquido').innerText = `LUCRO REAL: R$ ${lucro.toFixed(2)}`;
            
            // Atualiza dados do recibo invisível
            document.getElementById('r-total').innerText = `R$ ${faturamento.toFixed(2)}`;
            document.getElementById('r-km').innerText = kmGeral;
            document.getElementById('r-data').innerText = new Date().toLocaleDateString();
        }

        function toggleModal() {
            const m = document.getElementById('actionModal');
            m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
        }

        function closeModal(e) { document.getElementById('actionModal').style.display = 'none'; }

        function enviarWhats() {
            const msg = encodeURIComponent(`🛵 *Resumo MotoGestão*\n💰 Bruto: R$ ${faturamento.toFixed(2)}\n⛽ Desgaste: ${document.getElementById('custo-total').innerText}\n🏁 KM: ${kmGeral}\n✅ *Lucro Líquido: ${document.getElementById('total-liquido').innerText.split(': ')[1]}*`);
            window.open(`https://wa.me/?text=${msg}`);
        }

        function gerarRecibo() {
            alert("Preparando recibo para impressão...");
            window.print();
        }

        function limparTudo() {
            if(confirm("Deseja zerar os dados de hoje?")) window.location.reload();
        }
    </script>
</body>
</html>
