<!DOCTYPE html>
<html lang="pt-br">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XXXXXXXXXX');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotoGestão Pro v16 - ImpulsoWeb10</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { 
            --primary: #f58220; --secondary: #004a80; --bg: #0d1212; 
            --card: #1a2222; --text: #ffffff; --success: #22c55e; --danger: #ef4444;
        }
        /* Ajuste automático de tema Dia/Noite */
        @media (prefers-color-scheme: light) {
            :root { --bg: #f0f2f5; --card: #ffffff; --text: #1a2222; }
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; padding-bottom: 200px; transition: 0.5s; }
        
        /* HEADER V16 */
        #header-principal {
            background: linear-gradient(135deg, #f58220 0%, #b35a00 100%); 
            padding: 30px 20px; border-radius: 0 0 40px 40px; margin: -15px -15px 20px -15px;
            display: flex; align-items: center; gap: 15px; border-bottom: 5px solid var(--secondary);
        }

        .logo-box { 
            width: 90px; height: 90px; border-radius: 20px; border: 3px solid #fff; 
            position: relative; overflow: hidden; background: #fff; flex-shrink: 0;
        }
        .logo-box img { width: 100%; height: 100%; object-fit: cover; }
        .logo-box::after {
            content: ""; position: absolute; top: 0; left: -150%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.7), transparent);
            transform: skewX(-20deg); animation: shine 4s infinite;
        }
        @keyframes shine { 0% { left: -150%; } 20% { left: 150%; } 100% { left: 150%; } }

        .red-line-text h2 { margin: 0; font-size: 18px; color: #000; font-weight: 900; }
        .red-line-text p { margin: 5px 0 0; font-size: 12px; font-weight: 800; color: #fff; }

        /* BARRA DE META */
        .meta-container { background: rgba(0,0,0,0.2); border-radius: 10px; padding: 10px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .meta-bar-bg { background: #333; height: 12px; border-radius: 6px; overflow: hidden; margin-top: 5px; }
        #meta-progress { background: var(--success); height: 100%; width: 0%; transition: 1s ease; box-shadow: 0 0 10px var(--success); }

        /* ALERTAS */
        .alerta-manutencao { background: var(--danger); color: white; padding: 10px; border-radius: 10px; font-weight: bold; text-align: center; margin-bottom: 15px; display: none; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        /* BOTÕES */
        .form-add { background: var(--card); padding: 18px; border-radius: 25px; border: 1px solid #334155; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #444; background: #000; color: #fff; margin-top: 5px; }
        .btn-main { width: 100%; background: linear-gradient(90deg, var(--secondary), var(--primary)); color: #fff; border: none; padding: 16px; border-radius: 15px; font-weight: 900; margin-top: 10px; cursor: pointer; }
        
        .btn-sos { position: fixed; bottom: 20px; right: 20px; background: var(--danger); color: white; width: 60px; height: 60px; border-radius: 50%; border: 4px solid #fff; z-index: 1000; font-size: 24px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; }

        .summary-fixed { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--secondary); color: #fff; padding: 15px; text-align: center; font-weight: 900; z-index: 90; border-top: 3px solid var(--primary); font-size: 18px; }
        .btn-fim { position: fixed; bottom: 75px; left: 15px; right: 15px; background: #555; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 900; z-index: 80; }

        .modo-foco #header-principal { background: var(--bg); border-radius: 0; justify-content: center; padding: 10px; }
        .modo-foco .red-line-text, .modo-foco .meta-container { display: none; }
        .modo-foco .logo-box { width: 120px; height: 120px; }
    </style>
</head>
<body id="body-app">

    <div id="conteudo">
        <header id="header-principal">
            <div class="logo-box"><img src="impulsoweb10.jpg" alt="Logo"></div>
            <div class="red-line-text">
                <h2>ELITE MOTO #1</h2>
                <p>PARE DE PERDER TEMPO E DINHEIRO!</p>
            </div>
        </header>

        <div id="aviso-oleo" class="alerta-manutencao">⚠️ ATENÇÃO: HORA DE TROCAR O ÓLEO! (1000km)</div>

        <div class="meta-container">
            <div style="display:flex; justify-content:space-between; font-size:12px; font-weight:900;">
                <span>META DIÁRIA</span>
                <span id="txt-meta">R$ 0 / R$ 200</span>
            </div>
            <div class="meta-bar-bg"><div id="meta-progress"></div></div>
        </div>

        <div class="form-add">
            <label style="font-size:10px; font-weight:bold; color:var(--primary);">META DO DIA R$</label>
            <input type="number" id="meta-valor" value="200" onchange="atualizarMeta()">

            <label style="margin-top:10px; display:block;">DESTINO</label>
            <input type="text" id="cliente" placeholder="Aonde você vai?" onfocus="ativarModoFoco()" onblur="desativarModoFoco()">
            
            <div style="display:flex; gap:10px; margin-top:10px;">
                <div style="flex:1"><label>GANHO R$</label><input type="number" id="valor" placeholder="0.00"></div>
                <div style="flex:1"><label>KM</label><input type="number" id="km" placeholder="0"></div>
            </div>
            
            <button class="btn-main" onclick="salvarEntrega()">SALVAR E GANHAR 💰</button>
        </div>

        <div id="lista-entregas" style="margin-top:20px;"></div>
        
        <button class="btn-fim" onclick="gerarReciboFinal()">🚩 FINALIZAR TURNO</button>
        <div class="summary-fixed" id="footer-lucro">LUCRO LÍQUIDO: R$ 0,00</div>
    </div>

    <button class="btn-sos" onclick="sosGPS()"><i class="fas fa-location-arrow"></i></button>

    <audio id="audio-cash"><source src="https://assets.mixkit.co/active_storage/sfx/2017/2017-preview.mp3" type="audio/mpeg"></audio>

    <div id="modalRecibo" class="overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:2000; padding:20px; flex-direction:column; align-items:center; overflow-y:auto;">
        <div id="recibo-area" style="background:white; color:black; padding:20px; border-radius:5px; width:100%; max-width:350px; font-family:monospace;">
            <div style="text-align:center"><img src="impulsoweb10.jpg" style="width:50px;"><br><b>RELATÓRIO ELITE</b><br><small id="rec-data"></small></div>
            <hr><div id="rec-corpo"></div><hr><div id="rec-resumo"></div>
        </div>
        <button class="btn-main" onclick="enviarWhatsApp()" style="max-width:350px;">🟢 WHATSAPP</button>
        <button class="btn-main" onclick="location.reload()" style="background:#444; max-width:350px;">FECHAR</button>
    </div>

    <script>
        let entregas = JSON.parse(localStorage.getItem('moto_v16_data')) || [];
        let kmTotalApp = parseFloat(localStorage.getItem('moto_v16_km_total')) || 0;
        let metaDiaria = 200;

        function ativarModoFoco() { document.getElementById('body-app').classList.add('modo-foco'); }
        function desativarModoFoco() { if(document.getElementById('cliente').value === "") document.getElementById('body-app').classList.remove('modo-foco'); }

        function atualizarMeta() {
            metaDiaria = parseFloat(document.getElementById('meta-valor').value) || 200;
            atualizarTela();
        }

        function sosGPS() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    const url = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                    window.open(`https://wa.me/?text=🚨 *PEDIDO DE AJUDA!* Estou neste local: ${url}`);
                });
            } else { alert("GPS não disponível."); }
        }

        function salvarEntrega() {
            const v = parseFloat(document.getElementById('valor').value) || 0;
            const k = parseFloat(document.getElementById('km').value) || 0;
            const c = document.getElementById('cliente').value || "Corrida";
            if(v <= 0) return alert("Valor inválido!");

            entregas.push({ cliente: c, valor: v, km: k, manutencao: k * 0.15 });
            kmTotalApp += k;
            
            localStorage.setItem('moto_v16_data', JSON.stringify(entregas));
            localStorage.setItem('moto_v16_km_total', kmTotalApp);

            document.getElementById('audio-cash').play();
            document.getElementById('cliente').value = ''; 
            document.getElementById('valor').value = ''; 
            document.getElementById('km').value = '';
            document.getElementById('body-app').classList.remove('modo-foco');

            // Confete se bater a meta
            let totalBruto = entregas.reduce((a,b) => a + b.valor, 0);
            if(totalBruto >= metaDiaria) {
                confetti({粒子数: 100, spread: 70, origin: { y: 0.6 } });
            }

            atualizarTela();
            gtag('event', 'salvar_corrida', { 'valor': v });
        }

        function atualizarTela() {
            const lista = document.getElementById('lista-entregas');
            lista.innerHTML = ""; let bruto=0, km=0, m=0;
            
            entregas.forEach(e => {
                bruto += e.valor; km += e.km; m += e.manutencao;
                lista.innerHTML += `<div style="background:var(--card); padding:10px; border-radius:10px; margin-bottom:5px; border-left:4px solid var(--primary);">
                    <b>${e.cliente}</b>: R$ ${e.valor.toFixed(2)} (${e.km}km)
                </div>`;
            });

            const gas = (km / 35 * 6.20);
            const lucro = bruto - gas - m;
            document.getElementById('footer-lucro').innerText = `LUCRO LÍQUIDO: R$ ${lucro.toFixed(2)}`;

            // Atualiza Barra de Meta
            let perc = (bruto / metaDiaria) * 100;
            document.getElementById('meta-progress').style.width = Math.min(perc, 100) + "%";
            document.getElementById('txt-meta').innerText = `R$ ${bruto.toFixed(2)} / R$ ${metaDiaria}`;

            // Alerta de Óleo (a cada 1000km rodados no acumulado)
            if(kmTotalApp >= 1000) { document.getElementById('aviso-oleo').style.display = 'block'; }
        }

        function gerarReciboFinal() {
            document.getElementById('modalRecibo').style.display = 'flex';
            document.getElementById('rec-data').innerText = new Date().toLocaleString();
            let b=0, k=0, m=0, h="";
            entregas.forEach(e => {
                b+=e.valor; k+=e.km; m+=e.manutencao;
                h += `• ${e.cliente}: R$ ${e.valor.toFixed(2)}<br>`;
            });
            const g = (k/35*6.20);
            document.getElementById('rec-corpo').innerHTML = h;
            document.getElementById('rec-resumo').innerHTML = `BRUTO: R$ ${b.toFixed(2)}<br>GASOLINA: R$ ${g.toFixed(2)}<br>MANUTENÇÃO: R$ ${m.toFixed(2)}<hr><b>LUCRO: R$ ${(b-g-m).toFixed(2)}</b>`;
        }

        function enviarWhatsApp() {
            let b=0, k=0, m=0, txt = `🏁 *EXTRATO ELITE MOTO*\n\n`;
            entregas.forEach(e => { b+=e.valor; k+=e.km; m+=e.manutencao; });
            const g = (k/35*6.20);
            txt += `💰 Bruto: R$ ${b.toFixed(2)}\n⛽ Gas: R$ ${g.toFixed(2)}\n🛠️ Manut: R$ ${m.toFixed(2)}\n✅ *LUCRO: R$ ${(b-g-m).toFixed(2)}*`;
            window.open(`https://wa.me/?text=${encodeURIComponent(txt)}`);
        }

        atualizarTela();
    </script>
</body>
</html>
