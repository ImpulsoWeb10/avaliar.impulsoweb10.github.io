<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotoGestão Pro - ImpulsoWeb10</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #f58220; --secondary: #004a80; --bg: #0d1212; 
            --card: #1a2222; --text: #ffffff; --success: #22c55e; --danger: #ef4444;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; padding-bottom: 180px; }
        
        /* RED LINE / HEADLINE COM LOGO MAIOR */
        .red-line { 
            background: linear-gradient(135deg, #f58220, #b35a00); 
            padding: 25px; border-radius: 20px; text-align: center; margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(245, 130, 32, 0.4); position: relative; overflow: hidden;
        }
        .logo-box { 
            width: 100px; height: 100px; margin: 0 auto 15px; border-radius: 20px; 
            overflow: hidden; border: 3px solid white; position: relative;
        }
        .logo-box img { width: 100%; height: 100%; object-fit: cover; }
        .logo-box::after {
            content: ""; position: absolute; top: -50%; left: -60%; width: 20%; height: 200%;
            background: rgba(255, 255, 255, 0.4); transform: rotate(30deg); animation: shine 3s infinite;
        }
        @keyframes shine { 0% { left: -60%; } 100% { left: 150%; } }
        .red-line h2 { margin: 0; font-size: 18px; color: #000; font-weight: 900; text-transform: uppercase; }

        /* INTERFACE */
        .form-add { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid #334155; margin-bottom: 20px; }
        label { font-size: 10px; color: var(--primary); font-weight: bold; text-transform: uppercase; display: block; margin: 8px 0 4px; }
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #334155; background: #080c0c; color: white; font-size: 14px; box-sizing: border-box; }
        
        .btn-main { width: 100%; background: linear-gradient(90deg, var(--secondary), var(--primary)); color: #fff; border: none; padding: 16px; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .btn-fim { position: fixed; bottom: 85px; left: 15px; right: 15px; background: var(--danger); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: 900; z-index: 100; }
        .summary-fixed { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--secondary); color: #fff; padding: 18px; text-align: center; font-weight: 900; z-index: 90; border-top: 3px solid var(--primary); }

        /* MODAL RECIBO E HISTÓRICO */
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; padding: 20px; overflow-y: auto; flex-direction: column; align-items: center; }
        .recibo-card { background: white; color: black; padding: 25px; border-radius: 5px; width: 100%; max-width: 380px; font-family: monospace; }
        
        .entrega-item { background: var(--card); padding: 12px; border-radius: 12px; margin-bottom: 8px; border-left: 4px solid var(--secondary); }
        .bloco-gasto-recibo { font-size: 11px; margin-left: 10px; border-left: 1px solid #ddd; padding-left: 5px; color: #555; }
    </style>
</head>
<body>

    <div id="ativacao" style="position: fixed; inset: 0; background: var(--bg); z-index: 3000; display: flex; align-items: center; justify-content: center; padding: 20px; text-align: center;">
        <div>
            <div class="logo-box" style="width:130px; height:130px;"><img src="impulsoweb10.jpg"></div>
            <h1 style="color:var(--primary)">MOTO GESTÃO</h1>
            <input type="text" id="lead-nome" placeholder="Seu Nome Profissional">
            <button class="btn-main" onclick="ativar()">ATIVAR PAINEL 🚀</button>
        </div>
    </div>

    <div id="conteudo" style="display:none;">
        <div class="red-line">
            <div class="logo-box"><img src="impulsoweb10.jpg"></div>
            <h2>PARE DE PERDER DINHEIRO NAS RUAS!</h2>
        </div>

        <button class="btn-main" style="background:var(--card); border:1px solid var(--primary); margin-bottom:15px;" onclick="verHistorico()">📁 VER HISTÓRICO ANTERIOR</button>

        <div class="form-add">
            <label>Destino / Cliente</label>
            <input type="text" id="cliente" placeholder="Ex: Ifood, Loggi, Particular...">
            <div style="display:flex; gap:10px;">
                <div style="flex:1"><label>Valor R$</label><input type="number" id="valor" placeholder="0.00"></div>
                <div style="flex:1"><label>KM Rodado</label><input type="number" id="km" placeholder="0"></div>
            </div>
            <label>Despesa desta Entrega</label>
            <div style="display:flex; gap:5px;">
                <input type="number" id="gasto-total-input" placeholder="R$ 0.00" readonly onclick="abrirModalGasto()">
                <button onclick="abrirModalGasto()" style="background:var(--danger); border:none; color:white; width:50px; border-radius:10px; font-weight:bold; font-size:20px;">+</button>
            </div>
            <button class="btn-main" onclick="salvarEntrega()">SALVAR ENTREGA ✅</button>
        </div>

        <div id="lista-entregas"></div>
        <button class="btn-fim" onclick="gerarReciboFinal()">🚩 FIM DO EXPEDIENTE (RESUMO)</button>
        <div class="summary-fixed" id="footer-lucro">LUCRO: R$ 0,00</div>
    </div>

    <div id="modalGasto" class="overlay" style="justify-content:center;">
        <div class="form-add" style="width:100%; max-width:320px;">
            <h3 style="color:var(--primary); margin-top:0;">Adicionar Gasto</h3>
            <select id="tipo-gasto"><option>Combustível</option><option>Pedágio</option><option>Almoço</option><option>Outros</option></select>
            <input type="number" id="valor-gasto" placeholder="R$ 0.00" style="margin-top:10px;">
            <button class="btn-main" onclick="addGastoLista()">ADICIONAR</button>
            <div id="preview-gastos" style="font-size:12px; color:var(--danger); margin:10px 0;"></div>
            <button class="btn-main" style="background:var(--success)" onclick="document.getElementById('modalGasto').style.display='none'">CONFIRMAR ✅</button>
        </div>
    </div>

    <div id="modalRecibo" class="overlay">
        <div id="recibo-area" class="recibo-card">
            <div style="text-align:center">
                <img src="impulsoweb10.jpg" style="width:80px; border-radius:15px;">
                <h3 style="margin:5px 0;">FECHAMENTO DETALHADO</h3>
                <small id="rec-data"></small>
            </div>
            <hr>
            <div id="rec-corpo"></div>
            <hr>
            <div id="rec-resumo-financeiro"></div>
        </div>
        <div style="width:100%; max-width:380px; margin-top:15px;">
            <button class="btn-main" onclick="baixarPDF()">📥 BAIXAR PDF</button>
            <button class="btn-main" style="background:#25D366" onclick="enviarWhatsApp()">🟢 MANDAR TUDO NO WHATSAPP</button>
            <button class="btn-main" style="background:var(--success)" onclick="arquivarEFechar()">💾 SALVAR NO HISTÓRICO E LIMPAR</button>
            <button class="btn-main" style="background:transparent; border:1px solid #fff;" onclick="document.getElementById('modalRecibo').style.display='none'">VOLTAR</button>
        </div>
    </div>

    <div id="modalHistorico" class="overlay">
        <div class="form-add" style="width:100%; max-width:350px;">
            <h2 style="color:var(--primary)">HISTÓRICO DE LUCROS</h2>
            <div id="lista-hist" style="max-height:300px; overflow-y:auto;"></div>
            <button class="btn-main" onclick="document.getElementById('modalHistorico').style.display='none'">FECHAR</button>
        </div>
    </div>

    <script>
        let entregas = JSON.parse(localStorage.getItem('moto_entregas_v8')) || [];
        let gastosTemp = [];
        let historico = JSON.parse(localStorage.getItem('moto_hist_v8')) || [];

        function ativar() {
            const n = document.getElementById('lead-nome').value;
            if(!n) return;
            localStorage.setItem('user', n.toUpperCase());
            location.reload();
        }

        window.onload = () => {
            if(localStorage.getItem('user')) {
                document.getElementById('ativacao').style.display = 'none';
                document.getElementById('conteudo').style.display = 'block';
                atualizarTela();
            }
        };

        function abrirModalGasto() { document.getElementById('modalGasto').style.display = 'flex'; }

        function addGastoLista() {
            const v = parseFloat(document.getElementById('valor-gasto').value);
            const t = document.getElementById('tipo-gasto').value;
            if(!v) return;
            gastosTemp.push({tipo: t, valor: v});
            document.getElementById('preview-gastos').innerHTML += `<div>• ${t}: R$ ${v.toFixed(2)}</div>`;
            document.getElementById('gasto-total-input').value = gastosTemp.reduce((a,b)=>a+b.valor,0).toFixed(2);
            document.getElementById('valor-gasto').value = '';
        }

        function salvarEntrega() {
            const v = parseFloat(document.getElementById('valor').value) || 0;
            const k = parseFloat(document.getElementById('km').value) || 0;
            const c = document.getElementById('cliente').value || "Entrega";
            entregas.push({cliente: c, valor: v, km: k, gastos: [...gastosTemp], totalG: gastosTemp.reduce((a,b)=>a+b.valor,0)});
            localStorage.setItem('moto_entregas_v8', JSON.stringify(entregas));
            gastosTemp = []; document.getElementById('preview-gastos').innerHTML = '';
            document.getElementById('cliente').value = ''; document.getElementById('valor').value = ''; document.getElementById('km').value = '';
            document.getElementById('gasto-total-input').value = '';
            atualizarTela();
        }

        function atualizarTela() {
            const lista = document.getElementById('lista-entregas');
            lista.innerHTML = ""; let b=0, k=0, g=0;
            entregas.forEach(e => {
                b += e.valor; k += e.km; g += e.totalG;
                let txtG = e.gastos.map(gt => `<br><small style="color:var(--danger)">- ${gt.tipo}: R$ ${gt.valor.toFixed(2)}</small>`).join('');
                lista.innerHTML += `<div class="entrega-item"><div style="display:flex; justify-content:space-between; width:100%;"><div><b>${e.cliente}</b><br><small>${e.km} KM</small>${txtG}</div> <b>R$ ${e.valor.toFixed(2)}</b></div></div>`;
            });
            const cKm = (k / 35 * 5.80) + (k * 0.15);
            document.getElementById('footer-lucro').innerText = `LUCRO: R$ ${(b - cKm - g).toFixed(2)}`;
        }

        function gerarReciboFinal() {
            document.getElementById('modalRecibo').style.display = 'flex';
            document.getElementById('rec-data').innerText = new Date().toLocaleString();
            let b=0, k=0, g=0, html = "";
            entregas.forEach(e => {
                b += e.valor; k += e.km; g += e.totalG;
                html += `<div style="margin-bottom:10px;"><b>${e.cliente}</b>: R$ ${e.valor.toFixed(2)}`;
                e.gastos.forEach(gt => html += `<div class="bloco-gasto-recibo">└ ${gt.tipo}: R$ ${gt.valor.toFixed(2)}</div>`);
                html += `</div>`;
            });
            const cKm = (k / 35 * 5.80) + (k * 0.15);
            document.getElementById('rec-corpo').innerHTML = html;
            document.getElementById('rec-resumo-financeiro').innerHTML = `
                <div style="display:flex; justify-content:space-between;"><span>TOTAL BRUTO:</span> <b>R$ ${b.toFixed(2)}</b></div>
                <div style="display:flex; justify-content:space-between;"><span>GASTO COMBUSTÍVEL/KM:</span> <b>R$ ${cKm.toFixed(2)}</b></div>
                <div style="display:flex; justify-content:space-between; background:#000; color:#fff; padding:8px; margin-top:10px;"><span>LUCRO REAL:</span> <b>R$ ${(b - cKm - g).toFixed(2)}</b></div>
            `;
        }

        function enviarWhatsApp() {
            let user = localStorage.getItem('user');
            let b=0, k=0, g=0;
            let txt = `🏁 *RESUMO DETALHADO - ${user}*\n\n`;
            entregas.forEach(e => {
                txt += `📦 *${e.cliente}*: R$ ${e.valor.toFixed(2)}\n`;
                e.gastos.forEach(gt => txt += `   └ 💸 ${gt.tipo}: R$ ${gt.valor.toFixed(2)}\n`);
                b += e.valor; k += e.km; g += e.totalG;
            });
            const cKm = (k / 35 * 5.80) + (k * 0.15);
            txt += `\n──────────────────\n💰 *BRUTO:* R$ ${b.toFixed(2)}\n⛽ *KM/COMBUSTÍVEL:* R$ ${cKm.toFixed(2)}\n──────────────────\n✅ *LUCRO LÍQUIDO: R$ ${(b - cKm - g).toFixed(2)}*`;
            window.open(`https://wa.me/?text=${encodeURIComponent(txt)}`);
        }

        function baixarPDF() {
            const { jsPDF } = window.jspdf;
            html2canvas(document.querySelector("#recibo-area")).then(canvas => {
                const pdf = new jsPDF('p', 'mm', 'a4');
                pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 10, 10, 180, 0);
                pdf.save(`extrato_${localStorage.getItem('user')}.pdf`);
            });
        }

        function arquivarEFechar() {
            if(confirm("Deseja salvar no histórico e limpar o painel?")) {
                historico.push({ data: new Date().toLocaleDateString(), lucro: document.getElementById('footer-lucro').innerText });
                localStorage.setItem('moto_hist_v8', JSON.stringify(historico));
                localStorage.removeItem('moto_entregas_v8');
                location.reload();
            }
        }

        function verHistorico() {
            document.getElementById('modalHistorico').style.display = 'flex';
            document.getElementById('lista-hist').innerHTML = historico.map(h => `<div style="padding:10px; border-bottom:1px solid #334155; display:flex; justify-content:space-between;"><span>${h.data}</span> <b>${h.lucro}</b></div>`).join('');
        }
    </script>
</body>
</html>
