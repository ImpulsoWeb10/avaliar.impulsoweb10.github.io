<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotoGestão Pro - ImpulsoWeb10</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #f58220; --secondary: #004a80; --bg: #0d1212; 
            --card: #1a2222; --text: #ffffff; --success: #22c55e; --danger: #ef4444;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; padding-bottom: 180px; }
        
        /* RED LINE PERSUASIVA V9 */
        .red-line { 
            background: linear-gradient(135deg, #f58220 0%, #ff9d4d 50%, #b35a00 100%); 
            padding: 30px 20px; 
            border-radius: 0 0 35px 35px;
            margin: -15px -15px 25px -15px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(245, 130, 32, 0.4);
            position: relative;
            overflow: hidden;
            border-bottom: 5px solid var(--secondary);
        }
        .logo-box { 
            width: 110px; height: 110px; margin: 0 auto 15px; border-radius: 25px; 
            border: 4px solid #fff; box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            position: relative; overflow: hidden; transform: rotate(-3deg);
        }
        .logo-box img { width: 100%; height: 100%; object-fit: cover; }
        .logo-box::after {
            content: ""; position: absolute; top: -50%; left: -60%; width: 20%; height: 200%;
            background: rgba(255, 255, 255, 0.4); transform: rotate(30deg); animation: shine 3s infinite;
        }
        @keyframes shine { 0% { left: -60%; } 100% { left: 150%; } }
        
        .red-line h2 { margin: 0; font-size: 19px; color: #000; font-weight: 900; line-height: 1.2; text-transform: uppercase; }
        .red-line p { margin: 10px 0 0; font-size: 13px; font-weight: 800; color: #fff; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }

        /* INTERFACE */
        .form-add { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid #334155; margin-bottom: 20px; }
        label { font-size: 10px; color: var(--primary); font-weight: bold; text-transform: uppercase; display: block; margin: 8px 0 4px; }
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #334155; background: #080c0c; color: white; font-size: 14px; box-sizing: border-box; }
        
        .btn-main { width: 100%; background: linear-gradient(90deg, var(--secondary), var(--primary)); color: #fff; border: none; padding: 18px; border-radius: 15px; font-weight: 900; cursor: pointer; text-transform: uppercase; margin-top: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .btn-fim { position: fixed; bottom: 85px; left: 15px; right: 15px; background: var(--danger); color: white; border: none; padding: 18px; border-radius: 15px; font-weight: 900; z-index: 100; box-shadow: 0 -5px 20px rgba(239, 68, 68, 0.3); }
        .summary-fixed { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--secondary); color: #fff; padding: 18px; text-align: center; font-weight: 900; z-index: 90; border-top: 3px solid var(--primary); font-size: 18px; }

        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; padding: 20px; overflow-y: auto; flex-direction: column; align-items: center; }
        .recibo-card { background: white; color: black; padding: 25px; border-radius: 5px; width: 100%; max-width: 380px; font-family: monospace; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .entrega-card-main { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 10px; border-left: 5px solid var(--primary); }
        .gasto-linha { font-size: 12px; color: var(--danger); margin-top: 5px; padding-left: 10px; border-left: 1px solid #444; }
    </style>
</head>
<body>

    <div id="conteudo">
        <div class="red-line">
            <div class="logo-box"><img src="impulsoweb10.jpg"></div>
            <h2>O SISTEMA Nº1 DOS<br><span style="background:#000; color:#fff; padding: 0 5px;">ENTREGADORES DE ELITE</span></h2>
            <p>PARE DE PERDER TEMPO E DINHEIRO AGORA!</p>
        </div>

        <button class="btn-main" style="background:var(--card); border:1px solid var(--primary); margin-bottom:20px;" onclick="verHistorico()">📁 MEU HISTÓRICO DE LUCROS</button>

        <div class="form-add">
            <label>Onde foi a entrega?</label>
            <input type="text" id="cliente" placeholder="Ex: Ifood, Pizzaria, Particular...">
            <div style="display:flex; gap:10px;">
                <div style="flex:1"><label>Ganho R$</label><input type="number" id="valor" placeholder="0.00"></div>
                <div style="flex:1"><label>KM</label><input type="number" id="km" placeholder="0"></div>
            </div>
            <label>Despesas Extras (Pedágio, Lanche...)</label>
            <div style="display:flex; gap:5px;">
                <input type="number" id="gasto-total-input" placeholder="R$ 0.00" readonly onclick="abrirModalGasto()">
                <button onclick="abrirModalGasto()" style="background:var(--danger); color:white; border:none; width:60px; border-radius:10px; font-weight:bold; font-size:22px;">+</button>
            </div>
            <button class="btn-main" onclick="salvarEntrega()">SALVAR CORRIDA ✅</button>
        </div>

        <div id="lista-entregas"></div>
        <button class="btn-fim" onclick="gerarReciboFinal()">🚩 FINALIZAR EXPEDIENTE</button>
        <div class="summary-fixed" id="footer-lucro">LUCRO REAL: R$ 0,00</div>
    </div>

    <div id="modalGasto" class="overlay" style="justify-content:center;">
        <div class="form-add" style="width:100%; max-width:320px; border-color:var(--danger);">
            <h3 style="color:var(--danger); margin-top:0;">Lançar Despesa</h3>
            <select id="tipo-gasto"><option>Combustível</option><option>Pedágio</option><option>Almoço</option><option>Lanche</option><option>Oficina</option></select>
            <input type="number" id="valor-gasto" placeholder="R$ 0.00" style="margin-top:15px;">
            <button class="btn-main" style="background:var(--danger)" onclick="addGastoLista()">ADICIONAR GASTO</button>
            <div id="preview-gastos" style="margin:15px 0; font-size:13px; color:var(--danger);"></div>
            <button class="btn-main" style="background:var(--success)" onclick="document.getElementById('modalGasto').style.display='none'">CONFIRMAR ✅</button>
        </div>
    </div>

    <div id="modalRecibo" class="overlay">
        <div id="recibo-area" class="recibo-card">
            <div style="text-align:center">
                <img src="impulsoweb10.jpg" style="width:80px; border-radius:15px; transform: rotate(-3deg);">
                <h3 style="margin:10px 0 5px;">EXTRATO DE ELITE</h3>
                <small id="rec-data"></small>
            </div>
            <div style="border-top:1px dashed #000; margin:15px 0;"></div>
            <div id="rec-corpo"></div>
            <div style="border-top:1px dashed #000; margin:15px 0;"></div>
            <div id="rec-resumo-financeiro"></div>
            <p style="text-align:center; font-size:9px; margin-top:15px;">ImpulsoWeb10 - Gestão de Alta Performance</p>
        </div>
        <div style="width:100%; max-width:380px; margin-top:20px;">
            <button class="btn-main" onclick="baixarPDF()"><i class="fas fa-file-pdf"></i> BAIXAR RECIBO PDF</button>
            <button class="btn-main" style="background:#25D366" onclick="enviarWhatsApp()"><i class="fab fa-whatsapp"></i> ENVIAR DETALHADO NO WHATSAPP</button>
            <button class="btn-main" style="background:var(--success)" onclick="arquivarEFechar()">💾 ARQUIVAR E LIMPAR DIA</button>
            <button class="btn-main" style="background:transparent; border:1px solid #fff;" onclick="document.getElementById('modalRecibo').style.display='none'">CORRIGIR ALGO</button>
        </div>
    </div>

    <div id="modalHistorico" class="overlay">
        <div class="form-add" style="width:100%; max-width:350px;">
            <h2 style="color:var(--primary)">HISTÓRICO DE LUCROS</h2>
            <div id="lista-hist" style="max-height:400px; overflow-y:auto;"></div>
            <button class="btn-main" onclick="document.getElementById('modalHistorico').style.display='none'">VOLTAR AO PAINEL</button>
        </div>
    </div>

    <script>
        let entregas = JSON.parse(localStorage.getItem('moto_v9_data')) || [];
        let gastosTemp = [];
        let historico = JSON.parse(localStorage.getItem('moto_v9_hist')) || [];

        window.onload = () => { atualizarTela(); };

        function abrirModalGasto() { document.getElementById('modalGasto').style.display = 'flex'; }

        function addGastoLista() {
            const v = parseFloat(document.getElementById('valor-gasto').value);
            const t = document.getElementById('tipo-gasto').value;
            if(!v) return;
            gastosTemp.push({tipo: t, valor: v});
            document.getElementById('preview-gastos').innerHTML += `<div>❌ ${t}: R$ ${v.toFixed(2)}</div>`;
            document.getElementById('gasto-total-input').value = gastosTemp.reduce((a,b)=>a+b.valor,0).toFixed(2);
            document.getElementById('valor-gasto').value = '';
        }

        function salvarEntrega() {
            const v = parseFloat(document.getElementById('valor').value) || 0;
            const k = parseFloat(document.getElementById('km').value) || 0;
            const c = document.getElementById('cliente').value || "Entrega";
            if(v === 0) return alert("Insira o valor da entrega!");
            entregas.push({cliente: c, valor: v, km: k, gastos: [...gastosTemp], totalG: gastosTemp.reduce((a,b)=>a+b.valor,0)});
            localStorage.setItem('moto_v9_data', JSON.stringify(entregas));
            gastosTemp = []; document.getElementById('preview-gastos').innerHTML = '';
            document.getElementById('cliente').value = ''; document.getElementById('valor').value = ''; document.getElementById('km').value = '';
            document.getElementById('gasto-total-input').value = '';
            atualizarTela();
        }

        function atualizarTela() {
            const lista = document.getElementById('lista-entregas');
            lista.innerHTML = ""; let b=0, k=0, g=0;
            entregas.forEach(e => {
                b += e.valor; k += e.km; g += e.totalG;
                let hG = e.gastos.map(gt => `<div class="gasto-linha">└ ${gt.tipo}: R$ ${gt.valor.toFixed(2)}</div>`).join('');
                lista.innerHTML += `<div class="entrega-card-main"><div style="display:flex; justify-content:space-between;"><div><b>${e.cliente}</b><br><small>${e.km} KM</small></div><b style="color:var(--success)">R$ ${e.valor.toFixed(2)}</b></div>${hG}</div>`;
            });
            const cKm = (k / 35 * 5.80) + (k * 0.15);
            document.getElementById('footer-lucro').innerText = `LUCRO REAL: R$ ${(b - cKm - g).toFixed(2)}`;
        }

        function gerarReciboFinal() {
            if(entregas.length === 0) return alert("Nenhuma entrega lançada!");
            document.getElementById('modalRecibo').style.display = 'flex';
            document.getElementById('rec-data').innerText = new Date().toLocaleString();
            let b=0, k=0, g=0, html = "";
            entregas.forEach(e => {
                b += e.valor; k += e.km; g += e.totalG;
                html += `<div style="margin-bottom:8px;"><b>${e.cliente}</b>: R$ ${e.valor.toFixed(2)}`;
                e.gastos.forEach(gt => html += `<div style="font-size:10px; color:#555; padding-left:10px;">└ ${gt.tipo}: R$ ${gt.valor.toFixed(2)}</div>`);
                html += `</div>`;
            });
            const cKm = (k / 35 * 5.80) + (k * 0.15);
            document.getElementById('rec-corpo').innerHTML = html;
            document.getElementById('rec-resumo-financeiro').innerHTML = `
                <div style="display:flex; justify-content:space-between;"><span>TOTAL BRUTO:</span> <b>R$ ${b.toFixed(2)}</b></div>
                <div style="display:flex; justify-content:space-between;"><span>COMBUSTÍVEL/KM:</span> <b>R$ ${cKm.toFixed(2)}</b></div>
                <div style="display:flex; justify-content:space-between; background:#000; color:#fff; padding:10px; margin-top:10px; font-size:18px;"><span>LUCRO:</span> <b>R$ ${(b - cKm - g).toFixed(2)}</b></div>
            `;
        }

        function enviarWhatsApp() {
            let user = localStorage.getItem('user') || "Piloto";
            let b=0, k=0, g=0;
            let txt = `🏁 *EXTRATO DE ELITE - ${user}*\n\n`;
            entregas.forEach(e => {
                txt += `📦 *${e.cliente}*: R$ ${e.valor.toFixed(2)}\n`;
                e.gastos.forEach(gt => txt += `   └ 💸 ${gt.tipo}: R$ ${gt.valor.toFixed(2)}\n`);
                b += e.valor; k += e.km; g += e.totalG;
            });
            const cKm = (k / 35 * 5.80) + (k * 0.15);
            txt += `\n──────────────────\n💰 *BRUTO:* R$ ${b.toFixed(2)}\n⛽ *KM/COMBUST:* R$ ${cKm.toFixed(2)}\n──────────────────\n✅ *LUCRO REAL: R$ ${(b - cKm - g).toFixed(2)}*`;
            window.open(`https://wa.me/?text=${encodeURIComponent(txt)}`);
        }

        function baixarPDF() {
            const { jsPDF } = window.jspdf;
            html2canvas(document.querySelector("#recibo-area")).then(canvas => {
                const pdf = new jsPDF('p', 'mm', 'a4');
                pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 10, 10, 180, 0);
                pdf.save(`extrato_elite.pdf`);
            });
        }

        function arquivarEFechar() {
            if(confirm("Deseja salvar no histórico e zerar o painel para o próximo dia?")) {
                historico.push({ data: new Date().toLocaleDateString(), lucro: document.getElementById('footer-lucro').innerText });
                localStorage.setItem('moto_v9_hist', JSON.stringify(historico));
                localStorage.removeItem('moto_v9_data');
                location.reload();
            }
        }

        function verHistorico() {
            document.getElementById('modalHistorico').style.display = 'flex';
            document.getElementById('lista-hist').innerHTML = historico.length ? historico.map(h => `<div style="padding:15px; border-bottom:1px solid #334155; display:flex; justify-content:space-between;"><span>${h.data}</span> <b style="color:var(--success)">${h.lucro}</b></div>`).join('') : "<p style='text-align:center'>Nenhum registro ainda.</p>";
        }
    </script>
</body>
</html>
