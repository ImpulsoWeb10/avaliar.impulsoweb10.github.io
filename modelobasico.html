<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Avaliação</title>

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXX"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-XXXXXXX');
</script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #4facfe, #00f2fe);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: white;
  padding: 25px;
  border-radius: 20px;
  width: 320px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  animation: fadeIn 0.8s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform: translateY(20px);}
  to {opacity:1; transform: translateY(0);}
}

.logo {
  width: 80px;
  margin-bottom: 10px;
}

.stars {
  font-size: 35px;
  cursor: pointer;
  margin: 15px 0;
}

.star { color: #ccc; }
.star.active { color: gold; }

button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  cursor: pointer;
  transition: 0.2s;
}

button:hover { transform: scale(1.03); }

.whats { background: #25D366; color: white; }
.google { background: #4285F4; color: white; }

.contador {
  font-size: 12px;
  color: #777;
  margin-top: 10px;
}

footer {
  margin-top: 20px;
  font-size: 12px;
  color: #777;
}
</style>

</head>
<body>

<div class="card">

<img id="logo" class="logo" src="" alt="Logo">

<h2 id="nomeEmpresa"></h2>
<p>Como foi sua experiência?</p>

<div class="stars">
  <span class="star" onclick="avaliar(1)">★</span>
  <span class="star" onclick="avaliar(2)">★</span>
  <span class="star" onclick="avaliar(3)">★</span>
  <span class="star" onclick="avaliar(4)">★</span>
  <span class="star" onclick="avaliar(5)">★</span>
</div>

<div id="acoes"></div>

<div class="contador" id="contador"></div>

<footer>
<p>
Desenvolvido por 
<a href="https://impulsoweb10.com.br" onclick="abrirImpulso()">
<strong>ImpulsoWeb10</strong>
</a>
</p>

<p>🔒 Conexão segura (SSL)</p>

<button onclick="abrirWhatsappImpulso()" class="whats">
Quero um sistema assim
</button>
</footer>

</div>

<!-- CONFIG -->
<script>
const CONFIG = {
  cliente: "otica_lionda",
  nomeEmpresa: "Ótica Lionda",
  logo: "https://via.placeholder.com/80",

  whatsappCliente: "5511999999999",
  linkGoogle: "https://g.page/r/SEULINK/review",

  seuWhatsapp: "5511954950044",
  seuSite: "https://impulsoweb10.com.br"
};
</script>

<script>
let totalAvaliacoes = localStorage.getItem('totalAvaliacoes') || 0;

function atualizarContador() {
  document.getElementById("contador").innerText =
    totalAvaliacoes + " pessoas já avaliaram";
}

function track(evento, estrelas) {
  gtag('event', evento, {
    cliente: CONFIG.cliente,
    estrelas: estrelas
  });
}

function avaliar(nota) {
  let stars = document.querySelectorAll('.star');

  stars.forEach((s, i) => {
    s.classList.toggle('active', i < nota);
  });

  totalAvaliacoes++;
  localStorage.setItem('totalAvaliacoes', totalAvaliacoes);
  atualizarContador();

  track('avaliacao', nota);

  let acoes = document.getElementById("acoes");

  if (nota <= 3) {
    acoes.innerHTML = `
      <p>😕 Vamos resolver isso!</p>
      <button class="whats" onclick="abrirWhatsapp(${nota})">
        Falar no WhatsApp
      </button>
    `;
  } else {
    acoes.innerHTML = `
      <p>😍 Nos ajude com sua avaliação!</p>
      <button class="google" onclick="abrirGoogle(${nota})">
        Avaliar no Google
      </button>
    `;
  }
}

function abrirWhatsapp(nota) {
  track('clique_whatsapp_cliente', nota);
  window.open(`https://wa.me/${CONFIG.whatsappCliente}`, '_blank');
}

function abrirGoogle(nota) {
  track('clique_google_review', nota);
  window.open(CONFIG.linkGoogle, '_blank');
}

function abrirImpulso() {
  track('clique_impulso_web10');
  window.open(CONFIG.seuSite, '_blank');
}

function abrirWhatsappImpulso() {
  track('clique_whatsapp_impulso');
  window.open(`https://wa.me/${CONFIG.seuWhatsapp}`, '_blank');
}

// INIT
document.getElementById("nomeEmpresa").innerText = CONFIG.nomeEmpresa;
document.getElementById("logo").src = CONFIG.logo;
atualizarContador();
</script>

</body>
</html>
