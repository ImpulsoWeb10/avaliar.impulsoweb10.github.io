<!DOCTYPE html>
<html lang="pt-br">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-DQEEFFQCDS"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-DQEEFFQCDS');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avalie Sonat Music | Escola de Música ⭐⭐⭐⭐⭐</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --gold: #fbbf24; --accent: #38bdf8; --glass: rgba(255, 255, 255, 0.1); }
        body { margin:0; font-family:'Segoe UI',sans-serif; background:linear-gradient(-45deg,#0f172a,#1e293b,#2e1065,#0f172a); background-size:400% 400%; animation:grad 12s infinite; display:flex; justify-content:center; align-items:center; min-height:100vh; color:white; text-align:center; overflow:hidden; }
        @keyframes grad { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

        .card { background:rgba(0,0,0,0.55); padding:40px 25px; border-radius:30px; backdrop-filter:blur(15px); max-width:350px; width:90%; box-shadow:0 25px 50px rgba(0,0,0,0.6); border:1px solid rgba(255,255,255,0.1); animation:up 0.8s; }
        @keyframes up { from{opacity:0; transform:translateY(20px)} to{opacity:1; transform:translateY(0)} }

        .logo { width:110px; border-radius:15px; margin-bottom:15px; background:white; }
        .stars { color: var(--gold); font-size:24px; margin-bottom:10px; animation: starPulse 2.5s infinite; }
        @keyframes starPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.15); text-shadow:0 0 20px var(--gold);} }

        .seo-phrase { font-size: 13px; color: var(--gold); font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 25px; display: block; }

        /* BOTÃO GOOGLE */
        .btn-google { position:relative; display:block; margin:10px auto; padding:16px; width:90%; font-weight:800; text-decoration:none; border-radius:50px; background: var(--gold); color:#000; text-transform:uppercase; font-size:14px; overflow:hidden; animation: pulseBtn 2s infinite; border:none; cursor:pointer; }
        @keyframes pulseBtn { 0% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(251, 191, 36, 0); } 100% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0); } }

        .social-row { display:flex; justify-content:center; gap:12px; margin:20px 0; }
        .icon-btn { width:50px; height:50px; border-radius:50%; display:flex; align-items:center; justify-content:center; text-decoration:none; color:white; font-size:20px; transition:0.3s; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); cursor:pointer; }
        .wa { background:#25D366; } .ig { background:linear-gradient(45deg,#833ab4,#fd1d1d,#fcb045); } .maps { background:#ea4335; } .tel { background:#38bdf8; }
        
        /* MODAL LINDÃO */
        #modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); backdrop-filter:blur(10px); z-index:999; justify-content:center; align-items:center; }
        .modal-content { background:rgba(255,255,255,0.05); padding:40px 30px; border-radius:25px; border:1px solid rgba(255,255,255,0.2); max-width:300px; width:80%; }
        .modal-icon { font-size: 50px; margin-bottom: 20px; color: var(--gold); }
        .progress-bar { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-top: 20px; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: var(--gold); transition: width 4s linear; }

        /* RODAPÉ ATUALIZADO */
        footer { margin-top:25px; padding-top:20px; border-top:1px solid rgba(255,255,255,0.1); }
        .cta-vendas { display: block; background: rgba(56, 189, 248, 0.1); padding: 15px; border-radius: 15px; border: 1px solid rgba(56, 189, 248, 0.2); }
        .cta-vendas b { color: var(--accent); display: block; font-size: 12px; margin-bottom: 8px; line-height: 1.4; }
        .cta-vendas a { color: #fff; background: var(--accent); padding: 6px 12px; border-radius: 8px; text-decoration: none; font-weight: 800; font-size: 10px; text-transform: uppercase; }
    </style>
</head>
<body>

<main class="card">
    <img src="logo.jpeg" class="logo" alt="Sonat Music">
    <h1 style="font-size:26px; margin:0;">Sonat Music</h1>
    <span class="seo-phrase">Excelência Musical em Itaquaquecetuba</span>

    <div class="stars"><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i></div>

    <button class="btn-google" onclick="openModal('google', 'https://g.page/r/CRkmaq9U_Z8dEAE/review', 'Sua avaliação é nossa maior nota! ❤️')">
        <i class="fab fa-google"></i> AVALIAR NO GOOGLE
    </button>

    <div class="social-row">
        <div class="icon-btn wa" onclick="openModal('whatsapp', 'https://wa.me/5511912035161', 'Iniciando sua conexão com a música... 💬')"><i class="fab fa-whatsapp"></i></div>
        <div class="icon-btn tel" onclick="openModal('phone', 'tel:11947037628', 'Ligando para nossa recepção... 📞')"><i class="fas fa-phone"></i></div>
        <div class="icon-btn ig" onclick="openModal('instagram', 'https://www.instagram.com/sonat_amusic', 'Explorando nossos talentos no Instagram... 📸')"><i class="fab fa-instagram"></i></div>
        <div class="icon-btn maps" onclick="openModal('location-dot', 'https://goo.gl/maps/CRkmaq9U_Z8dEAE', 'Traçando sua rota para a harmonia... 📍')"><i class="fas fa-location-dot"></i></div>
    </div>

    <div style="font-size:11px; opacity:0.6; margin:15px 0;" onclick="openModal('map-pin', '#', 'Endereço: Av. Turmalina, 1111 - Itaquaquecetuba')">
        <i class="fas fa-map-marker-alt"></i> Av. Turmalina, 1111 - Itaquaquecetuba - SP
    </div>

    <footer>
        <div class="cta-vendas">
            <b>Deseja ter *seu* link personalizado igual esse, para ser mais relevante nas pesquisas do Google?</b>
            <a href="https://wa.me/5511954950044?text=Olá! Quero um link personalizado igual o da Sonat Music." target="_blank">
                SAIBA MAIS <i class="fas fa-arrow-right"></i>
            </a>
        </div>
        <div style="opacity:0.4; font-size:9px; margin-top:10px;">Desenvolvido por ImpulsoWeb10</div>
    </footer>
</main>

<div id="modal">
    <div class="modal-content">
        <div class="modal-icon"><i id="modal-i" class="fas fa-circle-notch fa-spin"></i></div>
        <h3 id="modal-text" style="font-size:16px; line-height:1.4;">Carregando...</h3>
        <div class="progress-bar"><div id="fill" class="progress-fill"></div></div>
        <p style="font-size:10px; margin-top:15px; opacity:0.5;">Você será redirecionado em instantes</p>
    </div>
</div>

<script>
function openModal(icon, url, text) {
    const modal = document.getElementById('modal');
    const modalText = document.getElementById('modal-text');
    const modalIcon = document.getElementById('modal-i');
    const fill = document.getElementById('fill');

    modalIcon.className = 'fas fa-' + icon;
    modalText.innerText = text;
    modal.style.display = 'flex';
    
    // Inicia animação da barra
    setTimeout(() => { fill.style.width = '100%'; }, 50);

    // Redireciona após 4 segundos
    setTimeout(() => {
        if(url !== '#') window.location.href = url;
        else modal.style.display = 'none'; // Se for apenas o endereço, fecha o modal
    }, 4000);
}
</script>

</body>
</html>
