<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Central de Avaliações | ImpulsoWeb10</title>

<style>
/* NOVAS VARIÁVEIS DE CORES INSPIRADAS NA REFERÊNCIA */
:root {
    --bg-dark: #070a0a;             /* Verde-escuro profundo (fundo principal) */
    --card-bg: #0d1212;             /* Verde ligeiramente mais claro (para o 'modal') */
    --neon-green: #38e391;          /* Verde reluzente brilhante (para botoes e detalhes) */
    --neon-green-dim: rgba(56, 227, 145, 0.4); /* Neon sutil para bordas */
    --text-primary: #fcfdfd;        /* Texto quase branco */
    --text-secondary: #c1c5c5;      /* Texto cinza-claro */
    --border-dim: #1d2525;          /* Borda escura sutil */
}

body {
    font-family: Arial, sans-serif;
    /* Fundo escuro principal */
    background: var(--bg-dark);
    margin: 0;
    /* Texto global claro */
    color: var(--text-secondary);
}

header {
    text-align: center;
    padding: 40px 20px;
    /* Header sutilmente mais claro, sem borda branca */
    background: rgba(13, 18, 18, 0.5);
    border-bottom: 1px solid var(--border-dim);
}

h1 {
    margin: 0;
    font-size: 1.8rem;
    /* Título claro */
    color: var(--text-primary);
}

main {
    display: flex;
    justify-content: center;
    padding: 40px 10px;
    /* ADICIONADO: Um sutil degradê radial no fundo para simular a luz central da referência */
    background: radial-gradient(circle at center, #102a2a 0%, var(--bg-dark) 70%);
}

.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    width: 100%;
    max-width: 1000px;
}

/* CARTÕES TRANSFORMADOS EM 'BOTOES MODAL' ESCUROS */
.card {
    background: var(--card-bg); /* Fundo modal escuro */
    border-radius: 16px; /* Cantos mais arredondados */
    padding: 20px;
    text-align: center;
    /* Borda muito sutil */
    border: 1px solid var(--border-dim);
    transition: all 0.3s ease-in-out;
    cursor: pointer;
}

/* EFEITO DE HOVER: Brilho de borda e leve elevação */
.card:hover {
    transform: translateY(-5px);
    border-color: var(--neon-green-dim);
    box-shadow: 0 0 15px var(--neon-green-dim);
}

.card img {
    max-height: 70px;
    margin-bottom: 10px;
    /* ADICIONADO: Garante que os logos apareçam bem no fundo escuro, caso tenham transparência */
    filter: drop-shadow(0 0 5px rgba(255,255,255,0.1));
}

.card h3 {
    font-size: 15px;
    margin: 10px 0;
    /* Nome da empresa em texto secundário claro */
    color: var(--text-primary);
}

/* BOTÃO RELUZENTE COM BRILHO NEON */
.btn {
    display: inline-block;
    padding: 10px 16px; /* Sutilmente maior */
    font-size: 12px;
    border-radius: 8px;
    /* Fundo verde neon brilhante */
    background: var(--neon-green);
    /* Texto escuro no botão brilhante para contraste */
    color: #000;
    text-decoration: none;
    font-weight: bold; /* Adicionado negrito */
    text-transform: uppercase; /* Adicionado uppercase para visual mais moderno */
    transition: all 0.2s ease-in-out;
    /* Brilho reluzente sutil padrão */
    box-shadow: 0 0 8px var(--neon-green-dim);
}

.btn:hover {
    /* Brilho reluzente intenso no hover */
    background: #5effb1; /* Verde neon ainda mais claro */
    transform: scale(1.05);
    box-shadow: 0 0 15px var(--neon-green);
}

footer {
    text-align: center;
    padding: 30px;
    font-size: 12px;
    /* Texto do footer mais discreto */
    color: var(--text-secondary);
    border-top: 1px solid var(--border-dim);
}
</style>
</head>

<body>

<header>
    <h1>Central de Avaliações</h1>
    <p>Escolha uma empresa para avaliar ⭐</p>
</header>

<main>
    <div class="container" id="clientesContainer"></div>
</main>

<footer>
    © 2026 ImpulsoWeb10
</footer>

<script src="clientes.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const container = document.getElementById("clientesContainer");

    if (!container) {
        console.error("Container não encontrado");
        return;
    }

    // A lógica de loops e montagem dos cards permanece idêntica
    clientes.forEach(cliente => {
        const card = `
            <div class="card">
                <img src="${cliente.pasta}/${cliente.logo}" alt="${cliente.nome}">
                <h3>${cliente.nome}</h3>
                <a href="${cliente.pasta}/" class="btn">Avaliar ⭐</a>
            </div>
        `;
        container.innerHTML += card;
    });
});
</script>

</body>
</html>
