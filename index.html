<script src="clientes.js?v=2"></script>

<script>
// ==========================
// 🔧 UTIL
// ==========================
function getParam(nome) {
  return new URLSearchParams(window.location.search).get(nome);
}

const clienteParam = getParam("cliente");

// ==========================
// 📊 TRACKING
// ==========================
function track(evento, dados = {}) {
  try {
    if (typeof gtag !== "undefined") {
      gtag('event', evento, dados);
    }
  } catch(e){}
}

document.addEventListener("DOMContentLoaded", function () {

// ==========================
// 🔥 MODO CLIENTE (NÃO QUEBRA SEO)
// ==========================
if (clienteParam) {

  const nome = getParam("cliente") || "Cliente";
  const whats = getParam("whats") || "";
  const google = getParam("google") || "";
  const logo = getParam("logo") || "";

  track("pagina_cliente_aberta", { cliente: nome });

  // esconde apenas visual
  document.querySelector("header")?.remove();
  document.querySelector("main")?.remove();
  document.querySelector("footer")?.remove();
  document.getElementById("modalInfo")?.remove();

  // cria avaliação simples (sem mudar estilo do site)
  const box = document.createElement("div");
  box.style.maxWidth = "400px";
  box.style.margin = "80px auto";
  box.style.textAlign = "center";

  box.innerHTML = `
    ${logo ? `<img src="${logo}" style="max-height:60px;margin-bottom:10px;">` : ""}
    <h2 style="color:#fff;">${nome}</h2>
    <p>Como foi sua experiência?</p>

    <div style="font-size:30px; cursor:pointer;">
      <span onclick="avaliar(1)">⭐</span>
      <span onclick="avaliar(2)">⭐</span>
      <span onclick="avaliar(3)">⭐</span>
      <span onclick="avaliar(4)">⭐</span>
      <span onclick="avaliar(5)">⭐</span>
    </div>

    <div id="acoes" style="margin-top:20px;"></div>
  `;

  document.body.appendChild(box);

  window.avaliar = function(nota) {
    track("avaliacao", { cliente: nome, estrelas: nota });

    const acoes = document.getElementById("acoes");

    if (nota <= 3) {
      acoes.innerHTML = `
        <button onclick="abrirWhats()" class="cta-main">Falar no WhatsApp</button>
      `;
    } else {
      acoes.innerHTML = `
        <button onclick="abrirGoogle()" class="cta-main">Avaliar no Google</button>
      `;
    }
  };

  window.abrirWhats = function() {
    track("clique_whatsapp", { cliente: nome });
    if (!whats) return alert("WhatsApp não configurado");
    window.open(`https://wa.me/${whats}`, '_blank');
  };

  window.abrirGoogle = function() {
    track("clique_google", { cliente: nome });
    if (!google) return alert("Link do Google não configurado");
    window.open(google, '_blank');
  };

  return;
}

// ==========================
// 🟢 SEU PORTFÓLIO ORIGINAL (COM TRACKING)
// ==========================
const container = document.getElementById("clientesContainer");
const modal = document.getElementById("modalInfo");
const modalData = document.getElementById("modalData");
const closeBtn = document.querySelector(".close-modal");

// botão topo
document.querySelector(".cta-main")?.addEventListener("click", () => {
  track("clique_header_whatsapp");
});

clientes.forEach(cliente => {
    const card = document.createElement("article");
    card.className = "card";

    card.innerHTML = `
        <img src="${cliente.pasta}/${cliente.logo}" alt="Avaliar ${cliente.nome}">
        <h3>${cliente.nome}</h3>
        <a href="${cliente.pasta}/" class="btn-avaliar">Avaliar Agora ⭐</a>
    `;

    // clique botão avaliar
    card.querySelector(".btn-avaliar").addEventListener("click", () => {
        track("clique_avaliar_cliente", { cliente: cliente.nome });
    });

    card.addEventListener("click", (e) => {
        if (e.target.classList.contains('btn-avaliar')) return;

        track("abrir_modal", { cliente: cliente.nome });

        modalData.innerHTML = `
            <h2 style="color: var(--neon-green);">${cliente.nome}</h2>
            <p style="color:#fff;">${cliente.descricao || 'Empresa de alta qualidade.'}</p>
            <br>
            <a href="${cliente.pasta}/" class="cta-main" style="font-size:12px;">Avaliar Agora</a>
        `;

        modal.style.display = "flex";
    });

    container.appendChild(card);
});

closeBtn.onclick = () => modal.style.display = "none";
window.onclick = (e) => { if (e.target == modal) modal.style.display = "none"; }

// FAQ (mantido igual)
document.querySelectorAll(".faq-question").forEach(btn => {
    btn.addEventListener("click", () => {
        const answer = btn.nextElementSibling;

        document.querySelectorAll(".faq-answer").forEach(a => {
            if (a !== answer) a.style.maxHeight = null;
        });

        answer.style.maxHeight = answer.style.maxHeight ? null : answer.scrollHeight + "px";
    });
});

});
</script>
