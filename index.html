    <style>
        :root {
            --bg-dark: #050707;
            --card-bg: #0d1212;
            --neon-green: #38e391;
            --neon-green-dim: rgba(56, 227, 145, 0.4);
            --text-primary: #ffffff;
            --text-secondary: #a0a8a8;
            --border-dim: #1a2222;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-dark);
            margin: 0;
            color: var(--text-secondary);
            overflow-x: hidden;
        }

        .bg-glow {
            position: fixed;
            top: 0; left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 800px;
            height: 400px;
            background: radial-gradient(circle, rgba(56, 227, 145, 0.08) 0%, transparent 70%);
            z-index: -1;

        }

        header { text-align: center; padding: 60px 20px 30px; }

            display: inline-block;

        }

            max-height: 55px;
            margin-bottom: 15px;
        }

        .card h3 { color: var(--text-primary); }

        .btn-avaliar {
            display: block;
            background: rgba(56,227,145,0.2);
            color: var(--neon-green);
            border: 1px solid var(--neon-green);

            border-radius: 10px;
            text-decoration: none;
            font-size: 11px;
            font-weight: bold;
        }

        .faq-question {
            width: 100%;
            background: none;
            border: none;
            color: var(--neon-green);
            text-align: left;
            padding: 15px;

        .faq-answer {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;

<body>
<div class="bg-glow"></div>

<header>
    <h1>Avaliação de Empresas e Fornecedores no Google</h1>
    <p class="subtitle">Veja avaliações reais de clientes e ajude outras pessoas.</p>
    <a href="https://wa.me/5511954950044" target="_blank" class="cta-main">QUERO MEU LINK 🚀</a>
</header>

<main>
    <div class="container" id="clientesContainer"></div>

    <section style="max-width:600px; width:100%;">
        <h2 style="color:#fff;">Perguntas Frequentes</h2>

        <button class="faq-question">Como funciona?</button>
        <div class="faq-answer"><p>Você envia o link.</p></div>

        <button class="faq-question">Por que usar?</button>
        <div class="faq-answer"><p>Aumenta avaliações.</p></div>
    </section>
</main>

<div id="modalInfo" class="modal">
    <div class="modal-content">
        <span class="close-modal">X</span>
        <div id="modalData"></div>
    </div>
</div>

<footer>
    <p>© 2026 ImpulsoWeb10</p>
</footer>

<script src="clientes.js?v=2"></script>

<script>
function getParam(n){return new URLSearchParams(window.location.search).get(n);}
const clienteParam=getParam("cliente");

function track(e,d={}){
  try{if(typeof gtag!=="undefined"){gtag('event',e,d)}}catch{}
}

document.addEventListener("DOMContentLoaded",function(){

// ===== MODO CLIENTE BONITO =====
if(clienteParam){

  const nome=getParam("cliente")||"Cliente";
  const whats=getParam("whats")||"";
  const google=getParam("google")||"";
  const logo=getParam("logo")||"";

  track("pagina_cliente",{cliente:nome});

  document.querySelector("main")?.remove();

  const header=document.querySelector("header");

  header.innerHTML=`
    ${logo?`<img src="${logo}" style="max-height:70px;margin-bottom:10px;">`:""}
    <h1>${nome}</h1>
    <p class="subtitle">Como foi sua experiência?</p>

    <div style="font-size:40px;">
      <span onclick="avaliar(1)">⭐</span>
      <span onclick="avaliar(2)">⭐</span>
      <span onclick="avaliar(3)">⭐</span>
      <span onclick="avaliar(4)">⭐</span>
      <span onclick="avaliar(5)">⭐</span>
    </div>

    <div id="acoes"></div>
  `;

  window.avaliar=function(n){
    track("avaliacao",{cliente:nome,nota:n});
    const a=document.getElementById("acoes");

    if(n<=3){
      a.innerHTML=`<a class="cta-main" onclick="window.open('https://wa.me/${whats}')">WhatsApp</a>`;
    }else{
      a.innerHTML=`<a class="cta-main" onclick="window.open('${google}')">Google</a>`;
    }
  };

  return;
}

// ===== PORTFÓLIO =====
const container=document.getElementById("clientesContainer");
const modal=document.getElementById("modalInfo");
const modalData=document.getElementById("modalData");

document.querySelector(".cta-main")?.addEventListener("click",()=>track("click_header"));

if(typeof clientes!=="undefined"){
clientes.forEach(c=>{
    const card=document.createElement("article");
    card.className="card";

    card.innerHTML=`
        <img src="${c.pasta}/${c.logo}">
        <h3>${c.nome}</h3>
        <a href="${c.pasta}/" class="btn-avaliar">Avaliar</a>
    `;

    card.querySelector(".btn-avaliar").addEventListener("click",()=>track("click_cliente",{nome:c.nome}));

    card.onclick=(e)=>{
        if(e.target.classList.contains('btn-avaliar')) return;

        modalData.innerHTML=`<h2>${c.nome}</h2><p>${c.descricao||''}</p>`;
        modal.style.display="flex";
    };

    container.appendChild(card);
});
}

// FAQ
document.querySelectorAll(".faq-question").forEach(b=>{
 b.onclick=()=>{
  const a=b.nextElementSibling;
  a.style.maxHeight=a.style.maxHeight?null:a.scrollHeight+"px";
 }
});

});
</script>

</body>
