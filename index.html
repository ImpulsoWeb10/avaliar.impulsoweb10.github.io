<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central de Avaliações | ImpulsoWeb10</title>
    
    <style>
        :root {
            --bg-dark: #050707;
            --card-bg: #0d1212;
            --neon-green: #38e391;
            --neon-green-dim: rgba(56, 227, 145, 0.4);
            --text-primary: #ffffff;
            --text-secondary: #a0a8a8;
            --border-dim: #1a2222;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: var(--bg-dark);
            margin: 0;
            color: var(--text-secondary);
            overflow-x: hidden;
        }

        /* HEADER E LAYOUT */
        header { text-align: center; padding: 50px 20px; }
        h1 { margin: 0; font-size: 2.2rem; color: var(--text-primary); }
        h1 span { color: var(--neon-green); }
        
        .cta-main {
            display: inline-block;
            background: var(--neon-green);
            color: #000;
            padding: 14px 28px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 900;
            font-size: 13px;
            text-transform: uppercase;
            margin: 20px 0 40px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(56, 227, 145, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(56, 227, 145, 0); }
            100% { box-shadow: 0 0 0 0 rgba(56, 227, 145, 0); }
        }

        main { display: flex; flex-direction: column; align-items: center; padding: 20px; }

        .container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 600px;
        }

        /* CARD CLICÁVEL */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-dim);
            border-radius: 20px;
            padding: 25px 15px;
            text-align: center;
            transition: 0.3s;
            cursor: help; /* Indica que tem informação extra */
        }

        .card:hover { border-color: var(--neon-green); transform: translateY(-3px); }

        .card img { max-height: 50px; margin-bottom: 10px; pointer-events: none; }

        .btn-avaliar {
            display: block;
            background: var(--neon-green);
            color: #000;
            padding: 8px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 11px;
            font-weight: bold;
            margin-top: 15px;
            pointer-events: auto; /* Garante que o link funcione independente do modal */
        }

        /* ESTILO DO MODAL */
        .modal {
            display: none; 
            position: fixed;
            z-index: 1000;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: var(--card-bg);
            border: 2px solid var(--neon-green);
            padding: 30px;
            border-radius: 25px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            position: relative;
            box-shadow: 0 0 30px var(--neon-green-dim);
        }

        .close-modal {
            position: absolute;
            right: 20px; top: 15px;
            color: var(--neon-green);
            font-size: 24px;
            cursor: pointer;
        }

        .modal h2 { color: var(--neon-green); margin-top: 10px; }
        .modal p { line-height: 1.6; margin: 20px 0; color: var(--text-primary); }

        /* FOOTER */
        footer { text-align: center; padding: 40px; border-top: 1px solid var(--border-dim); margin-top: 40px; }
        .footer-link { color: var(--neon-green); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <h1>Central de <span>Avaliações</span></h1>
        <a href="https://wa.me/SEUNUMERO" target="_blank" class="cta-main">PEÇA SEU LINK AQUI 🚀</a>
    </header>

    <main>
        <div class="container" id="clientesContainer"></div>
    </main>

    <div id="infoModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <div id="modalBody">
                </div>
        </div>
    </div>

    <footer>
        <p>© 2026 Desenvolvido por <a href="#" class="footer-link">ImpulsoWeb10</a></p>
        <p style="font-size: 10px;">🔒 Conexão Segura SSL | @Todos os direitos reservados</p>
    </footer>

    <script src="clientes.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const container = document.getElementById("clientesContainer");
            if (!container) return;

            clientes.forEach(cliente => {
                const card = document.createElement('article');
                card.className = 'card';
                // Adiciona o evento de abrir modal ao clicar no card
                card.onclick = (e) => {
                    // Se clicar no botão "Avaliar", não abre o modal (deixa o link funcionar)
                    if(e.target.classList.contains('btn-avaliar')) return;
                    openModal(cliente);
                };

                card.innerHTML = `
                    <img src="${cliente.pasta}/${cliente.logo}" alt="Logo ${cliente.nome}">
                    <h3>${cliente.nome}</h3>
                    <a href="${cliente.pasta}/" class="btn-avaliar">Avaliar Agora ⭐</a>
                `;
                container.appendChild(card);
            });
        });

        function openModal(cliente) {
            const modal = document.getElementById("infoModal");
            const body = document.getElementById("modalBody");
            
            body.innerHTML = `
                <h2>${cliente.nome}</h2>
                <p>Ao avaliar a <strong>${cliente.nome}</strong>, você ajuda outras pessoas a encontrarem um serviço de qualidade e fortalece a economia local.</p>
                <p style="font-size: 0.9rem; color: #38e391;">Sua nota 5 estrelas faz toda a diferença!</p>
                <a href="${cliente.pasta}/" class="btn-avaliar" style="display:inline-block; width:80%;">Ir para Avaliação</a>
            `;
            
            modal.style.display = "flex";
        }

        function closeModal() {
            document.getElementById("infoModal").style.display = "none";
        }

        // Fecha se clicar fora do conteúdo
        window.onclick = function(event) {
            const modal = document.getElementById("infoModal");
            if (event.target == modal) closeModal();
        }
    </script>
</body>
</html>
