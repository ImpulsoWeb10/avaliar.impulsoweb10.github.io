<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="google-site-verification" content="H0X_Y32S7UtBxajFIRBsI01P5COkoMmY9bC-Pm-4u7w" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO -->
    <title>Avaliar Empresas e Fornecedores | ImpulsoWeb10</title>
    <meta name="description" content="Avalie empresas e fornecedores. Veja avaliações reais e aumente sua reputação no Google.">
    <meta name="keywords" content="avaliar empresas, avaliação google, reputação online">
    <meta name="robots" content="index, follow">

    <!-- GOOGLE ANALYTICS -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XXXXXXXXXX');
    </script>

    <style>
        :root {
            --bg-dark: #050707;
            --card-bg: #0d1212;
            --neon-green: #38e391;
            --text-primary: #ffffff;
            --text-secondary: #a0a8a8;
            --border-dim: #1a2222;
        }

        body {
            font-family: 'Segoe UI', Arial;
            background: var(--bg-dark);
            margin: 0;
            color: var(--text-secondary);
        }

        header { text-align:center; padding:60px 20px 30px; }

        h1 { color:#fff; }

        .cta-main {
            display:inline-block;
            background:var(--neon-green);
            color:#000;
            padding:12px 25px;
            border-radius:30px;
            text-decoration:none;
            font-weight:bold;
        }

        main {
            display:flex;
            flex-direction:column;
            align-items:center;
            padding:20px;
        }

        .container {
            display:grid;
            grid-template-columns:repeat(2,1fr);
            gap:15px;
            max-width:600px;
            width:100%;
        }

        .card {
            background:var(--card-bg);
            border-radius:20px;
            padding:20px;
            text-align:center;
            cursor:pointer;
        }

        .card img { max-height:50px; margin-bottom:10px; }

        .btn-avaliar {
            display:block;
            margin-top:10px;
            padding:8px;
            border:1px solid var(--neon-green);
            color:var(--neon-green);
            border-radius:8px;
            text-decoration:none;
        }

        .modal {
            display:none;
            position:fixed;
            width:100%;
            height:100%;
            background:rgba(0,0,0,0.8);
            align-items:center;
            justify-content:center;
        }

        .modal-content {
            background:var(--card-bg);
            padding:30px;
            border-radius:20px;
        }

        footer {
            text-align:center;
            padding:40px;
        }

        /* FAQ */
        .faq-question {
            background:none;
            border:none;
            color:var(--neon-green);
            font-weight:bold;
            cursor:pointer;
            padding:10px 0;
        }

        .faq-answer {
            max-height:0;
            overflow:hidden;
            transition:0.3s;
        }
    </style>
</head>

<body>

<header>
    <h1>Avaliação de Empresas</h1>
    <a href="https://wa.me/5511954950044" target="_blank" class="cta-main">
        Quero meu link 🚀
    </a>
</header>

<main>
    <div class="container" id="clientesContainer"></div>

    <!-- FAQ -->
    <section style="max-width:600px; width:100%; margin-top:40px;">
        <h2 style="color:#fff;">Perguntas Frequentes</h2>

        <button class="faq-question">Como funciona?</button>
        <div class="faq-answer"><p>Você envia o link para seus clientes avaliarem.</p></div>

        <button class="faq-question">Por que é importante?</button>
        <div class="faq-answer"><p>Aumenta sua reputação no Google.</p></div>
    </section>
</main>

<div id="modalInfo" class="modal">
    <div class="modal-content">
        <span class="close-modal">X</span>
        <div id="modalData"></div>
    </div>
</div>

<footer>
    <p>© 2026 ImpulsoWeb10</p>
</footer>

<script src="clientes.js?v=2"></script>

<script>
// ==========================
function getParam(nome) {
  return new URLSearchParams(window.location.search).get(nome);
}

const clienteParam = getParam("cliente");

function track(evento, dados = {}) {
  try {
    if (typeof gtag !== "undefined") {
      gtag('event', evento, dados);
    }
  } catch(e){}
}

document.addEventListener("DOMContentLoaded", function () {

// 🔥 MODO CLIENTE
if (clienteParam) {

  const nome = getParam("cliente") || "Cliente";
  const whats = getParam("whats") || "";
  const google = getParam("google") || "";

  track("pagina_cliente_aberta", { cliente: nome });

  document.querySelector("header").style.display = "none";
  document.querySelector("main").style.display = "none";
  document.querySelector("footer").style.display = "none";

  const box = document.createElement("div");
  box.style.maxWidth = "500px";
  box.style.margin = "80px auto";
  box.style.textAlign = "center";

  box.innerHTML = `
    <h2 style="color:#fff;">${nome}</h2>
    <p>Como foi sua experiência?</p>

    <div style="font-size:30px;">
      <span onclick="avaliar(1)">⭐</span>
      <span onclick="avaliar(2)">⭐</span>
      <span onclick="avaliar(3)">⭐</span>
      <span onclick="avaliar(4)">⭐</span>
      <span onclick="avaliar(5)">⭐</span>
    </div>

    <div id="acoes"></div>
  `;

  document.body.appendChild(box);

  window.avaliar = function(nota) {
    track("avaliacao", { cliente: nome, estrelas: nota });

    const acoes = document.getElementById("acoes");

    if (nota <= 3) {
      acoes.innerHTML = `<button onclick="abrirWhats()">WhatsApp</button>`;
    } else {
      acoes.innerHTML = `<button onclick="abrirGoogle()">Google</button>`;
    }
  };

  window.abrirWhats = function() {
    track("clique_whatsapp", { cliente: nome });
    window.open(`https://wa.me/${whats}`, '_blank');
  };

  window.abrirGoogle = function() {
    track("clique_google", { cliente: nome });
    window.open(google, '_blank');
  };

  return;
}

// 🟢 PORTFÓLIO
const container = document.getElementById("clientesContainer");
const modal = document.getElementById("modalInfo");
const modalData = document.getElementById("modalData");
const closeBtn = document.querySelector(".close-modal");

// botão header
document.querySelector(".cta-main")?.addEventListener("click", () => {
  track("clique_header_whatsapp");
});

if (typeof clientes !== "undefined") {
    clientes.forEach(cliente => {
        const card = document.createElement("article");
        card.className = "card";

        card.innerHTML = `
            <img src="${cliente.pasta}/${cliente.logo}">
            <h3 style="color:#fff;">${cliente.nome}</h3>
            <a href="${cliente.pasta}/" class="btn-avaliar">Avaliar</a>
        `;

        card.querySelector(".btn-avaliar").addEventListener("click", () => {
            track("clique_avaliar_cliente", { cliente: cliente.nome });
        });

        card.addEventListener("click", (e) => {
            if (e.target.classList.contains('btn-avaliar')) return;

            track("abrir_modal", { cliente: cliente.nome });

            modalData.innerHTML = `
                <h2>${cliente.nome}</h2>
                <p>${cliente.descricao || ''}</p>
                <a href="${cliente.pasta}/">Avaliar</a>
            `;

            modal.style.display = "flex";
        });

        container.appendChild(card);
    });
}

closeBtn.onclick = () => modal.style.display = "none";

// FAQ
document.querySelectorAll(".faq-question").forEach(btn => {
    btn.addEventListener("click", () => {
        const answer = btn.nextElementSibling;
        answer.style.maxHeight = answer.style.maxHeight ? null : "100px";
    });
});

});
</script>

</body>
</html>
