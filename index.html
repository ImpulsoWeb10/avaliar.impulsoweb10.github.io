<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Central de Avaliações | ImpulsoWeb10</title>

<style>
:root {
    --primary: #111827;
    --bg: #f9fafb;
    --text: #111;
    --white: #fff;
}

body {
    font-family: Arial, sans-serif;
    background: var(--bg);
    margin: 0;
    color: var(--text);
}

header {
    text-align: center;
    padding: 40px 20px;
    background: var(--white);
    border-bottom: 1px solid #eee;
}

h1 {
    margin: 0;
    font-size: 1.8rem;
}

main {
    display: flex;
    justify-content: center;
    padding: 40px 10px;
}

.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    width: 100%;
    max-width: 1000px;
}

.card {
    background: white;
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    border: 1px solid #eee;
    transition: 0.2s;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
}

.card img {
    max-height: 70px;
    margin-bottom: 10px;
}

.card h3 {
    font-size: 15px;
    margin: 10px 0;
}

.btn {
    display: inline-block;
    padding: 8px 14px;
    font-size: 12px;
    border-radius: 8px;
    background: #111827;
    color: #fff;
    text-decoration: none;
    transition: 0.2s;
}

.btn:hover {
    background: black;
    transform: scale(1.05);
}

footer {
    text-align: center;
    padding: 30px;
    font-size: 12px;
    color: #666;
}
</style>
</head>

<body>

<header>
    <h1>Central de Avaliações</h1>
    <p>Escolha uma empresa para avaliar ⭐</p>
</header>

<main>
    <!-- AGORA É AUTOMÁTICO -->
    <div class="container" id="clientesContainer"></div>
</main>

<footer>
    © 2026 ImpulsoWeb10
</footer>

<!-- SCRIPT DOS CLIENTES -->
<script src="clientes.js"></script>

<!-- SCRIPT AUTOMÁTICO -->
<script>
document.addEventListener("DOMContentLoaded", function () {
    const container = document.getElementById("clientesContainer");

    if (!container) {
        console.error("Container não encontrado");
        return;
    }

    clientes.forEach(cliente => {
        const card = `
            <div class="card">
                <img src="${cliente.pasta}/${cliente.logo}" alt="${cliente.nome}">
                <h3>${cliente.nome}</h3>
                <a href="${cliente.pasta}/" class="btn">Avaliar ⭐</a>
            </div>
        `;
        container.innerHTML += card;
    });
});
</script>

</body>
</html>
