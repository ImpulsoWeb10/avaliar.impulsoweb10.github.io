<script>
// ==========================
// CONFIG DINÂMICO
// ==========================
function getParam(nome) {
  return new URLSearchParams(window.location.search).get(nome);
}

const clienteParam = getParam("cliente");

// ==========================
// EVENTOS (ANALYTICS)
// ==========================
function track(evento, dados = {}) {
  if (typeof gtag !== "undefined") {
    gtag('event', evento, dados);
  }
}

// ==========================
// MODO CLIENTE (DINÂMICO)
// ==========================
if (clienteParam) {

  const nome = getParam("cliente");
  const whats = getParam("whats");
  const google = getParam("google");
  const logo = getParam("logo");

  track("pagina_cliente_aberta", { cliente: nome });

  document.body.innerHTML = `
    <div style="text-align:center; padding:30px; font-family:Arial;">

      ${logo ? `<img src="${logo}" style="width:80px; margin-bottom:10px;">` : ""}

      <h2>${nome}</h2>
      <p>Como foi sua experiência?</p>

      <div style="font-size:35px; cursor:pointer;">
        <span onclick="avaliar(1)">★</span>
        <span onclick="avaliar(2)">★</span>
        <span onclick="avaliar(3)">★</span>
        <span onclick="avaliar(4)">★</span>
        <span onclick="avaliar(5)">★</span>
      </div>

      <div id="acoes" style="margin-top:20px;"></div>

    </div>
  `;

  window.avaliar = function(nota) {
    track("avaliacao", { cliente: nome, estrelas: nota });

    const acoes = document.getElementById("acoes");

    if (nota <= 3) {
      acoes.innerHTML = `
        <p>😕 Vamos resolver isso</p>
        <button onclick="abrirWhats()" style="padding:12px; background:#25D366; color:#fff; border:none; border-radius:8px;">
          Falar no WhatsApp
        </button>
      `;
    } else {
      acoes.innerHTML = `
        <p>😍 Nos avalie no Google</p>
        <button onclick="abrirGoogle()" style="padding:12px; background:#4285F4; color:#fff; border:none; border-radius:8px;">
          Avaliar no Google
        </button>
      `;
    }
  };

  window.abrirWhats = function() {
    track("clique_whatsapp_cliente", { cliente: nome });
    window.open(`https://wa.me/${whats}`, '_blank');
  };

  window.abrirGoogle = function() {
    track("clique_google_review", { cliente: nome });
    window.open(google, '_blank');
  };

}

// ==========================
// MODO PORTFÓLIO (SEU ORIGINAL)
// ==========================
if (!clienteParam) {

document.addEventListener("DOMContentLoaded", function () {

    const container = document.getElementById("clientesContainer");
    const modal = document.getElementById("modalInfo");
    const modalData = document.getElementById("modalData");
    const closeBtn = document.querySelector(".close-modal");

    if (typeof clientes !== 'undefined') {
        clientes.forEach(cliente => {
            const card = document.createElement("article");
            card.className = "card";

            card.innerHTML = `
                <img src="${cliente.pasta}/${cliente.logo}">
                <h3>${cliente.nome}</h3>
                <a href="${cliente.pasta}/" class="btn-avaliar">Avaliar Agora ⭐</a>
            `;

            card.addEventListener("click", (e) => {
                if (e.target.classList.contains('btn-avaliar')) return;

                modalData.innerHTML = `
                    <h2 style="color:#38e391;">${cliente.nome}</h2>
                    <p>${cliente.descricao || ''}</p>
                    <a href="${cliente.pasta}/" class="cta-main">AVALIAR</a>
                `;
                modal.style.display = "flex";
            });

            container.appendChild(card);
        });
    }

    closeBtn.onclick = () => modal.style.display = "none";
    window.onclick = (e) => { if (e.target == modal) modal.style.display = "none"; }

    document.querySelectorAll(".faq-question").forEach(btn => {
        btn.addEventListener("click", () => {
            const answer = btn.nextElementSibling;
            const span = btn.querySelector("span");

            document.querySelectorAll(".faq-answer").forEach(a => {
                if (a !== answer) {
                    a.style.maxHeight = null;
                    a.previousElementSibling.querySelector("span").innerText = "+";
                }
            });

            if (answer.style.maxHeight) {
                answer.style.maxHeight = null;
                span.innerText = "+";
            } else {
                answer.style.maxHeight = answer.scrollHeight + "px";
                span.innerText = "-";
            }
        });
    });

});
}
</script>
