<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="google-site-verification" content="H0X_Y32S7UtBxajFIRBsI01P5COkoMmY9bC-Pm-4u7w" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Avaliar Empresas e Fornecedores | ImpulsoWeb10</title>

    <style>
        :root {
            --bg-dark: #050707;
            --card-bg: #0d1212;
            --neon-green: #38e391;
            --neon-green-dim: rgba(56, 227, 145, 0.4);
            --text-primary: #ffffff;
            --text-secondary: #a0a8a8;
            --border-dim: #1a2222;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-dark);
            margin: 0;
            color: var(--text-secondary);
        }

        header { text-align: center; padding: 60px 20px 30px; }

        h1 { margin: 0; font-size: 2.5rem; color: var(--text-primary); }

        .cta-main {
            display: inline-block;
            background: var(--neon-green);
            color: #000;
            padding: 16px 32px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 900;
        }

        main { display: flex; flex-direction: column; align-items: center; padding: 20px; }

        .container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 600px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-dim);
            border-radius: 20px;
            padding: 25px 15px;
            text-align: center;
            cursor: pointer;
        }

        .card img {
            max-height: 60px;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 6px rgba(56, 227, 145, 0.6));
        }

        .btn-avaliar {
            display: block;
            background: rgba(56, 227, 145, 0.2);
            color: var(--neon-green);
            border: 1px solid var(--neon-green);
            padding: 8px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 11px;
            font-weight: bold;
        }

        .btn-avaliar:hover {
            background: rgba(56, 227, 145, 0.35);
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            align-items: center; justify-content: center;
        }

        .modal-content {
            background: var(--card-bg);
            border: 1px solid var(--neon-green);
            padding: 30px;
            border-radius: 20px;
            width: 85%; max-width: 400px;
            text-align: center;
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 25px;
            color: var(--neon-green);
            font-size: 22px;
            cursor: pointer;
        }

        /* FAQ */
        .faq-item { border-bottom: 1px solid var(--border-dim); }

        .faq-question {
            width: 100%;
            background: none;
            border: none;
            color: var(--neon-green);
            text-align: left;
            padding: 15px;
            cursor: pointer;
            font-weight: bold;
        }

        .faq-answer {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
            padding: 0 15px;
        }

        .faq-answer p { color: #fff; }

        footer {
            text-align: center;
            padding: 40px 20px;
            border-top: 1px solid var(--border-dim);
            margin-top: 40px;
        }

        .footer-link {
            color: var(--neon-green);
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>

<body>

<header>
    <h1>Avaliação de Empresas</h1>
    <a href="#" class="cta-main">QUERO MEU LINK</a>
</header>

<main>
    <div class="container" id="clientesContainer"></div>

    <section style="max-width:600px; width:100%;">
        <h2 style="color:#fff">Perguntas Frequentes</h2>

        <div class="faq-item">
            <button class="faq-question">Como a ImpulsoWeb10 pode ajudar?</button>
            <div class="faq-answer"><p>Aumenta sua visibilidade no Google com avaliações reais.</p></div>
        </div>

        <div class="faq-item">
            <button class="faq-question">Por que avaliações são importantes?</button>
            <div class="faq-answer"><p>Geram confiança e melhor posicionamento.</p></div>
        </div>

        <div class="faq-item">
            <button class="faq-question">Como funciona?</button>
            <div class="faq-answer"><p>Você recebe um link personalizado.</p></div>
        </div>

    </section>
</main>

<!-- MODAL -->
<div id="modalInfo" class="modal">
    <div class="modal-content">
        <span class="close-modal">&times;</span>
        <div id="modalData"></div>
    </div>
</div>

<footer>
    <p>© 2026 Desenvolvido por 
        <a href="https://wa.me/5511954950044" target="_blank" class="footer-link">
            ImpulsoWeb10
        </a>
    </p>
</footer>

<script src="clientes.js"></script>
<script>
const container = document.getElementById("clientesContainer");
const modal = document.getElementById("modalInfo");
const modalData = document.getElementById("modalData");
const closeBtn = document.querySelector(".close-modal");

clientes.forEach(cliente => {
    const card = document.createElement("div");
    card.className = "card";
    
    card.innerHTML = `
        <img src="${cliente.pasta}/${cliente.logo}">
        <h3>${cliente.nome}</h3>
        <a href="${cliente.pasta}/" class="btn-avaliar">Avaliar</a>
    `;

    card.addEventListener("click", (e) => {
        if (e.target.classList.contains('btn-avaliar')) return;

        modalData.innerHTML = `
            <h2 style="color: var(--neon-green);">${cliente.nome}</h2>
            <p style="color:#fff;">${cliente.descricao || 'Empresa de alta qualidade e confiança.'}</p>
            <br>
            <a href="${cliente.pasta}/" class="cta-main" style="font-size:12px;">Avaliar Agora</a>
        `;

        modal.style.display = "flex";
    });

    container.appendChild(card);
});

closeBtn.onclick = () => modal.style.display = "none";
window.onclick = (e) => { if (e.target == modal) modal.style.display = "none"; }

// SANFONA

document.querySelectorAll(".faq-question").forEach(btn => {
    btn.addEventListener("click", () => {
        const answer = btn.nextElementSibling;

        document.querySelectorAll(".faq-answer").forEach(a => {
            if (a !== answer) a.style.maxHeight = null;
        });

        answer.style.maxHeight = answer.style.maxHeight ? null : answer.scrollHeight + "px";
    });
});
</script>

</body>
</html>
