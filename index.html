<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="google-site-verification" content="H0X_Y32S7UtBxajFIRBsI01P5COkoMmY9bC-Pm-4u7w" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Avaliar Empresas e Fornecedores | ImpulsoWeb10</title>
    <meta name="description" content="Avalie empresas e fornecedores. Veja avaliações reais de clientes e aumente sua reputação no Google.">

    <!-- GOOGLE ANALYTICS -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XXXXXXXXXX');
    </script>

    <style>
        body {
            font-family: Arial;
            background: #050707;
            margin: 0;
            color: #aaa;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            max-width: 600px;
            margin: auto;
        }

        .card {
            background: #0d1212;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
        }

        .btn-avaliar {
            display: block;
            margin-top: 10px;
            padding: 8px;
            border: 1px solid #38e391;
            color: #38e391;
            text-decoration: none;
            border-radius: 8px;
        }

        .modal {
            display: none;
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: #0d1212;
            padding: 30px;
            border-radius: 20px;
        }
    </style>
</head>

<body>

<header style="text-align:center; padding:40px;">
    <h1 style="color:#fff;">Avaliação de Empresas</h1>
    <a href="https://wa.me/5511954950044" target="_blank" style="color:#38e391;">Quero meu link</a>
</header>

<main>
    <div class="container" id="clientesContainer"></div>
</main>

<div id="modalInfo" class="modal">
    <div class="modal-content">
        <span class="close-modal" style="cursor:pointer;">X</span>
        <div id="modalData"></div>
    </div>
</div>

<script src="clientes.js"></script>

<script>
// ==========================
// CONFIG
// ==========================
function getParam(nome) {
  return new URLSearchParams(window.location.search).get(nome);
}

const clienteParam = getParam("cliente");

// ==========================
// TRACK
// ==========================
function track(evento, dados = {}) {
  try {
    if (typeof gtag !== "undefined") {
      gtag('event', evento, dados);
    }
  } catch (e) {}
}

// ==========================
// START
// ==========================
document.addEventListener("DOMContentLoaded", function () {

// ==========================
// 🔥 MODO CLIENTE
// ==========================
if (clienteParam) {

  const nome = getParam("cliente") || "Cliente";
  const whats = getParam("whats") || "";
  const google = getParam("google") || "";
  const logo = getParam("logo") || "";

  track("pagina_cliente_aberta", { cliente: nome });

  document.body.innerHTML = `
    <div style="display:flex; align-items:center; justify-content:center; height:100vh;">
      <div style="background:#0d1212; padding:30px; border-radius:20px; text-align:center; width:90%; max-width:350px;">
        
        ${logo ? `<img src="${logo}" style="width:70px;">` : ""}

        <h2 style="color:#fff;">${nome}</h2>
        <p>Como foi sua experiência?</p>

        <div style="font-size:30px;">
          <span onclick="avaliar(1)">⭐</span>
          <span onclick="avaliar(2)">⭐</span>
          <span onclick="avaliar(3)">⭐</span>
          <span onclick="avaliar(4)">⭐</span>
          <span onclick="avaliar(5)">⭐</span>
        </div>

        <div id="acoes"></div>

      </div>
    </div>
  `;

  window.avaliar = function(nota) {
    const acoes = document.getElementById("acoes");

    if (nota <= 3) {
      acoes.innerHTML = `
        <p>😕 Vamos resolver</p>
        <button onclick="window.open('https://wa.me/${whats}')">WhatsApp</button>
      `;
    } else {
      acoes.innerHTML = `
        <p>😍 Avalie no Google</p>
        <button onclick="window.open('${google}')">Avaliar</button>
      `;
    }
  };

  return;
}

// ==========================
// 🟢 PORTFÓLIO
// ==========================
const container = document.getElementById("clientesContainer");
const modal = document.getElementById("modalInfo");
const modalData = document.getElementById("modalData");
const closeBtn = document.querySelector(".close-modal");

if (typeof clientes !== "undefined") {
    clientes.forEach(cliente => {
        const card = document.createElement("article");
        card.className = "card";

        card.innerHTML = `
            <img src="${cliente.pasta}/${cliente.logo}">
            <h3 style="color:#fff;">${cliente.nome}</h3>
            <a href="${cliente.pasta}/" class="btn-avaliar">Avaliar</a>
        `;

        card.addEventListener("click", (e) => {
            if (e.target.classList.contains('btn-avaliar')) return;

            modalData.innerHTML = `
                <h2 style="color:#38e391;">${cliente.nome}</h2>
                <p>${cliente.descricao || ''}</p>
                <a href="${cliente.pasta}/">Avaliar</a>
            `;

            modal.style.display = "flex";
        });

        container.appendChild(card);
    });
}

closeBtn.onclick = () => modal.style.display = "none";
window.onclick = (e) => { if (e.target == modal) modal.style.display = "none"; }

});
</script>

</body>
</html>
