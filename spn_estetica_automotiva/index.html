<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Avalie a SPN Estética Automotiva ⭐⭐⭐⭐⭐</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Exo+2:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --black: #111318;
      --dark: #1a1d24;
      --card: #20242e;
      --red: #c0000a;
      --red-glow: #ff1a26;
      --silver: #c8cdd4;
      --silver-bright: #e8edf4;
      --white: #ffffff;
      --gold: #d4a017;
      --star-on: #ffd700;
      --star-off: #4a4f5a;
    }

    /* ESTILO DO TEMPORIZADOR (DISCRETO) */
    #timer-display {
      position: fixed;
      top: 10px;
      right: 10px;
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      padding: 5px 10px;
      border-radius: 5px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 12px;
      z-index: 9999;
      border: 1px solid var(--red);
      pointer-events: none;
    }

    /* TELA DE ERRO APÓS EXPIRAR */
    #error-screen {
      display: none;
      position: fixed;
      inset: 0;
      background: #000;
      color: white;
      z-index: 10000;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-family: sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Exo 2', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      position: relative;
    }

    /* ... RESTANTE DO SEU CSS ORIGINAL (SEM ALTERAÇÕES) ... */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(192,0,10,0.1) 1px, transparent 1px),
        linear-gradient(90deg, rgba(192,0,10,0.1) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridMove 20s linear infinite;
      z-index: 0;
    }
    @keyframes gridMove { 0% { transform: translateY(0); } 100% { transform: translateY(40px); } }
    .container { position: relative; z-index: 1; width: 100%; max-width: 480px; padding: 20px 16px 40px; display: flex; flex-direction: column; align-items: center; }
    .logo-wrap img { width: 160px; height: 160px; object-fit: contain; }
    .card { width: 100%; background: linear-gradient(160deg, #262b38 0%, #1c2030 100%); border: 1px solid rgba(192,0,10,0.35); border-radius: 20px; padding: 32px 28px 28px; }
    .star { font-size: 2.6rem; color: var(--star-off); cursor: pointer; }
    .star.active { color: var(--star-on); }
    .btn-avaliar { display: block; width: 100%; padding: 16px; background: var(--red); color: white; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; }
    /* ... (Mantenha todo o seu CSS original aqui abaixo) ... */
  </style>
</head>
<body>

<div id="timer-display">Carregando...</div>
<div id="error-screen">
  <h1 style="color: #c0000a;">ERRO 403: ACESSO NEGADO</h1>
  <p>Este link de visualização expirou.</p>
</div>

<div class="container" id="main-content">
  <div class="logo-wrap">
    <img src="https://i.ibb.co/Ldrp2B4/logo-spn.png" alt="Logo">
  </div>
  <div class="card">
      <div class="stars" id="starContainer">
        <span class="star" data-v="1">★</span>
        <span class="star" data-v="2">★</span>
        <span class="star" data-v="3">★</span>
        <span class="star" data-v="4">★</span>
        <span class="star" data-v="5">★</span>
      </div>
      <button class="btn-avaliar">AVALIAR AGORA</button>
  </div>
</div>

<script>
  // --- LÓGICA DO TEMPORIZADOR DE 24 HORAS ---
  (function() {
    const duration = 24 * 60 * 60 * 1000; // 24 horas em milissegundos
    let startTime = localStorage.getItem('site_timer_start');

    if (!startTime) {
      startTime = Date.now();
      localStorage.setItem('site_timer_start', startTime);
    }

    function updateTimer() {
      const now = Date.now();
      const elapsed = now - startTime;
      const remaining = duration - elapsed;

      if (remaining <= 0) {
        document.getElementById('main-content').style.display = 'none';
        document.getElementById('timer-display').style.display = 'none';
        document.getElementById('error-screen').style.display = 'flex';
        return;
      }

      const h = Math.floor(remaining / 3600000);
      const m = Math.floor((remaining % 3600000) / 60000);
      const s = Math.floor((remaining % 60000) / 1000);

      document.getElementById('timer-display').innerText = 
        `Tempo restante: ${h}h ${m}m ${s}s`;
    }

    setInterval(updateTimer, 1000);
    updateTimer();
  })();

  // --- COLOQUE ABAIXO TODO O SEU JS ORIGINAL DO CARROSSEL E ESTRELAS ---
  const stars = document.querySelectorAll('.star');
  stars.forEach(s => {
    s.addEventListener('click', () => {
      const v = parseInt(s.dataset.v);
      stars.forEach((star, i) => star.classList.toggle('active', i < v));
    });
  });
</script>

</body>
</html>
