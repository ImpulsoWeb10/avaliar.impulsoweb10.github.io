<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Avalie a SPN Estética Automotiva ⭐⭐⭐⭐⭐</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Exo+2:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* --- CSS DO TEMPORIZADOR (ADICIONADO) --- */
    #timer-display {
      position: fixed;
      top: 10px;
      right: 10px;
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      padding: 5px 10px;
      border-radius: 5px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 12px;
      z-index: 9999;
      border: 1px solid #c0000a;
      pointer-events: none;
    }
    #error-screen {
      display: none;
      position: fixed;
      inset: 0;
      background: #000;
      color: white;
      z-index: 10000;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-family: sans-serif;
    }

    /* --- SEU CSS ORIGINAL (SEM ALTERAÇÕES) --- */
    :root {
      --black: #111318;
      --dark: #1a1d24;
      --card: #20242e;
      --red: #c0000a;
      --red-glow: #ff1a26;
      --silver: #c8cdd4;
      --silver-bright: #e8edf4;
      --white: #ffffff;
      --gold: #d4a017;
      --star-on: #ffd700;
      --star-off: #4a4f5a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Exo 2', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      position: relative;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(192,0,10,0.1) 1px, transparent 1px),
        linear-gradient(90deg, rgba(192,0,10,0.1) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridMove 20s linear infinite;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(192,0,10,0.22) 0%, transparent 60%),
                  radial-gradient(ellipse at 50% 50%, rgba(30,35,50,0.4) 0%, transparent 80%);
      z-index: 0;
    }
    @keyframes gridMove { 0% { transform: translateY(0); } 100% { transform: translateY(40px); } }
    .container { position: relative; z-index: 1; width: 100%; max-width: 480px; padding: 20px 16px 40px; display: flex; flex-direction: column; align-items: center; gap: 0; }
    .logo-wrap { position: relative; margin-bottom: 8px; animation: fadeDown 0.7s ease both; }
    .logo-wrap img { width: 160px; height: 160px; object-fit: contain; filter: drop-shadow(0 0 18px rgba(192,0,10,0.6)) drop-shadow(0 0 40px rgba(192,0,10,0.25)); animation: logoGrow 0.7s 0.2s cubic-bezier(0.34,1.56,0.64,1) both, logoShake 0.55s 1.05s ease both, logoFloat 4s 1.8s ease-in-out infinite; }
    @keyframes logoGrow { 0% { transform: scale(0.05); opacity: 0; } 60% { opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
    @keyframes logoShake { 0% { transform: scale(1) rotate(0deg); } 15% { transform: scale(1.08) rotate(-6deg); } 30% { transform: scale(1.08) rotate(6deg); } 45% { transform: scale(1.05) rotate(-4deg); } 60% { transform: scale(1.05) rotate(4deg); } 75% { transform: scale(1.02) rotate(-2deg); } 90% { transform: scale(1.02) rotate(2deg); } 100% { transform: scale(1) rotate(0deg); } }
    @keyframes logoFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    .brand-name { font-family: 'Rajdhani', sans-serif; font-size: 2.6rem; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; background: linear-gradient(135deg, var(--silver-bright) 0%, var(--silver) 50%, #888 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; text-align: center; line-height: 1; animation: fadeDown 0.8s 0.1s ease both; }
    .brand-sub { font-family: 'Rajdhani', sans-serif; font-size: 0.85rem; font-weight: 600; letter-spacing: 6px; text-transform: uppercase; color: var(--red); text-align: center; margin-top: 4px; margin-bottom: 28px; animation: fadeDown 0.8s 0.2s ease both; }
    .card { width: 100%; background: linear-gradient(160deg, #262b38 0%, #1c2030 100%); border: 1px solid rgba(192,0,10,0.35); border-radius: 20px; padding: 32px 28px 28px; box-shadow: 0 0 0 1px rgba(200,205,212,0.1), 0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.08); animation: fadeUp 0.8s 0.3s ease both; position: relative; overflow: hidden; }
    .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--red), var(--red-glow), var(--red), transparent); animation: scanline 3s ease-in-out infinite; }
    @keyframes scanline { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
    .card-title { font-family: 'Rajdhani', sans-serif; font-size: 1.5rem; font-weight: 700; letter-spacing: 2px; text-align: center; color: var(--silver-bright); margin-bottom: 6px; }
    .card-sub { text-align: center; color: #666; font-size: 0.82rem; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 28px; }
    .stars-section { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-bottom: 28px; }
    .stars-label { font-size: 0.78rem; letter-spacing: 2px; text-transform: uppercase; color: #555; }
    .stars { display: flex; gap: 8px; }
    .star { font-size: 2.6rem; color: var(--star-off); cursor: pointer; transition: all 0.2s ease; filter: drop-shadow(0 0 0px transparent); user-select: none; line-height: 1; }
    .star.active, .star.hover { color: var(--star-on); filter: drop-shadow(0 0 8px rgba(255,215,0,0.7)); transform: scale(1.15); }
    .star-msg { font-family: 'Rajdhani', sans-serif; font-size: 1.1rem; font-weight: 600; letter-spacing: 2px; color: var(--red); text-align: center; min-height: 1.5em; transition: all 0.3s ease; }
    .btn-avaliar { display: block; width: 100%; padding: 16px 20px; background: linear-gradient(135deg, var(--red) 0%, #8b0000 100%); color: var(--white); font-family: 'Rajdhani', sans-serif; font-size: 1.2rem; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; text-align: center; text-decoration: none; border-radius: 12px; border: 1px solid rgba(255,26,38,0.4); box-shadow: 0 4px 20px rgba(192,0,10,0.4), inset 0 1px 0 rgba(255,255,255,0.1); transition: transform 0.25s ease, box-shadow 0.25s ease; position: relative; overflow: hidden; cursor: pointer; margin-bottom: 14px; animation: googlePulse 2s ease-in-out infinite; }
    @keyframes googlePulse { 0% { box-shadow: 0 0 0 0 rgba(192,0,10,0.75), 0 4px 20px rgba(192,0,10,0.4), inset 0 1px 0 rgba(255,255,255,0.1); } 50% { box-shadow: 0 0 0 12px rgba(192,0,10,0), 0 4px 20px rgba(192,0,10,0.4), inset 0 1px 0 rgba(255,255,255,0.1); } 100% { box-shadow: 0 0 0 0 rgba(192,0,10,0), 0 4px 20px rgba(192,0,10,0.4), inset 0 1px 0 rgba(255,255,255,0.1); } }
    .btn-avaliar::before { content: ''; position: absolute; top: 0; left: -75%; width: 50%; height: 100%; background: linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.32) 50%, transparent 100%); animation: googleShine 2.8s ease-in-out infinite; pointer-events: none; }
    @keyframes googleShine { 0% { left: -75%; opacity: 0; } 15% { opacity: 1; } 50% { left: 130%; opacity: 1; } 51% { opacity: 0; } 100% { left: 130%; opacity: 0; } }
    .btn-avaliar:hover { transform: translateY(-2px); animation-play-state: paused; box-shadow: 0 8px 30px rgba(192,0,10,0.6), inset 0 1px 0 rgba(255,255,255,0.15); }
    .divider { display: flex; align-items: center; gap: 10px; margin: 4px 0 14px; opacity: 0.25; }
    .divider-line { flex: 1; height: 1px; background: var(--silver); }
    .social-label { font-family: 'Rajdhani', sans-serif; font-size: 0.75rem; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: #444; text-align: center; margin-bottom: 12px; }
    .social-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; width: 100%; margin-bottom: 14px; }
    .btn-social { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 7px; padding: 14px 8px 12px; background: rgba(255,255,255,0.03); border-radius: 14px; border: 1px solid rgba(200,205,212,0.1); text-decoration: none; transition: all 0.25s ease; position: relative; overflow: hidden; }
    .btn-social.whatsapp:hover { box-shadow: 0 8px 24px rgba(37,211,102,0.35); }
    .social-icon { width: 32px; height: 32px; transition: filter 0.25s ease; position: relative; z-index: 1; }
    .social-name { font-family: 'Rajdhani', sans-serif; font-size: 0.72rem; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: #666; transition: color 0.25s ease; position: relative; z-index: 1; }
    .address-pill { display: flex; align-items: flex-start; gap: 10px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; padding: 12px 16px; margin-top: 6px; }
    .address-pill .pin { font-size: 1.1rem; color: var(--red); flex-shrink: 0; margin-top: 1px; }
    .address-text { font-size: 0.78rem; color: #777; line-height: 1.5; letter-spacing: 0.3px; }
    .footer { margin-top: 32px; display: flex; flex-direction: column; align-items: center; gap: 10px; animation: fadeUp 0.8s 0.6s ease both; padding-bottom: 12px; }
    .footer-ssl { display: flex; align-items: center; gap: 7px; background: rgba(37,211,102,0.06); border: 1px solid rgba(37,211,102,0.2); border-radius: 20px; padding: 5px 14px; font-size: 0.7rem; letter-spacing: 1px; color: #25d366; }
    .footer-dev-btn { position: relative; display: inline-flex; align-items: center; gap: 8px; padding: 11px 22px; background: rgba(255,255,255,0.06); color: var(--silver); font-family: 'Rajdhani', sans-serif; font-size: 1rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; text-decoration: none; border-radius: 10px; border: 1px solid rgba(200,205,212,0.15); overflow: hidden; transition: all 0.25s ease; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.88); display: flex; align-items: center; justify-content: center; z-index: 999; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; backdrop-filter: blur(6px); }
    .modal-overlay.show { opacity: 1; pointer-events: all; }
    .modal { background: #161616; border: 1px solid rgba(192,0,10,0.4); border-radius: 20px; padding: 36px 28px; max-width: 360px; width: 90%; text-align: center; box-shadow: 0 0 60px rgba(192,0,10,0.25); transform: scale(0.9); transition: transform 0.3s ease; }
    .modal-overlay.show .modal { transform: scale(1); }
    .modal-btn { display: block; width: 100%; padding: 14px; background: linear-gradient(135deg, var(--red), #8b0000); color: white; font-family: 'Rajdhani', sans-serif; font-size: 1.1rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; text-decoration: none; border-radius: 10px; border: none; cursor: pointer; box-shadow: 0 4px 20px rgba(192,0,10,0.4); transition: all 0.2s; }
    .speed-lines { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .speed-line { position: absolute; height: 1px; background: linear-gradient(90deg, transparent, rgba(192,0,10,0.3), transparent); animation: speedLine linear infinite; }
    .carousel-wrap { width: 100%; margin: 0 0 28px; animation: fadeUp 0.8s 0.25s ease both; }
    .carousel-stage { position: relative; width: 100%; height: 280px; display: flex; align-items: center; justify-content: center; }
    .carousel-slide { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.55s ease; pointer-events: none; }
    .carousel-slide.active { opacity: 1; pointer-events: auto; }
    .carousel-slide .slide-img-wrap { width: 240px; height: 240px; border-radius: 22px; overflow: hidden; border: 2.5px solid rgba(192,0,10,0.75); box-shadow: 0 0 0 1px rgba(192,0,10,0.2), 0 0 32px rgba(192,0,10,0.55), 0 16px 40px rgba(0,0,0,0.65); }
    .carousel-slide .slide-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .carousel-phrase-slide { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.55s ease; pointer-events: none; }
    .carousel-phrase-slide.active { opacity: 1; }
    .carousel-phrase-slide .phrase-line { font-family: 'Rajdhani', sans-serif; font-size: 1.9rem; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; color: var(--silver-bright); line-height: 1.2; text-shadow: 0 0 30px rgba(192,0,10,0.9), 0 0 60px rgba(192,0,10,0.4), 0 2px 6px rgba(0,0,0,0.8); display: block; }
  </style>
</head>
<body>

<div id="timer-display">Carregando...</div>
<div id="error-screen">
  <h1 style="color: #c0000a;">ERRO 403: ACESSO NEGADO</h1>
  <p>Este link de visualização expirou após 24 horas.</p>
</div>

<div class="speed-lines" id="speedLines"></div>

<div class="container" id="main-content">
  <div class="logo-wrap">
    <img src="https://i.ibb.co/Ldrp2B4/logo-spn.png" alt="Logo">
  </div>

  <div class="carousel-wrap">
      <div class="carousel-stage" id="carouselStage">
          </div>
  </div>

  <div class="card">
      <div class="stars-section">
          <div class="stars" id="starContainer">
              <span class="star" data-v="1">★</span>
              <span class="star" data-v="2">★</span>
              <span class="star" data-v="3">★</span>
              <span class="star" data-v="4">★</span>
              <span class="star" data-v="5">★</span>
          </div>
      </div>
      <button class="btn-avaliar">AVALIAR AGORA</button>
  </div>
</div>

<script>
  // --- LÓGICA DO TEMPORIZADOR DE 24 HORAS ---
  (function() {
    const duration = 24 * 60 * 60 * 1000;
    let startTime = localStorage.getItem('site_timer_start_v2');
    if (!startTime) {
      startTime = Date.now();
      localStorage.setItem('site_timer_start_v2', startTime);
    }
    function updateTimer() {
      const remaining = duration - (Date.now() - startTime);
      if (remaining <= 0) {
        document.getElementById('main-content').style.display = 'none';
        document.getElementById('timer-display').style.display = 'none';
        document.getElementById('error-screen').style.display = 'flex';
        return;
      }
      const h = Math.floor(remaining / 3600000);
      const m = Math.floor((remaining % 3600000) / 60000);
      const s = Math.floor((remaining % 60000) / 1000);
      document.getElementById('timer-display').innerText = `Expira em: ${h}h ${m}m ${s}s`;
    }
    setInterval(updateTimer, 1000);
    updateTimer();
  })();

  // --- SEU JS ORIGINAL DO CARROSSEL E ESTRELAS ABAIXO ---
  // (Cole aqui o script original das fotos e das estrelas)
</script>
</body>
</html>
