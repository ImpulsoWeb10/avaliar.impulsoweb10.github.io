<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luciano Cabeleireiro | VIP Experience</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Quicksand', sans-serif;
            background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);
            color: white;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; padding: 15px;
        }

        .container {
            max-width: 420px; width: 100%;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            padding: 40px 25px; border-radius: 40px;
            border: 1px solid rgba(250, 204, 21, 0.15);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            text-align: center; position: relative;
        }

        /* PROVA SOCIAL */
        .social-proof {
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            background: #facc15; color: #000; padding: 8px 20px;
            border-radius: 25px; font-size: 10px; font-weight: 900;
            white-space: nowrap; box-shadow: 0 10px 20px rgba(250, 204, 21, 0.2);
            z-index: 10; letter-spacing: 1px;
        }

        .logo { 
            width: 100%; max-width: 200px; height: auto;
            margin-bottom: 20px; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
        }

        h1 { font-size: 24px; color: #fff; margin-bottom: 5px; font-weight: 700; }
        h2 { font-size: 12px; color: #facc15; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px; }
        
        #emoji-reacao { font-size: 50px; margin-bottom: 10px; display: block; height: 60px; }

        /* RATING */
        .rating-box { margin-bottom: 35px; display: flex; justify-content: center; gap: 12px; }
        .star-btn {
            font-size: 38px; color: #334155; cursor: pointer;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .star-btn.active { color: #facc15; transform: scale(1.15); text-shadow: 0 0 20px rgba(250, 204, 21, 0.5); }

        /* BOTÕES PRINCIPAIS */
        .botao {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            width: 100%; padding: 18px; border-radius: 15px;
            font-weight: 800; font-size: 14px; text-decoration: none; transition: 0.3s;
            border: none; cursor: pointer; margin-bottom: 15px;
        }

        .google { background: #facc15; color: #000; }
        .google:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(250, 204, 21, 0.3); }

        .btn-modal { background: #fff; color: #000; box-shadow: 0 4px 15px rgba(255,255,255,0.1); }

        /* MODAL ESTRUTURA */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
            display: none; align-items: center; justify-content: center; z-index: 100;
            padding: 20px;
        }

        .modal-content {
            background: #1a1a1a; width: 100%; max-width: 360px;
            padding: 30px; border-radius: 30px; border: 1px solid #333;
            text-align: left; animation: slideUp 0.4s ease;
        }

        .modal-content h3 { font-size: 20px; margin-bottom: 20px; color: #facc15; text-align: center; }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 12px; color: #888; margin-bottom: 8px; margin-left: 5px; }
        
        .input-style {
            width: 100%; background: #222; border: 1px solid #444;
            padding: 15px; border-radius: 12px; color: white;
            font-family: inherit; font-size: 15px; outline: none;
        }
        .input-style:focus { border-color: #facc15; }

        .btn-confirmar { background: #22c55e; color: white; margin-top: 10px; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

        .footer { margin-top: 30px; font-size: 10px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 20px; color: rgba(255,255,255,0.4); }
    </style>
</head>
<body>

<div class="container">
    <div class="social-proof"><i class="fas fa-crown"></i> ATENDIMENTO EXCLUSIVO</div>

    <i class="fas fa-cut" style="font-size: 40px; color: #facc15; margin-bottom: 15px;"></i>

    <h1>Luciano Cabeleireiro</h1>
    <h2>Excelência em cada detalhe</h2>
    
    <div id="emoji-reacao">✨</div>

    <div class="rating-box">
        <i class="fas fa-star star-btn" onclick="avaliar(1)"></i>
        <i class="fas fa-star star-btn" onclick="avaliar(2)"></i>
        <i class="fas fa-star star-btn" onclick="avaliar(3)"></i>
        <i class="fas fa-star star-btn" onclick="avaliar(4)"></i>
        <i class="fas fa-star star-btn" onclick="avaliar(5)"></i>
    </div>

    <div id="acoes-cliente">
        <a href="https://g.page/SUA_PAGINA_GOOGLE/review" target="_blank" class="botao google">
            <i class="fab fa-google"></i> AVALIAR NO GOOGLE
        </a>

        <button onclick="abrirModal()" class="botao btn-modal">
            <i class="far fa-calendar-check"></i> AGENDAR PRÓXIMO CORTE
        </button>
    </div>

    <div class="footer">
        <div>🔒 AMBIENTE VIP | © 2026</div>
        <div style="margin-top: 8px;">Desenvolvido por <a href="https://impulsoweb10.com.br/" style="color:#facc15; text-decoration:none; font-weight:700;">ImpulsoWeb10</a></div>
    </div>
</div>

<div class="modal-overlay" id="modalAgendamento">
    <div class="modal-content">
        <h3>Reservar Horário</h3>
        
        <div class="form-group">
            <label>Seu Nome</label>
            <input type="text" id="nomeCliente" class="input-style" placeholder="Ex: João Silva">
        </div>

        <div class="form-group">
            <label>Data Desejada</label>
            <input type="date" id="dataAgendamento" class="input-style">
        </div>

        <div class="form-group">
            <label>Melhor Horário</label>
            <input type="time" id="horaAgendamento" class="input-style">
        </div>

        <button onclick="enviarAgendamento()" class="botao btn-confirmar">
            <i class="fab fa-whatsapp"></i> CONFIRMAR NO WHATSAPP
        </button>
        
        <button onclick="fecharModal()" style="background:transparent; color:#888; border:none; width:100%; font-size:12px; cursor:pointer;">Cancelar</button>
    </div>
</div>

<script>
    const emojis = ["✨", "☹️", "😐", "🙂", "🤩", "😍"];
    const telefoneBarbearia = "55119970967674";

    function avaliar(n) {
        const stars = document.querySelectorAll('.star-btn');
        const emojiArea = document.getElementById('emoji-reacao');

        stars.forEach((s, i) => {
            if (i < n) s.classList.add('active');
            else s.classList.remove('active');
        });

        emojiArea.innerText = emojis[n];

        if (n >= 4) {
            confetti({ 
                particleCount: 100, spread: 70, origin: { y: 0.8 },
                colors: ['#facc15', '#ffffff'] 
            });
        }
    }

    // Lógica do Modal
    function abrirModal() {
        document.getElementById('modalAgendamento').style.display = 'flex';
    }

    function fecharModal() {
        document.getElementById('modalAgendamento').style.display = 'none';
    }

    function enviarAgendamento() {
        const nome = document.getElementById('nomeCliente').value;
        const data = document.getElementById('dataAgendamento').value;
        const hora = document.getElementById('horaAgendamento').value;

        if(!nome || !data || !hora) {
            alert("Por favor, preencha todos os campos para o agendamento.");
            return;
        }

        // Formatar data para PT-BR
        const dataFormatada = data.split('-').reverse().join('/');

        const mensagem = encodeURIComponent(
            `Olá Luciano! Gostaria de agendar um corte:\n\n` +
            `👤 *Nome:* ${nome}\n` +
            `📅 *Data:* ${dataFormatada}\n` +
            `⏰ *Hora:* ${hora}\n\n` +
            `Aguardo confirmação! ✂️`
        );

        window.open(`https://wa.me/${telefoneBarbearia}?text=${mensagem}`, '_blank');
        fecharModal();
    }

    // Fechar modal ao clicar fora dele
    window.onclick = function(event) {
        const modal = document.getElementById('modalAgendamento');
        if (event.target == modal) fecharModal();
    }
</script>

</body>
</html>
