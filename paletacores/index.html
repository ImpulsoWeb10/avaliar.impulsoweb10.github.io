<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador Qualy Quimy</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    text-align: center;
}

/* MENU */
.menu button {
    padding: 12px;
    margin: 10px;
    border: none;
    border-radius: 8px;
    background: #222;
    color: white;
}

/* AMBIENTES */
.ambiente {
    width: 320px;
    height: 200px;
    margin: 20px auto;
    position: relative;
    display: none;
}

/* SALA */
.sala {
    display: flex;
}
.sala .parede {
    flex: 1;
}

/* QUARTO */
.quarto {
    display: flex;
}
.quarto .parede {
    flex: 1;
}

/* FACHADA */
.fachada {
    display: flex;
}
.fachada .parede {
    flex: 1;
}

/* DETALHES VISUAIS */
.chao {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 30px;
    background: #999;
}

.teto {
    position: absolute;
    top: 0;
    width: 100%;
    height: 20px;
    background: #ddd;
}

/* BOTÕES */
button.acao {
    margin: 10px;
    padding: 12px 20px;
    background: #28a745;
    color: white;
    border: none;
    border-radius: 8px;
}
</style>
</head>

<body>

<h2>Tintas Qualy Quimy</h2>

<div class="menu">
    <button onclick="mostrar('sala')">🏡 Sala</button>
    <button onclick="mostrar('quarto')">🛏️ Quarto</button>
    <button onclick="mostrar('fachada')">🏠 Fachada</button>
</div>

<!-- SALA -->
<div id="sala" class="ambiente sala">
    <div id="s1" class="parede"></div>
    <div id="s2" class="parede"></div>
    <div id="s3" class="parede"></div>
    <div class="chao"></div>
    <div class="teto"></div>
</div>

<!-- QUARTO -->
<div id="quarto" class="ambiente quarto">
    <div id="q1" class="parede"></div>
    <div id="q2" class="parede"></div>
    <div id="q3" class="parede"></div>
    <div class="chao"></div>
    <div class="teto"></div>
</div>

<!-- FACHADA -->
<div id="fachada" class="ambiente fachada">
    <div id="f1" class="parede"></div>
    <div id="f2" class="parede"></div>
    <div id="f3" class="parede"></div>
    <div class="chao"></div>
</div>

<h3 id="nome"></h3>

<button class="acao" onclick="trocar()">Trocar combinação</button>
<button class="acao" onclick="comprar()">Quero esse kit</button>

<script>

let atual = {};

/* KITS PROFISSIONAIS */
const dados = {

sala: [
{nome:"Kit Sala Moderna", cores:["#ffffff","#888","#2c3e50"]},
{nome:"Kit Sala Clean", cores:["#f5f5f5","#ddd","#aaa"]}
],

quarto: [
{nome:"Kit Quarto Suave", cores:["#fff5e1","#e6d2b5","#c2a47e"]},
{nome:"Kit Quarto Relax", cores:["#eaf6ff","#bcdffb","#5dade2"]}
],

fachada: [
{nome:"Kit Fachada Elegante", cores:["#eee","#555","#222"]},
{nome:"Kit Fachada Natural", cores:["#f4e1c1","#a67c52","#5c4033"]}
]

};

let tipoAtual = "sala";

function mostrar(tipo){
    tipoAtual = tipo;

    document.querySelectorAll(".ambiente").forEach(a => a.style.display = "none");
    document.getElementById(tipo).style.display = "flex";

    trocar();
}

function trocar(){
    let lista = dados[tipoAtual];
    let k = lista[Math.floor(Math.random() * lista.length)];
    atual = k;

    if(tipoAtual === "sala"){
        document.getElementById("s1").style.background = k.cores[0];
        document.getElementById("s2").style.background = k.cores[1];
        document.getElementById("s3").style.background = k.cores[2];
    }

    if(tipoAtual === "quarto"){
        document.getElementById("q1").style.background = k.cores[0];
        document.getElementById("q2").style.background = k.cores[1];
        document.getElementById("q3").style.background = k.cores[2];
    }

    if(tipoAtual === "fachada"){
        document.getElementById("f1").style.background = k.cores[0];
        document.getElementById("f2").style.background = k.cores[1];
        document.getElementById("f3").style.background = k.cores[2];
    }

    document.getElementById("nome").innerText = atual.nome;
}

function comprar(){
    let texto = "Quero o " + atual.nome + " da Tintas Qualy Quimy";
    window.open("https://wa.me/55SEUNUMERO?text=" + encodeURIComponent(texto));
}

/* INICIAL */
mostrar("sala");

</script>

</body>
</html>
