<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador Qualy Quimy</title>

<link rel="manifest" href="manifest.json">

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    text-align: center;
}

/* MENU */
.menu button {
    padding: 12px;
    margin: 8px;
    border: none;
    border-radius: 8px;
    background: #222;
    color: white;
    cursor: pointer;
}

/* AMBIENTE */
.ambiente {
    width: 350px;
    height: 220px;
    margin: 20px auto;
    position: relative;
    display: none;
    overflow: hidden;
    border-radius: 10px;
}

/* PAREDES */
.parede {
    flex: 1;
    transition: 0.5s;
    background-size: cover;
    background-blend-mode: multiply;
}

/* LUZ */
.luz {
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(to bottom, rgba(255,255,255,0.2), transparent);
}

/* CHÃO E TETO */
.chao {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 35px;
    background: #999;
}

.teto {
    position: absolute;
    top: 0;
    width: 100%;
    height: 20px;
    background: #ddd;
}

/* SALA */
.sala { display: flex; }

.sofa {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    width: 180px;
    height: 50px;
    border-radius: 10px;
    box-shadow: 0 5px 10px rgba(0,0,0,0.3);
    transition: 0.5s;
}

.mesa {
    position: absolute;
    bottom: 25px;
    left: 50%;
    transform: translateX(-50%);
    width: 80px;
    height: 20px;
    background: #8b5a2b;
    border-radius: 5px;
    box-shadow: 0 5px 10px rgba(0,0,0,0.3);
}

/* QUARTO */
.quarto { display: flex; }

.cama {
    position: absolute;
    bottom: 35px;
    left: 50%;
    transform: translateX(-50%);
    width: 160px;
    height: 50px;
    border-radius: 8px;
    box-shadow: 0 5px 10px rgba(0,0,0,0.3);
    transition: 0.5s;
}

/* FACHADA */
.fachada { display: flex; }

.porta {
    position: absolute;
    bottom: 0;
    left: 40%;
    width: 45px;
    height: 70px;
    background: #3e2723;
    box-shadow: 0 5px 10px rgba(0,0,0,0.3);
}

.janela {
    position: absolute;
    bottom: 60px;
    left: 60%;
    width: 40px;
    height: 30px;
    background: #87ceeb;
    border: 2px solid #333;
}

/* BOTÕES */
button.acao {
    margin: 8px;
    padding: 12px 18px;
    background: #28a745;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}
</style>
</head>

<body>

<h2>🎨 Simulador Qualy Quimy</h2>

<div class="menu">
    <button onclick="mostrar('sala')">🏡 Sala</button>
    <button onclick="mostrar('quarto')">🛏️ Quarto</button>
    <button onclick="mostrar('fachada')">🏠 Fachada</button>
</div>

<!-- SALA -->
<div id="sala" class="ambiente sala">
    <div id="s1" class="parede"></div>
    <div id="s2" class="parede"></div>
    <div id="s3" class="parede"></div>
    <div class="sofa"></div>
    <div class="mesa"></div>
    <div class="luz"></div>
    <div class="chao"></div>
    <div class="teto"></div>
</div>

<!-- QUARTO -->
<div id="quarto" class="ambiente quarto">
    <div id="q1" class="parede"></div>
    <div id="q2" class="parede"></div>
    <div id="q3" class="parede"></div>
    <div class="cama"></div>
    <div class="luz"></div>
    <div class="chao"></div>
    <div class="teto"></div>
</div>

<!-- FACHADA -->
<div id="fachada" class="ambiente fachada">
    <div id="f1" class="parede"></div>
    <div id="f2" class="parede"></div>
    <div id="f3" class="parede"></div>
    <div class="porta"></div>
    <div class="janela"></div>
    <div class="luz"></div>
    <div class="chao"></div>
</div>

<h3 id="nome"></h3>

<button class="acao" onclick="trocar()">🎨 Trocar</button>
<button class="acao" onclick="modo()">🌗 Dia/Noite</button>
<button class="acao" onclick="favoritar()">❤️ Favoritar</button>
<button class="acao" onclick="comprar()">🛒 Comprar</button>

<script>

let atual = {};
let tipoAtual = "sala";
let noite = false;

const textura = "https://www.transparenttextures.com/patterns/concrete-wall.png";

const dados = {
sala: [
{nome:"Kit Sala Moderna", cores:["#ffffff","#888","#2c3e50"]},
{nome:"Kit Sala Clean", cores:["#f5f5f5","#ddd","#aaa"]}
],
quarto: [
{nome:"Kit Quarto Suave", cores:["#fff5e1","#e6d2b5","#c2a47e"]},
{nome:"Kit Quarto Relax", cores:["#eaf6ff","#bcdffb","#5dade2"]}
],
fachada: [
{nome:"Kit Fachada Elegante", cores:["#eee","#555","#222"]},
{nome:"Kit Fachada Natural", cores:["#f4e1c1","#a67c52","#5c4033"]}
]
};

function mostrar(tipo){
    tipoAtual = tipo;
    document.querySelectorAll(".ambiente").forEach(a => a.style.display="none");
    document.getElementById(tipo).style.display="flex";
    trocar();
}

function aplicarTextura(){
    document.querySelectorAll(".parede").forEach(p=>{
        p.style.backgroundImage = `url(${textura})`;
    });
}

function trocar(){
    let lista = dados[tipoAtual];
    let k = lista[Math.floor(Math.random()*lista.length)];
    atual = k;

    if(tipoAtual==="sala"){
        s1.style.background=k.cores[0];
        s2.style.background=k.cores[1];
        s3.style.background=k.cores[2];
        document.querySelector(".sofa").style.background=k.cores[2];
    }

    if(tipoAtual==="quarto"){
        q1.style.background=k.cores[0];
        q2.style.background=k.cores[1];
        q3.style.background=k.cores[2];
        document.querySelector(".cama").style.background=k.cores[2];
    }

    if(tipoAtual==="fachada"){
        f1.style.background=k.cores[0];
        f2.style.background=k.cores[1];
        f3.style.background=k.cores[2];
    }

    aplicarTextura();
    nome.innerText = atual.nome;
}

function modo(){
    noite = !noite;
    let filtro = noite ? "brightness(0.6)" : "brightness(1)";
    document.querySelectorAll(".ambiente").forEach(el=>{
        el.style.filter = filtro;
    });
}

function favoritar(){
    localStorage.setItem("kitFavorito", JSON.stringify(atual));
    alert("Salvo!");
}

function comprar(){
    let texto = "Quero o "+atual.nome+" da Qualy Quimy";
    window.open("https://wa.me/55SEUNUMERO?text="+encodeURIComponent(texto));
}

/* carregar favorito */
let fav = localStorage.getItem("kitFavorito");
if(fav){
    atual = JSON.parse(fav);
    nome.innerText = atual.nome;
}

mostrar("sala");

</script>

</body>
</html>
