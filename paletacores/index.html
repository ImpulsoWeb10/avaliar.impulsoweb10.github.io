<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador + Inspiração</title>

<style>
body{
    font-family:Arial;
    text-align:center;
    background:#f5f5f5;
}

/* MENU */
.menu button{
    padding:10px;
    margin:5px;
    border:none;
    border-radius:8px;
    background:#222;
    color:#fff;
    cursor:pointer;
}

/* AMBIENTE */
.ambiente{
    width:350px;
    height:200px;
    margin:20px auto;
    display:none;
    position:relative;
    display:flex;
}

.parede{
    flex:1;
    transition:0.5s;
}

/* ELEMENTOS */
.chao{position:absolute;bottom:0;height:30px;width:100%;background:#999;}
.teto{position:absolute;top:0;height:20px;width:100%;background:#ddd;}

.sofa{
    position:absolute;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    width:150px;
    height:40px;
}

/* INSPIRAÇÃO */
#galeria{
    display:flex;
    overflow-x:auto;
    gap:10px;
    padding:10px;
}

#galeria img{
    width:120px;
    height:80px;
    border-radius:8px;
    cursor:pointer;
}

#paleta{
    display:flex;
    justify-content:center;
    margin-top:10px;
}

.cor{
    width:60px;
    height:60px;
    margin:5px;
    border-radius:8px;
    cursor:pointer;
}

/* BOTÕES */
button.acao{
    margin:5px;
    padding:10px;
    background:#28a745;
    color:#fff;
    border:none;
    border-radius:8px;
}
</style>
</head>

<body>

<h2>🎨 Simulador com Inspiração</h2>

<div class="menu">
    <button onclick="mostrar('sala')">Sala</button>
    <button onclick="mostrar('quarto')">Quarto</button>
    <button onclick="mostrar('fachada')">Fachada</button>
</div>

<!-- AMBIENTE -->
<div id="sala" class="ambiente">
    <div id="p1" class="parede"></div>
    <div id="p2" class="parede"></div>
    <div id="p3" class="parede"></div>
    <div class="sofa"></div>
    <div class="chao"></div>
    <div class="teto"></div>
</div>

<h3 id="nome"></h3>

<button class="acao" onclick="trocar()">🎨 Trocar</button>

<hr>

<h3>✨ Inspire-se</h3>

<div id="galeria">
    <img src="https://images.unsplash.com/photo-1525310072745-f49212b5ac6d" onclick="carregarImagem(this)">
    <img src="https://images.unsplash.com/photo-1501004318641-b39e6451bec6" onclick="carregarImagem(this)">
    <img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7" onclick="carregarImagem(this)">
</div>

<canvas id="canvas" width="300" height="200"></canvas>

<div id="paleta"></div>

<script>

let tipoAtual="sala";

/* MOSTRAR AMBIENTE */
function mostrar(tipo){
    tipoAtual=tipo;
    document.querySelectorAll(".ambiente").forEach(a=>a.style.display="none");
    document.getElementById("sala").style.display="flex";
}

/* TROCAR */
function trocar(){
    let cores=["#eee","#999","#2c3e50"];
    aplicarCores(cores);
}

/* APLICAR CORES */
function aplicarCores(cores){
    p1.style.background=cores[0];
    p2.style.background=cores[1];
    p3.style.background=cores[2];
    document.querySelector(".sofa").style.background=cores[2];
}

/* INSPIRAÇÃO */
function carregarImagem(img){
    let canvas=document.getElementById("canvas");
    let ctx=canvas.getContext("2d");

    ctx.drawImage(img,0,0,300,200);

    gerarPaleta(ctx);
}

/* GERAR PALETA */
function gerarPaleta(ctx){
    let data=ctx.getImageData(0,0,300,200).data;
    let cores=[];

    for(let i=0;i<data.length;i+=50){
        let r=data[i];
        let g=data[i+1];
        let b=data[i+2];

        cores.push(`rgb(${r},${g},${b})`);
    }

    mostrarPaleta(cores.slice(0,5));
}

/* MOSTRAR PALETA */
function mostrarPaleta(lista){
    let div=document.getElementById("paleta");
    div.innerHTML="";

    lista.forEach(cor=>{
        let c=document.createElement("div");
        c.className="cor";
        c.style.background=cor;

        c.onclick=()=>usarCor(cor);

        div.appendChild(c);
    });
}

/* USAR COR */
function usarCor(cor){
    p1.style.background=cor;
}

mostrar("sala");

</script>

</body>
</html>
