<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador de Cores</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    text-align: center;
}

h1 {
    margin-top: 20px;
}

.roda {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    margin: 30px auto;
    transition: transform 0.5s;
    border: 5px solid #ddd;
}

.cores {
    display: flex;
    justify-content: center;
    gap: 10px;
}

.cor {
    width: 80px;
    height: 80px;
    border-radius: 10px;
}

button {
    margin-top: 20px;
    padding: 12px 20px;
    background: #28a745;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>Gire e descubra combinações</h1>

<div id="roda" class="roda"></div>

<div class="cores">
    <div id="c1" class="cor"></div>
    <div id="c2" class="cor"></div>
    <div id="c3" class="cor"></div>
</div>

<h2 id="nome"></h2>

<button onclick="girar()">Girar</button>
<button onclick="comprar()">Quero essa combinação</button>

<script>
let angulo = 0;

const paletas = [
    {
        nome: "Moderna",
        cores: ["#ffffff", "#888888", "#2c3e50"]
    },
    {
        nome: "Elegante",
        cores: ["#f4e1c1", "#a67c52", "#5c4033"]
    },
    {
        nome: "Ousada",
        cores: ["#ffffff", "#c0392b", "#2c3e50"]
    },
    {
        nome: "Natural",
        cores: ["#dfe6e9", "#55efc4", "#2d3436"]
    }
];

function girar() {
    angulo += 90;
    document.getElementById("roda").style.transform = `rotate(${angulo}deg)`;

    let p = paletas[Math.floor(Math.random() * paletas.length)];

    document.getElementById("c1").style.background = p.cores[0];
    document.getElementById("c2").style.background = p.cores[1];
    document.getElementById("c3").style.background = p.cores[2];

    document.getElementById("nome").innerText = p.nome;
}

function comprar() {
    let texto = "Olá! Quero essa combinação de cores.";
    window.open("https://wa.me/55SEUNUMERO?text=" + encodeURIComponent(texto));
}
</script>

</body>
</html>
