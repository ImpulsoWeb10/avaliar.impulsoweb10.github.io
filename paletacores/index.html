<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador Qualy Quimy</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    text-align: center;
}

h1 {
    margin-top: 20px;
}

.logo {
    font-size: 22px;
    font-weight: bold;
    margin-top: 10px;
}

.triangulo {
    width: 0;
    height: 0;
    border-left: 100px solid transparent;
    border-right: 100px solid transparent;
    border-bottom: 200px solid #ccc;
    margin: 40px auto;
    transition: transform 0.6s;
    position: relative;
}

.faixa {
    position: absolute;
    bottom: 0;
    width: 0;
    height: 0;
    border-left: 100px solid transparent;
    border-right: 100px solid transparent;
}

.cores {
    display: flex;
    justify-content: center;
    gap: 10px;
}

.cor {
    width: 80px;
    height: 80px;
    border-radius: 10px;
}

button {
    margin-top: 20px;
    padding: 12px 20px;
    background: #28a745;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="logo">Tintas Qualy Quimy</div>

<h1>Gire e descubra sua combinação</h1>

<div id="triangulo" class="triangulo"></div>

<div class="cores">
    <div id="c1" class="cor"></div>
    <div id="c2" class="cor"></div>
    <div id="c3" class="cor"></div>
</div>

<h2 id="kit"></h2>

<button onclick="girar()">Girar</button>
<button onclick="comprar()">Quero esse kit</button>

<script>

let angulo = 0;

const kits = [
    {
        nome: "Kit Sala Moderna",
        cores: ["#ffffff", "#888888", "#2c3e50"]
    },
    {
        nome: "Kit Parede Interna Premium",
        cores: ["#f4e1c1", "#d2b48c", "#a67c52"]
    },
    {
        nome: "Kit Grafiato + Fundo",
        cores: ["#dcdcdc", "#555555", "#222222"]
    },
    {
        nome: "Kit Ambiente Sofisticado",
        cores: ["#ffffff", "#c0392b", "#2c3e50"]
    }
];

function girar() {
    angulo += 120;
    document.getElementById("triangulo").style.transform = `rotate(${angulo}deg)`;

    let k = kits[Math.floor(Math.random() * kits.length)];

    document.getElementById("c1").style.background = k.cores[0];
    document.getElementById("c2").style.background = k.cores[1];
    document.getElementById("c3").style.background = k.cores[2];

    document.getElementById("kit").innerText = k.nome;
}

function comprar() {
    let texto = document.getElementById("kit").innerText;
    window.open("https://wa.me/55SEUNUMERO?text=Quero o " + encodeURIComponent(texto));
}

</script>

</body>
</html>
