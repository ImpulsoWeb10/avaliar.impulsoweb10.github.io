<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador Qualy Quimy</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    text-align: center;
}

/* MENU */
.menu button {
    padding: 10px;
    margin: 5px;
    border: none;
    border-radius: 8px;
    background: #222;
    color: white;
    cursor: pointer;
}

/* AMBIENTE */
.ambiente {
    width: 350px;
    height: 220px;
    margin: 20px auto;
    position: relative;
    display: none;
    overflow: hidden;
    border-radius: 10px;
}

/* PAREDES */
.parede {
    flex: 1;
    transition: 0.5s;
    background-size: cover;
    background-blend-mode: multiply;
}

/* LUZ */
.luz {
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(to bottom, rgba(255,255,255,0.2), transparent);
}

/* CHÃO E TETO */
.chao {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 35px;
    background: #999;
}

.teto {
    position: absolute;
    top: 0;
    width: 100%;
    height: 20px;
    background: #ddd;
}

/* SALA */
.sala { display: flex; }

.sofa {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    width: 180px;
    height: 50px;
    border-radius: 10px;
    box-shadow: 0 5px 10px rgba(0,0,0,0.3);
    transition: 0.5s;
}

.mesa {
    position: absolute;
    bottom: 25px;
    left: 50%;
    transform: translateX(-50%);
    width: 80px;
    height: 20px;
    background: #8b5a2b;
    border-radius: 5px;
}

/* QUARTO */
.quarto { display: flex; }

.cama {
    position: absolute;
    bottom: 35px;
    left: 50%;
    transform: translateX(-50%);
    width: 160px;
    height: 50px;
    border-radius: 8px;
    box-shadow: 0 5px 10px rgba(0,0,0,0.3);
}

/* FACHADA */
.fachada { display: flex; }

.porta {
    position: absolute;
    bottom: 0;
    left: 40%;
    width: 45px;
    height: 70px;
    background: #3e2723;
}

.janela {
    position: absolute;
    bottom: 60px;
    left: 60%;
    width: 40px;
    height: 30px;
    background: #87ceeb;
}

/* BOTÕES */
button.acao {
    margin: 5px;
    padding: 10px;
    background: #28a745;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

/* FOTO */
#canvas {
    margin-top: 10px;
    border-radius: 10px;
}
</style>
</head>

<body>

<h2 id="titulo">🎨 Simulador</h2>

<div class="menu">
    <button onclick="mostrar('sala')">🏡 Sala</button>
    <button onclick="mostrar('quarto')">🛏️ Quarto</button>
    <button onclick="mostrar('fachada')">🏠 Fachada</button>
</div>

<!-- SALA -->
<div id="sala" class="ambiente sala">
    <div id="s1" class="parede"></div>
    <div id="s2" class="parede"></div>
    <div id="s3" class="parede"></div>
    <div class="sofa"></div>
    <div class="mesa"></div>
    <div class="luz"></div>
    <div class="chao"></div>
    <div class="teto"></div>
</div>

<!-- QUARTO -->
<div id="quarto" class="ambiente quarto">
    <div id="q1" class="parede"></div>
    <div id="q2" class="parede"></div>
    <div id="q3" class="parede"></div>
    <div class="cama"></div>
    <div class="luz"></div>
    <div class="chao"></div>
    <div class="teto"></div>
</div>

<!-- FACHADA -->
<div id="fachada" class="ambiente fachada">
    <div id="f1" class="parede"></div>
    <div id="f2" class="parede"></div>
    <div id="f3" class="parede"></div>
    <div class="porta"></div>
    <div class="janela"></div>
    <div class="luz"></div>
    <div class="chao"></div>
</div>

<h3 id="nome"></h3>

<button class="acao" onclick="trocar()">🎨 Trocar</button>
<button class="acao" onclick="modo()">🌗 Dia/Noite</button>
<button class="acao" onclick="favoritar()">❤️ Favoritar</button>
<button class="acao" onclick="comprar()">🛒 Comprar</button>

<hr>

<h3>📸 Teste na sua casa</h3>

<input type="file" id="upload" accept="image/*">

<br><br>

<label>Intensidade:</label><br>
<input type="range" id="intensidade" min="0" max="1" step="0.05" value="0.5">

<br><br>

<canvas id="canvas" width="320" height="200"></canvas>

<script>

let atual = {};
let tipoAtual = "sala";
let noite = false;

const textura = "https://www.transparenttextures.com/patterns/concrete-wall.png";

const dados = {
sala: [
{nome:"Sala Moderna", cores:["#ffffff","#888","#2c3e50"]},
{nome:"Sala Clean", cores:["#f5f5f5","#ddd","#aaa"]}
],
quarto: [
{nome:"Quarto Suave", cores:["#fff5e1","#e6d2b5","#c2a47e"]},
{nome:"Quarto Relax", cores:["#eaf6ff","#bcdffb","#5dade2"]}
],
fachada: [
{nome:"Fachada Elegante", cores:["#eee","#555","#222"]}
]
};

function mostrar(tipo){
    tipoAtual = tipo;
    document.querySelectorAll(".ambiente").forEach(a=>a.style.display="none");
    document.getElementById(tipo).style.display="flex";
    trocar();
}

function aplicarTextura(){
    document.querySelectorAll(".parede").forEach(p=>{
        p.style.backgroundImage = `url(${textura})`;
    });
}

function trocar(){
    let lista = dados[tipoAtual];
    let k = lista[Math.floor(Math.random()*lista.length)];
    atual = k;

    if(tipoAtual==="sala"){
        s1.style.background=k.cores[0];
        s2.style.background=k.cores[1];
        s3.style.background=k.cores[2];
        document.querySelector(".sofa").style.background=k.cores[2];
    }

    if(tipoAtual==="quarto"){
        q1.style.background=k.cores[0];
        q2.style.background=k.cores[1];
        q3.style.background=k.cores[2];
        document.querySelector(".cama").style.background=k.cores[2];
    }

    if(tipoAtual==="fachada"){
        f1.style.background=k.cores[0];
        f2.style.background=k.cores[1];
        f3.style.background=k.cores[2];
    }

    aplicarTextura();
    nome.innerText = atual.nome;

    corAtual = k.cores[0];
    desenhar();
}

/* DIA/NOITE */
function modo(){
    noite = !noite;
    let filtro = noite ? "brightness(0.6)" : "brightness(1)";
    document.querySelectorAll(".ambiente").forEach(el=>{
        el.style.filter = filtro;
    });
}

/* FAVORITO */
function favoritar(){
    localStorage.setItem("kitFavorito", JSON.stringify(atual));
    alert("Salvo!");
}

/* WHATSAPP */
function comprar(){
    let texto = "Quero o "+atual.nome;
    window.open("https://wa.me/55SEUNUMERO?text="+encodeURIComponent(texto));
}

/* FOTO REAL */
let img = new Image();
let corAtual = "#ffffff";

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

upload.addEventListener("change", function(e){
    let file = e.target.files[0];
    let reader = new FileReader();

    reader.onload = function(event){
        img.onload = desenhar;
        img.src = event.target.result;
    }

    reader.readAsDataURL(file);
});

intensidade.addEventListener("input", desenhar);

function desenhar(){
    if(!img.src) return;

    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(img,0,0,canvas.width,canvas.height);

    let intensidadeValor = intensidade.value;

    ctx.globalCompositeOperation = "multiply";
    ctx.globalAlpha = intensidadeValor;

    ctx.fillStyle = corAtual;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.globalAlpha = 1;
    ctx.globalCompositeOperation = "source-over";
}

/* INICIAL */
mostrar("sala");

</script>

</body>
</html>
