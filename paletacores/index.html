<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador Qualy Quimy</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    text-align: center;
}

.logo {
    font-size: 22px;
    font-weight: bold;
    margin: 15px;
}

.triangulo {
    width: 200px;
    height: 200px;
    margin: 40px auto;
    position: relative;
    transform: rotate(0deg);
    transition: transform 0.6s;
}

/* Cor principal */
.principal {
    width: 100%;
    height: 100%;
    background: #ccc;
    clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
    position: absolute;
}

/* Cor secundária esquerda */
.sec1 {
    width: 100%;
    height: 100%;
    background: #888;
    clip-path: polygon(50% 100%, 0% 100%, 25% 60%);
    position: absolute;
}

/* Cor secundária direita */
.sec2 {
    width: 100%;
    height: 100%;
    background: #444;
    clip-path: polygon(50% 100%, 75% 60%, 100% 100%);
    position: absolute;
}

button {
    margin-top: 15px;
    padding: 12px 20px;
    background: #28a745;
    color: white;
    border: none;
    border-radius: 8px;
}

</style>
</head>

<body>

<div class="logo.png">Tintas Qualy Quimy</div>

<h2>Gire e descubra sua combinação</h2>

<div id="triangulo" class="triangulo">
    <div id="p" class="principal"></div>
    <div id="s1" class="sec1"></div>
    <div id="s2" class="sec2"></div>
</div>

<h3 id="kit"></h3>

<button onclick="girar()">Girar</button>
<button onclick="comprar()">Quero esse kit</button>

<script>

let angulo = 0;

const kits = [
    {
        nome: "Kit Sala Moderna",
        cores: ["#ffffff", "#888888", "#2c3e50"]
    },
    {
        nome: "Kit Parede Interna Premium",
        cores: ["#f4e1c1", "#d2b48c", "#a67c52"]
    },
    {
        nome: "Kit Grafiato + Fundo",
        cores: ["#dcdcdc", "#555555", "#222222"]
    },
    {
        nome: "Kit Sofisticado",
        cores: ["#ffffff", "#c0392b", "#2c3e50"]
    }
];

function girar() {
    angulo += 120;
    document.getElementById("triangulo").style.transform = `rotate(${angulo}deg)`;

    let k = kits[Math.floor(Math.random() * kits.length)];

    document.getElementById("p").style.background = k.cores[0];
    document.getElementById("s1").style.background = k.cores[1];
    document.getElementById("s2").style.background = k.cores[2];

    document.getElementById("kit").innerText = k.nome;
}

function comprar() {
    let texto = document.getElementById("kit").innerText;
    window.open("https://wa.me/55SEUNUMERO?text=Quero o " + encodeURIComponent(texto));
}

</script>

</body>
</html>
