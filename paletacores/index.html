<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador de Cores Qualy</title>

<style>
body {
    font-family: Arial;
    background: #f4f4f4;
    text-align: center;
}

h1 {
    margin-top: 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
    gap: 10px;
    max-width: 600px;
    margin: 20px auto;
}

.cor {
    height: 80px;
    border-radius: 10px;
    cursor: pointer;
    border: 2px solid #ddd;
}

.selecionadas {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 20px;
}

.box {
    width: 100px;
    height: 100px;
    border-radius: 10px;
}

button {
    margin-top: 20px;
    padding: 12px 20px;
    background: #28a745;
    color: white;
    border: none;
    border-radius: 8px;
}
</style>
</head>

<body>

<h1>Escolha suas cores</h1>

<div class="grid" id="paleta"></div>

<h2>Combinação</h2>

<div class="selecionadas">
    <div id="c1" class="box"></div>
    <div id="c2" class="box"></div>
    <div id="c3" class="box"></div>
</div>

<button onclick="comprar()">Quero essa combinação</button>

<script>

const cores = [
    {nome:"Branco", cor:"#ffffff"},
    {nome:"Gelo", cor:"#f1f1f1"},
    {nome:"Cinza Claro", cor:"#dcdcdc"},
    {nome:"Palha", cor:"#e6d2b5"},
    {nome:"Areia", cor:"#d2b48c"},
    {nome:"Amarelo Ouro", cor:"#f4c542"},
    {nome:"Verde Cana", cor:"#7fbf7f"},
    {nome:"Salmão", cor:"#fa8072"},
    {nome:"Laranja", cor:"#f28c28"},
    {nome:"Azul Petróleo", cor:"#2c5d63"},
    {nome:"Coral", cor:"#ff6f61"},
    {nome:"Magenta", cor:"#d81b60"},
    {nome:"Vinho", cor:"#722f37"},
    {nome:"Azul Celestial", cor:"#4fc3f7"},
    {nome:"Cinza Médio", cor:"#888888"},
    {nome:"Preto", cor:"#000000"}
];

let selecionadas = [];

function carregar() {
    let html = "";
    cores.forEach((c, i) => {
        html += `<div class="cor" style="background:${c.cor}" onclick="selecionar(${i})"></div>`;
    });
    document.getElementById("paleta").innerHTML = html;
}

function selecionar(i) {
    if (selecionadas.length < 3) {
        selecionadas.push(cores[i]);
    } else {
        selecionadas.shift();
        selecionadas.push(cores[i]);
    }

    document.getElementById("c1").style.background = selecionadas[0]?.cor || "transparent";
    document.getElementById("c2").style.background = selecionadas[1]?.cor || "transparent";
    document.getElementById("c3").style.background = selecionadas[2]?.cor || "transparent";
}

function comprar() {
    let texto = "Quero essa combinação de cores: ";
    selecionadas.forEach(c => texto += c.nome + ", ");
    window.open("https://wa.me/55SEUNUMERO?text=" + encodeURIComponent(texto));
}

carregar();

</script>

</body>
</html>
