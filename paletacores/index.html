<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador Profissional</title>

<style>
body{
    font-family:Arial;
    text-align:center;
    background:#f5f5f5;
}

.menu button{
    padding:10px;
    margin:5px;
    border:none;
    border-radius:8px;
    background:#222;
    color:#fff;
    cursor:pointer;
}

.ambiente{
    width:360px;
    height:220px;
    margin:20px auto;
    position:relative;
    display:none;
    border-radius:10px;
    overflow:hidden;
}

.parede{
    width:33.33%;
    height:100%;
    float:left;
    transition:0.5s;
}

.chao{position:absolute;bottom:0;height:30px;width:100%;background:#999;}
.teto{position:absolute;top:0;height:20px;width:100%;background:#ddd;}

.sofa,.cama{
    position:absolute;
    bottom:35px;
    left:50%;
    transform:translateX(-50%);
    width:160px;
    height:45px;
    border-radius:8px;
}

#galeria{
    display:flex;
    overflow-x:auto;
    gap:10px;
    padding:10px;
}

#galeria img{
    width:120px;
    height:80px;
    border-radius:8px;
    cursor:pointer;
}

#paleta{
    display:flex;
    justify-content:center;
    margin-top:10px;
}

.cor{
    width:55px;
    height:55px;
    margin:5px;
    border-radius:8px;
    cursor:pointer;
    border:2px solid #fff;
}

button.acao{
    margin:5px;
    padding:10px;
    background:#28a745;
    color:#fff;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>

<body>

<h2>🎨 Simulador Profissional</h2>

<div class="menu">
    <button onclick="mostrar('sala')">Sala</button>
    <button onclick="mostrar('quarto')">Quarto</button>
    <button onclick="mostrar('externa')">Área Externa</button>
</div>

<!-- AMBIENTES -->
<div id="sala" class="ambiente">
    <div id="s1" class="parede"></div>
    <div id="s2" class="parede"></div>
    <div id="s3" class="parede"></div>
    <div class="sofa"></div>
    <div class="chao"></div>
    <div class="teto"></div>
</div>

<div id="quarto" class="ambiente">
    <div id="q1" class="parede"></div>
    <div id="q2" class="parede"></div>
    <div id="q3" class="parede"></div>
    <div class="cama"></div>
    <div class="chao"></div>
    <div class="teto"></div>
</div>

<div id="externa" class="ambiente">
    <div id="e1" class="parede"></div>
    <div id="e2" class="parede"></div>
    <div id="e3" class="parede"></div>
    <div class="chao"></div>
</div>

<!-- CONTROLE -->
<div>
    <button class="acao" onclick="novaBase()">🎲 Nova Cor Base</button>
    <button class="acao" onclick="gerar('comp')">Complementar</button>
    <button class="acao" onclick="gerar('ana')">Análoga</button>
    <button class="acao" onclick="gerar('tri')">Tríade</button>
    <button class="acao" onclick="gerar('mono')">Monocromática</button>
    <button class="acao" onclick="gerar('split')">Comp. Dividida</button>
</div>

<h3 id="nomeKit"></h3>

<button class="acao" onclick="comprar()">🛒 Quero esse kit</button>

<hr>

<h3>✨ Inspire-se</h3>

<div id="galeria">
    <img src="https://images.unsplash.com/photo-1525310072745-f49212b5ac6d" onclick="carregarImagem(this)">
    <img src="https://images.unsplash.com/photo-1501004318641-b39e6451bec6" onclick="carregarImagem(this)">
    <img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7" onclick="carregarImagem(this)">
</div>

<canvas id="canvas" width="300" height="200"></canvas>
<div id="paleta"></div>

<script>

/* BASE GLOBAL */
let baseGlobal = gerarBase();

/* KIT */
let kitAtual = "";
let coresAtuais = [];

/* NOMES */
const nomesKits = {
    comp: "Kit Contraste Moderno",
    ana: "Kit Harmonia Suave",
    tri: "Kit Vibrante Premium",
    mono: "Kit Elegante Clean",
    split: "Kit Sofisticado"
};

/* AMBIENTE */
let tipoAtual = "sala";

function mostrar(tipo){
    tipoAtual = tipo;
    document.querySelectorAll(".ambiente").forEach(a=>a.style.display="none");
    document.getElementById(tipo).style.display="block";
}

/* BASE */
function gerarBase(){
    return {h:Math.random()*360,s:70,l:60};
}

function novaBase(){
    baseGlobal = gerarBase();
    gerar("ana");
}

/* HSL */
function hsl(c){
    return `hsl(${c.h},${c.s}%,${c.l}%)`;
}

/* COMBINAÇÕES */
function comp(b){return [b,{...b,h:(b.h+180)%360},{...b,h:(b.h+180)%360,l:40}];}
function ana(b){return [b,{...b,h:(b.h+30)%360},{...b,h:(b.h-30+360)%360}];}
function tri(b){return [b,{...b,h:(b.h+120)%360},{...b,h:(b.h+240)%360}];}
function mono(b){return [b,{...b,l:80},{...b,l:30}];}
function split(b){return [b,{...b,h:(b.h+150)%360},{...b,h:(b.h+210)%360}];}

/* GERAR */
function gerar(tipo){

    let b = baseGlobal;
    let cores;

    if(tipo==="comp") cores=comp(b);
    if(tipo==="ana") cores=ana(b);
    if(tipo==="tri") cores=tri(b);
    if(tipo==="mono") cores=mono(b);
    if(tipo==="split") cores=split(b);

    let css = cores.map(hsl);

    aplicar(css);

    kitAtual = nomesKits[tipo];
    coresAtuais = css;

    document.getElementById("nomeKit").innerText = kitAtual;
}

/* APLICAR */
function aplicar(c){

    if(tipoAtual==="sala"){
        s1.style.background=c[0];
        s2.style.background=c[1];
        s3.style.background=c[2];
        document.querySelector(".sofa").style.background=c[2];
    }

    if(tipoAtual==="quarto"){
        q1.style.background=c[0];
        q2.style.background=c[1];
        q3.style.background=c[2];
        document.querySelector(".cama").style.background=c[2];
    }

    if(tipoAtual==="externa"){
        e1.style.background=c[0];
        e2.style.background=c[1];
        e3.style.background=c[2];
    }
}

/* WHATSAPP */
function comprar(){
    let texto = `Quero o ${kitAtual} com as cores: ${coresAtuais.join(", ")}`;
    window.open("https://wa.me/55SEUNUMERO?text="+encodeURIComponent(texto));
}

/* IMAGEM */
function carregarImagem(img){
    let ctx=canvas.getContext("2d");
    ctx.drawImage(img,0,0,300,200);
    gerarPaleta(ctx);
}

function gerarPaleta(ctx){
    let data=ctx.getImageData(0,0,300,200).data;
    let cores=[];

    for(let i=0;i<data.length;i+=80){
        let r=data[i],g=data[i+1],b=data[i+2];
        cores.push(`rgb(${r},${g},${b})`);
    }

    mostrarPaleta(cores.slice(0,5));
}

function mostrarPaleta(lista){
    paleta.innerHTML="";

    lista.forEach(cor=>{
        let div=document.createElement("div");
        div.className="cor";
        div.style.background=cor;

        div.onclick=()=>{
            aplicar([cor,cor,cor]);
        };

        paleta.appendChild(div);
    });
}

/* INICIAL */
mostrar("sala");
gerar("ana");

</script>

</body>
</html>
