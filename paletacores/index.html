<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador Qualy Quimy</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    text-align: center;
}

/* MENU */
.menu button {
    padding: 12px;
    margin: 10px;
    border: none;
    border-radius: 8px;
    background: #333;
    color: white;
}

/* TRIANGULO */
.triangulo {
    width: 220px;
    height: 220px;
    margin: 30px auto;
    position: relative;
    transition: transform 0.6s;
}

.principal {
    width: 100%;
    height: 100%;
    clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
    position: absolute;
}

.sec1 {
    width: 100%;
    height: 100%;
    clip-path: polygon(50% 100%, 0% 100%, 25% 60%);
    position: absolute;
}

.sec2 {
    width: 100%;
    height: 100%;
    clip-path: polygon(50% 100%, 75% 60%, 100% 100%);
    position: absolute;
}

/* PAREDE */
.parede {
    width: 300px;
    height: 180px;
    margin: 20px auto;
    border-radius: 10px;
    display: flex;
}

.lado {
    flex: 1;
}

/* BOTÕES */
button.acao {
    margin: 10px;
    padding: 12px 20px;
    background: #28a745;
    color: white;
    border: none;
    border-radius: 8px;
}
</style>
</head>

<body>

<h2>Tintas Qualy Quimy</h2>

<div class="menu">
    <button onclick="carregar('sala')">🏡 Sala Moderna</button>
    <button onclick="carregar('interna')">🧱 Parede Interna</button>
    <button onclick="carregar('grafiato')">🎨 Grafiato + Fundo</button>
</div>

<div id="app" style="display:none">

    <div id="triangulo" class="triangulo">
        <div id="p" class="principal"></div>
        <div id="s1" class="sec1"></div>
        <div id="s2" class="sec2"></div>
    </div>

    <div class="parede">
        <div id="w1" class="lado"></div>
        <div id="w2" class="lado"></div>
        <div id="w3" class="lado"></div>
    </div>

    <h3 id="nome"></h3>

    <button class="acao" onclick="girar()">Girar combinação</button>
    <button class="acao" onclick="comprar()">Quero esse kit</button>

</div>

<script>

let angulo = 0;
let atual = [];
let tipoAtual = "";

/* KITS */
const dados = {

sala: [
{nome:"Sala Moderna", cores:["#ffffff","#888888","#2c3e50"]},
{nome:"Sala Clean", cores:["#f1f1f1","#dcdcdc","#999999"]}
],

interna: [
{nome:"Interna Premium", cores:["#f4e1c1","#d2b48c","#a67c52"]},
{nome:"Interna Suave", cores:["#fff5e1","#e6d2b5","#c2a47e"]}
],

grafiato: [
{nome:"Grafiato Cinza", cores:["#dcdcdc","#555","#222"]},
{nome:"Grafiato Forte", cores:["#eee","#444","#111"]}
]

};

function carregar(tipo){
    tipoAtual = tipo;
    document.getElementById("app").style.display = "block";
    girar();
}

function girar(){
    angulo += 120;
    document.getElementById("triangulo").style.transform = `rotate(${angulo}deg)`;

    let lista = dados[tipoAtual];
    let k = lista[Math.floor(Math.random() * lista.length)];
    atual = k;

    /* TRIANGULO */
    document.getElementById("p").style.background = k.cores[0];
    document.getElementById("s1").style.background = k.cores[1];
    document.getElementById("s2").style.background = k.cores[2];

    /* PAREDE */
    document.getElementById("w1").style.background = k.cores[0];
    document.getElementById("w2").style.background = k.cores[1];
    document.getElementById("w3").style.background = k.cores[2];

    document.getElementById("nome").innerText = k.nome;
}

function comprar(){
    let texto = "Quero o " + atual.nome + " da Tintas Qualy Quimy";
    window.open("https://wa.me/55SEUNUMERO?text=" + encodeURIComponent(texto));
}

</script>

</body>
</html>
